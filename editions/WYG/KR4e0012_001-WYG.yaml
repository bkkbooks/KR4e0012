body:
  text: 說學齋稿巻一明危素撰三節堂賦乙酉稽受氏於髙堂兮奠偰輦之攸居際神元之興運兮肆強暴而攘除偉令子之俶儻兮從世皇以平呉匪徒戮力於戰陳兮陳征討之訏謨信直道以迕時兮轉漕輓於畨禺屬羣盗之交熾兮集草間而嘯呼阨險隘以弄兵兮值陸梁之兇渠矢赤心而奮鬭兮凛英烈而莫渝俄勢窮以被執兮必臨難而捐軀慘海霧之隂翳兮嘂山鬼而乗狐嗟良配之嫠居兮厯三紀而有餘撫青鏡以含悲兮収涕泗於衣裾哀孤惸於幼稚兮念生我之勞劬憫無父之何怙兮賴慈母之攜扶攖疾疢以莫瘳兮吾豈愛於肌膚刲股肉以和藥兮欣沈痼之獲蘇世驚歎乎忠義兮作人紀之良橅表三節以詠歌兮峙堂構於東湖葆遺器以櫝蔵兮紋緹襲乎詩書惟延祐之后皇兮思蒐羅於文儒爰趾美於髙科兮羌簪笏之滿家振羽翰於天朝兮流四海之名譽匪顯庸之足夸兮拯黎庶於泥塗雖余文之骫骳兮揭潛徳以張鋪信天道之孔昭兮式原本於厥初别友賦送葛子熙癸酉余生楚南之窮邦兮嗟不逮乎古之人執簡䇿以永歌兮視前行之逡廵悵風氣之日凋兮衆猱雜乎滓穢獨涼涼而奚適兮虞誹言之交至能服仁而蹈義兮雖顛沛庸何傷顧􅋵踐之或怠兮悲絲染之𤣥黄思驂雲螭以髙馳兮下覽觀乎四海帶玉璐而佩寳劍兮劃長嘯乎天之外值美人於丹丘兮云抱朴之來孫朝吸上池之沆瀣兮夕掇𤣥圃之芳蓀獵六籍之精華兮悲黄農之不吾待並騑騑之良馬兮欲導車輪而言邁有疑義而與析兮且交修予之慝豈私情之昵比兮將以緝乎道徳懐夫子之固窮兮雖制義而自安顧甘㫖之或缺兮寧孝子之所歡念一門之孤惸兮而衣食之莫具汨奔走於泥塗兮嵗冉冉焉遲莫輟彭澤之桂櫂兮爰東憇乎錢唐撫句踐之故墟兮弔臺觀之榛荒颺髙帆以度海兮仍羣仙於雲隖凌榑桑而遐矚兮浴赤曦之暠暠盻梅梁而太息兮企聖賢於諸馮何三千歳之寥寥兮大運若是其汚隆翳娭遨之足樂兮傷馳驅之勞勩扇朱光於炎宇兮安得激清風而來至旋輕輈於汝濵兮將同采乎莧藿玩曽峯於翠雲兮金谿有翠雲峯射麋鹿以為樂亂曰子何為行兮呉越之鄉兮韶音之鏘鏘兮矯首以望虞皇兮邈矣夏禹海芒芒兮哀民生兮曷時而康兮存存齋賦為李孟豳尚書賦庚寅繄太極之混淪兮為生化之本根維二氣之闔闢兮暢萬物之滋蕃羌易道之廣大兮備吾身於乾坤極知崇以效天兮循禮卑而法地體成性之存存兮由道義之不匱信弛張之靡忒兮亦柔剛之相濟偉鄒孟之崛起兮當戰國之兵爭悼民心之迷繆兮揭皇極而載明謂君子之善存兮異羽毛之頑冥彼嵬瑣之紛紛兮遂梏亡於外誘湛明鏡之當臺兮竟昬䝉於塵垢蔚嘉穀之羅生兮胡雜糅於稂莠懐咎繇之苖裔兮蚤奮迹於滕邦炯氷壺之交暎兮粹白璧之無䨇玩𤣥理於簡册兮驅長才於海江爰校書於史館兮持憲度於臺閣善和爕於羣情兮或誾誾而諤諤沛大旱之甘霖兮蘇八紘之毒蠚退休沐而齋居兮撫易象而觀天亶存存之不息兮契洙泗之心傳雖首路之邈悠兮傒白首而不遷憶旋輈於虎林兮郤傾蓋於京闕瞻雲霄之軒翥兮莫䇿厲於駑劣葆貞白於嵗晏兮追徃行於前哲樂几筵之潔清兮陳左圖而右書殖卉木之芬芳兮啟韋編而載愉託中情於藻翰兮著懿戒於坐隅望番禺有序庚寅廣東道肅政亷訪使欽察覈軍民達嚕噶齊托歡察爾在廣州多不法事江南行御史臺遣監察御史鎦振徃按之振受賕以欽察言非實欽察忿死振亦恐懼得疾還至龍興驛舎白日見欽察於前因噤而死未幾行臺又遣監察御史杜某訪其事得今衢州路總管薛超吾為江西行中書省令史時所賦詩遂合諸御史上章覈振後世有闕年臨川危素聞而哀之作望番禺望番禺兮海氣沈沈青天高高兮白日為隂悲風滿山兮夜聞噫喑豺虎呀哮兮麒麟遯潛望番禺兮䀌傷予心經厯律圖贊庚寅猗昔上古狉狉兟兟帝戰涿鹿遂生亂民唐虞命契敷教人倫乃設庠序尊尊親親世變風移彛典弗循乃置刑威法令式陳楚有君子哀此頑嚚表經附律提要諄諄流行區宇明徳懐新安得率土返樸還淳各守厥職葆其天真上下四方休然陽春刑措不用而多鳳麟我讚斯圖爰詔無垠異石銘有序庚寅夀武庫副使髙昌額森布哈君以異石示予其大三寸色正碧上有白文有神人戴笠跨驢白氣上貫中雙龍摩空而飛君謂其大父甘州守庫哩拜托歡公詣仁祖山佛寺得此石道中故牘而蔵之甚久蓋靈氣所鍾睹斯異物乃為之銘銘曰太和絪緼二氣摩蕩山川儲英竒石異狀賦質正碧中含素文曄乎神人其行逡廵蜿蜿驚龍乗雲飛躍乾端坤倪膠轕回薄赫爾精氣騰為列星善匵而蔵何百千齡范文正公讀書臺銘有序庚寅宋資政殿學士户部侍郎累贈太師開府儀同三司楚國文正范公幼孤貧從其母適長山朱氏朱氏宰安鄉公讀書於太平興國觀既擢進士第入㕘大政功名烜赫著在竹帛後人指其遺跡而詠歌懐思者無已㑹宋中書舎人廬陵劉公才邵八世孫珍僑寓是邑廼作祠宇割良田以供祭祀俾素述文刻諸臺下乃為之銘其詞曰允顯范公東南之英出將入相曄乎功名睠茲安鄉為酆屬邑出自北門林阜孔岌公有遺蹟峩峩髙臺世變事移過者興哀仲璧氏劉衣冠之裔僑居此鄉仰止異世伐木甚良爰樹髙堂爼豆載陳靈其來享陟彼崇丘悽其延佇江流滔滔嵗不我與猗公之仕載逢其辰孰使荆揚才傑沈淪邈哉風㫖彌乆彌新篆銘貞石公有鬼神賜帛頌有序庚寅皇帝御天下十有八年凡三賜老人帛於是撫州民張天祐與被寵命初賜時天祐年八十有闕再賜時八十有闕三賜時八十有闕最後之賜則九十有二天祐少好道術善保嗇其精神大隱市㕓無求於世蔵書甚富以朂其子孫其所以至於上夀者蓋異於常人矣國家自祖宗以來子惠元元然於尊禮髙年尤為備至此先王之所以治其天下其民化其俗易成者也於是史臣素作頌以歸美於上其詞曰皇有萬國莫不尊親紹天明命撫之以仁民吾同胞海涵天覆仁政之行敬老慈幼筐篚肆頒皇有恩言惠澤斯沛孝理實敦維撫為郡江湖之表山谷僻深民多夀考㣲臣天祐生於宋時束帛所䝉明詔飇馳養老乞言三王之世臨雍拜老亟稱漢帝乃如斯人道術孔多蔵書滿家守一處和安車聘賢尚法古昔宜秉赤心上禆聖徳化行俗美維皇之明昭垂罔極史作頌聲蘄春縣興學頌有序庚寅蘄春縣長額森布哈君既新廟學郡學教授衛子炎為記君上計京師稍為余言治邑之事君始至官修農桑水利之政平獄訟䘏灾傷無所不用其情其興學之績為最大蓋蘄春之學在郡城東北之鮮原素無恒産儒之在籍者廿有八家多貧不能自振於是學舎傾圯弦誦寂寥君始至伏謁廟下大懼無以稱國家崇學右文之意乃出稟給為之倡尹邊守誠丞孫克昭主簿蘇世榮教諭魯志暨胥吏富民咸相其役因其舊而修之者大成之殿明新之堂撤而新之者門廡齋舎創成之者櫺星大成二門若夫祀所龕室帳帟祭器無有弗備學之閒田悉以種桑嵗集之以補贍學之費民知令之所向相勸從事於詩書而敦行孝弟君之於政知所先後如是乃為之頌使刻之石其詞曰我行江濱爰采其蘄田多汙萊埜有嚬呻天監下土哀此罷民畀我賢令惟皇之仁學校之行先王善政迨我世皇著在甲令蘄春有學以祀𤣥聖棟橈宇傾曷以廣敬賢令聿至顧瞻裴囘乃鳩羣工罔敢弗來祇奉明命僉言允諧有嚴爼豆民徳孔懐雍雍童冠濟濟絃誦修行明經聨翩充貢繄此長才小試其用伐石刻辭輿人之頌興學頌有序辛巳至正元年四月大都路都逹嚕噶齊喀喇公伯嘉努請作左右南三警廵院大興宛平二縣孔子廟并建學舎都府亟達諸禮部部上之中書省中書從其言各以室廬之在官者為之又言學設教諭而無廩食非所以尊敬師道中書亦從之嗚呼古之立學所以作成人材備國家之任使非細故也三院之所轄五方之人咸聚焉雖有長才秀民猶必待教而后明況於蚩蚩之氓乎二縣者在畿内教之尤弗可以闕然也我朝建邦設都百年於此國學京學規制已修顧於五廟學未遑有作而作於公尹京之日則公之於政可謂知本以能成昔人未成之志何其盛歟抑亦遭逢聖人埀意斯道故公之言得以取信於朝廷而無或沮止之者五學之師弟子其亦思無負公之志哉公字九德在官守職若活海賈事皆可書今獨取其為政之知本者為頌之其詞曰維昔火帝即燕設都山髙川回神明相扶乃作廟學于京于國以祀聖師以講道徳人才勃興邦家之光小為杗桷大為棟梁三院警廵以及畿縣置師無學有弗聞見繄康里公實涖神京治政以平豪猾震驚曰兹教化為予之責請於宰臣報可甚亟爰奏瑟琴升歌雅南籩豆在筵有赫其臨匪公言行際時之盛化被國都風俗以正肅肅冠裾誦詩讀書凡百多士毋昧厥初趙歩院記甲子趙歩院在金谿縣南去四十里順政之鄉梧桐里所可知者唐時興亦莫詳何年也佛殿法堂識施財者黄諤姓名于梁修之者米邦傑也延祐間寺無僧乃五年誕聖之節禪居寺僧如瑛歎曰趙歩院者亦我佛之祠也吾觀善以其道行世者不階粒粟銖錢至於重樓廣宇魚鼓相聞雖廢者宜有以興況興者其忍使之遽廢耶為吾學者坯厓巢木草食澗㱃固何俟乎室廬之安然故有其地厯數百年坐視為榛莽狐兎之墟誠何足勸哉況是日祝天子夀而兹院獨無僧致其報上之禮其可乎於是請於有司入居之稍久度弟子增置田園里人江大舉又施其居室蔬圃若干畝後十有八年瑛已死其徒嗣平謀曰吾師之於趙歩也勤矣不可永永無聲畀來人乃具顛末請予記予志學經世請得而言之國初郡縣有筦僧者其政令猛當此之時僧竭財給徵索追呼求覓者無虚日茍弗應罰立見已奔走郡縣笠屩炊卧費且夥故寺之貧者至鬻釡鬲鐘磬不足則散走仁宗皇帝在東宫首罷所謂僧錄司者僧乃得蘇瑛之來趙歩也實當仁宗在位感上恩深厚如此則以萬嵗為祝者蓋上之情當報出乎中也然自罷去管僧者他寺之僧晏然無外撓田連阡陌而征役弗及然則精修萬行以躋正覺固其職也乃大不然豐車肥馬要結權勢昵聲色殖貲産大者可以埒封君不知朝廷所以尊尚覆䕶者欲其超出諸塵見性成佛或足以禆治化嗚呼其亦可以深長思矣是鄉之人言瑛居趙歩日惡衣食力種藝故寺得以不替其所見異於流俗也哉平能念其師之勤欲不朽賢已繼其後者讀吾記有所警也夫瑛號玉菴平號雲巖大舉者事母至謹以相人術行數郡年九十餘終善釣魚故號釣舟子㳺先生文集目錄後記丙子右宋監察御史廣平游先生文集若干巻第錄如上昔河南二程子之門英才甚多其卓然著稱者則有謝顯道尹彦明楊中立洎先生四人而已楊氏三傳而得新安朱氏開析遺經張皇斯道故楊氏之書行於世為甚盛其餘則幾於散亡磨滅豈不惜哉始先生在京師程叔子一見謂其可與適道伯子知扶溝縣事聚邑人子弟於庠序俾執事其間先生欣然從之盡棄其學而學焉叔子嘗曰㳺君徳器粹然問學日進政事亦絶人逺甚則先生之所至可知矣然則豈可使之無傳哉元純間素客郡城故金谿縣主簿徐君竒伯之孫原假以此書歸與友人黄冔讀之其字脫繆頗為更定又次其先後其不可知者闕焉夫文也者心之精微在焉紋先生親得碩師而又善學其功於斯文為甚大嗚呼奮乎百世之君子尚有考於此編云逰牛頭山記戊寅牛頭山在金陵南去三十里至元四年龍集戊寅余留崇因寺崇因當里之半焉三月己酉將與番陽僧明晉同逰里中僧善繼如壁山隂道士費一元皆欣然願偕行過石子岡東行至山下尋辟支佛洞洞黒有穴在東投之瓦石琅然有聲久而後定孫權時山裂有僧出其中謂文殊辟支佛云南唐周彦崇記其事過大雄殿前值寺僧明大及英臺寺一僧導予登兠率菴正近山頂又東縁厓石尋融師足迹及卓錫泉厓甚險予五人者皆懼而明大獨徃來如飛猱訾且笑更由菴西去予與一元不能從而其能徃者詑其竒勝讀南唐保大時所建佛窟寺碑實王文秉所刻文衰弱甚而刻字殊精好摩挲久之而去至下西寺僧道宣留飯壁間見恒山周昶詩昶文穆公之後皇慶間僉江西亷訪司事行部至吾撫卓然有政後至者率不及也詩雖無足觀予特愛其人焉道宣之言曰兵戈以來寺之田在鄰郡者悉不能復故徒衆繁多營營於衣食以故不及曩時之盛云聞祖堂寺有幽棲巖者山徑危析登之頗艱憩西峯寺詣融禪師菴至延夀寺其碑亦文秉所刻而又有斷碑在地唐大厯中僧靈樽書文甚簡古遂宿寺明日觀幽棲巖搨文秉題名善繼賦詩題石上而明晉和之還上東峯望見兠率菴隱隱然在山上樹参錯若畫圖然一元顧善繼曰子與吾約結菴此其處矣不必他求也臨髙而望自孫權分裂江南更晉宋齊梁以來數千百年間金陵為必爭之地英雄豪傑之遺跡既皆剗削消磨盡矣吾徒生值休明而得與山僧道士娯情山水之間又何其幸歟歸而志之以薦好竒之君子餘姚州覈田記甲申至正二年浙東海右道肅政亷訪司檄紹興路總管府以餘姚州田賦未均廼屬同知州事劉侯耑治其事初大徳四年嘗覈實田稅既而籍燬於火執事於鄉里者徃徃增减田畝之數變亂賦稅之常於是富者享其利而安處貧者罄其家而無告積弊蝟興莫此為甚侯受檄以來出宿公宇日一還問太夫人起居而已晝夜悉心鬚髮為變田一區印署盈尺之紙以給田主為之烏由凡四十六萬餘枚田後易主有質劑無烏由不信也民王實嘗以其所有詭户名至是懼有奪之者乃自陳繼是自陳者五萬人或舊無粮今自實有至三五百畆者至於消積年之争訟者七千餘事片言之下無不感悟知悔父子兄弟復還其天者蓋多有之又覈站田一萬五千二百念餘畆俾得田者助其役其畫田之形計其多寡以定其賦謂之流水不越之簿又畫圖謂之魚鱗才次之圖其各都田畆則又所謂兠簿者焉至於分其等第以備差科則又有所謂䑕尾册者焉計其凡六千二百五十餘帙綱目畢張如指諸掌侯既交代而上官挽留之使不得去然其號令行於下者如始至官非有以得於民者豈能若此嗚呼如侯者可謂能為民長慮却顧者矣侯名輝字文大沈厚而精鍊嘗任風紀去是而羽儀於天朝不逺矣屬予以使事過是州耆宿楊仲等請為文刻之於石使來者有考焉盜發彭府君墓記甲申宋名臣彭忠肅公之父府君諱文先葬清江縣建安鄉四㑹山之原與四㑹院隣後百八十三年為元至順二年八月既望院之僧敖本此率人發府君冡啟石槨斵棺毁尸棄河中盜其蔵器瘞其師於上為浮圖焉且偽樹小浮圖旁近以為騐彭氏子孫涕泣號哭走愬於官清江縣檄太平砦廵檢曹某徃按之僧出偽劵以辨彭氏持忠肅公所志其母壙云左去府君墓二十歩計之得實墓中磚皆朱漆書彭氏記曹君命啟之得新棺旁皆實以故甎出其所瘞乃得彭氏壊棺斧痕可識扇履具在有同郡楊君者當時志墓石存土中縣主簿王某奮然白上官亟上其事部使者數讞之中書下之刑部議其罪比強盜減死黥僧為民𨽻有司充警復墓地彭氏余奉使過臨江購史館遺書作忠肅公傳既奏御矣而公之世孫鏞請志發塜事今國子博士劉君聞與予論撰館中曰吾為錄事臨江觀王主簿白其事豈不毅然大丈夫哉或謂浮屠氏恒損己以益人若敖本此之慘毒自恣卒蹈於刑辟惡覩所謂損己以益人耶世之人乃紛紛然求福田利益於彼嗚呼何其惑哉後十有五年至正五年二月記樂平州慈湖書院贍學田記甲申昔楊文元公之宰樂平也崇教化敦禮義治人事神克盡其道樂平之民向之蒙公惠澤者由今觀之皆其髙曾祖父矣然去之百年猶不能忘非摩漸撫循使之心恱而誠服者詎能至是孔子曰君子學道則愛人有以哉袁正肅公之提㸃江東刑獄乃創書樓廟學之後入國朝至元十九年縣尹翟君衡謀於故宋丞相馬公専祠楊氏請以貢士莊田若干以供祭祀以贍師生馬公以為宜乃得魏氏之隙地於縣治之東髙明亢爽山川獻竒爰築宫其上率諸生舎奠焉事既上聞賜額曰慈湖書院設官如令式廿七年覈天下戸口延祐二年經理田畆皆係於書院其後不知縁起者毎以貢士莊為辭而吏得以舞文其間甚不足以仰承聖朝敦厲學校成俗化民之意至正元年公之五世從孫同翁來為山長列其事於郡饒州路總管府知事于君凱言於郡守曰慈湖書院以貢士莊田養士行之於國初非害於法若何而靳又以上於江淛行省行省是其言自是書院始有田素始過是州既拜謁祠下同翁具述其顛末求為之記惟楊氏之學得之陸文安公其為樂平也實朱文公為淛東常平使者之所薦也而不知者紛紛然謂朱陸異學可勝歎哉今書院有田以自養學於其間者他日出而仕於明時有民社焉當以公樂平之政為師範焉可也是為記友樵齋記乙酉予適越得越人王君為楚語者讀之其辭若哀屈大夫抱忠以死而實自託焉予愀然太息曰悲哉斯人之志其命之不遇者乎他日太史葉君敬常致浮屠師大同之言曰鄉也子之過越聞楚語者先君子之作也先君子富於學與時不偶退蔵山海之間混混焉與樵蘇為羣故題其燕休之室曰友樵翰林承㫖趙公為書其扁侍講學士鄧公書所為楚語刻諸壁間子其為我記之按王君諱發字景囘其父武岡君教授諱汝舟多蔵書君早頴敏能盡讀之有闕遺必旁搜徧請補完乃已其禮樂刑政冠昏䘮祭以至天地萬物虞初禆官之言凡可輔國家禆名教輙手書之若晏丞相之類要者總若干巻性至孝父病親治藥食楷書佛氏書以祈親夀或聘為師則曰吾為人子有子職安敢違膝下而他適故從之遊者踵相接於門開發成就者甚多君之接物直而不倨和而不流口不言利大書忍貧二字於屏然不幸年甫四十死矣嗚呼君之畜學不可謂不勤君之制行不可謂不慎而卒隱約於山林方強而遽死余悲其命之不遇者此也友樵齋者界上虞㑹稽二邑之境當楊梅峯之下襟帯淛江有樹石之勝西曰日鑄山歐冶子淬劍之地東曰東山謝太傳登臨處也大同雖去為身毒學然亦能讀其父書慷慨有氣誼其弟克明則居於是而能世其業者夫塞於前未必不通於後勉為善而已余方輯續楚辭既錄君之作而叙識之又重葉君之請而為是記清嘯軒記丙戌予性嗜恬寂以職事在館閣得羽人之宫於京師太液池上假一室以處暇則杜門清坐以自適其鄰有元君夀卿疏暢喜交逰間徃訪之君延坐所居之清嘯軒出法書名畫以相娯樂意豁如也他日君請記其軒予戲問之昔之以嘯名者吾聞其二人孫登嘯於蘇門劉琨嘯於晉陽君之嘯將孰從焉從琨之嘯耶琨名將也今海内承平無一塵之動是以知君之嘯異乎琨之嘯也從登之嘯耶登隠者也君方將以才出用於當世是以知君之嘯亦異乎登之嘯也何居君囅然曰何先生之固也吾知嘯而已奚論古人似不似哉博學者嘗為予言嘯有十五章有所謂深溪虎髙桞蟬巫峽猿下鴻鵠古木鳶之類尚從夀卿而求之因書以為清嘯軒記休寧縣尹唐君覈田記丙戌國朝以五事六事責成於守令其目皆曰賦役均嗟乎賦役之難均也久矣大抵江淮之北賦役求諸户口其南則取諸土田户口之貧富無恒業土田之貿易無恒主由是雖欲其均卒莫能均況於守令之憂民者至鮮而貪殘舞手其間者皆是也使承平之世膏澤不及於下果誰之咎歟予嘗求能覈其有田無稅有稅無田以定力役者蓋得三人焉其一至元間紹興新昌縣尹李君其一大徳間金谿縣尹趙君其一同知餘姚州事劉君蓋皆能終始卒成其事者民之䝉惠豈其㣲哉顧今又聞呉興唐君為縣于徽之休寜而亦以此先之至正五年春君始至官召父老問民不便者皆以賦役不均告君曰吾不可使胥曹任其事為其並縁為姦蠧也乃聴民自推擇亷而幹實者諉之五月甲子鄉各舉二人君置酒縣堂申命之戒以毋私毋擾毋欺期三月以籍至縣八月訖事上其籍於郡民情大恱歌詠載道於是父老請伐石紀其事使至上京求予為之文余固樂君之慈祥清簡號令不煩而一掃宿弊使其民樂生安業於無窮何其有古循吏之風哉君名棣字子華文章清麗而善冩山水嘗承詔畫嘉禧殿御屛故不知者謂君以藝名家而已國子監分學題名記丙戌國子助教歳從幸分學上都佩國子學印給驛騎公車學正或學錄一人伴讀四人其一人兼掌儀一人兼典籍一人兼典書一人兼管勾弟子員或宿衞或從父兄無定數初留守司供稍食至正闕年罷獨國子監自大都計錢粟以來及入學留守司前期治具宣徽院頒尚醖中書省御史臺集賢院官必至所以奉明詔致勉勵樞密翰林國史宣徽三院至不至視其人今年素與學錄趙性端實來暇日遡而求之助教之可考者自大徳八年始明年至皇慶二年闕學正錄伴讀之可考者自延祐元年始於是諸生請彚次書於石素曰題名故有記今若等刻石傳永久不亦善夫傳有之太上立徳其次立功其次立言金可壊此不可壊諸生勉旃殿中司題名記丙戌皇帝清暑上都臣僚分㳄扈從而殿中司題名有記從故事也至正六年殿中侍御史哈喇多爾濟公使來請記之惟自昔帝王之御天下深居九重而令行四海故出必有警蹕之節入必有禁衞之嚴所以示等威昭上下況殿廷之間朝㑹之際尤不可以不肅其奏對或病於政儀文或􅀢於禮皆得以言之歳至上都官曹之從幸者不出三日皆以闗白出三日非有故不至得糾其罪此殿中侍御史之職號為清要者歟夫以國家委任之重蓋如此居是官者其可不竭其忠貞思以稱塞哉至若知班之始置所以舉不如儀者其後兼主文書又設通事驛史皆國朝制也是嵗知班鄂倫博斯哈通事闗寳譯史哈喇章實從洪贊孔子廟塑象記丙戌至正三年㶟陽諸生李泰買地於懐來縣洪贊驛西北作孔子廟驛令雲中藥温實贊其成五年站戸長宣平王訓出錢素孔子象六年泰又出錢率衆從享顔子而下十有四乃走上京求記之懐來古稱絶塞洪贊去其縣逺甚厥今近在邦畿遭右文之世故雖山谷僻深聖人之化亦無不達也泰居隠約之中能率其民習於爼豆而温之職思其外誠賢哉使仰瞻乎徳容之盛其必有所興起者矣昭福寺法堂記丙戌浮屠師繼清具其所居昭福寺新作法堂始末至京師屬邑人危素記之按寺在金谿縣南五十里後唐紀厯中頭陀僧進明創之中廢宋淳化中鄉人請項山悟空禪寺僧善津來主之津之徒曰用和和之徒曰如陵開慶間改律為禪而静思寺僧妙冲來主之既而冲請復律冲與陵之徒並傳而居有之焉今僧曰希晃希和正寧正宗正大冲之傳也而繼清與正朗陵之傳也初善津用和相繼興造寺宇如陵新作法堂元貞中火冲之徒曰如壁乃更作之其後壊僧維仁主寺事鳩材未建而仁卒晃繼主寺事仁之徒曰正寧及希和繼清皆竭力相成經始於至正四年五月朔明年九月望法堂始成堂凡七間費中統鈔萬貫鄉人以財來助者凡五之二中室之後為觀音閣則希和静思寺僧維寧及朱琛助之嗚呼佛之學非言語所能既然其書之多至於幾六千巻故浮屠氏必有演説之地此法堂之所以作也東南兵革休息垂六十年而國家崇尚佛學與之土田蠲其徭役使其徒坦坦施施而無所憂虞然自放於矩度者亦有之矣吾邦山深谷邃無外物之誘如昭福之徒能篤志問學以自修飭而致力於斯堂其勤如此記有所不得辭也𤣥儒吕先生道行記丁亥先生諱虚夷字與之姓吕氏春化人世傳家始生時母以吕氏上世止一子傳家否則必為浮屠道流不浴者三日嫂胡憐之自為乳哺少嘗執事鄞象山二縣庭冀得㣲祿以養母母殁遂謝去入天台之桐柏山崇道觀著道士服益治經史皇慶間詣慶元報恩寺呉尊師㖟祈風雨役使鬼神之法有王翁者築舘象山之鬱溪蓋隖嶼孤絶處先生禱雨而應王翁因留共處是為大瀛海道院翰林學士臨川呉公為之記至正元年慶元旱五月己酉禱雨郡治雲起西北狀如天神執仗官吏驚呼再拜頃之大雨臨江路同知總管府事趙侯由松招之主福順觀建大閣以奉四明洞天之神先生好義而質直端謹而和易安貧守道不事華飾不趨勢利素好客常典衣以具食通禪觀之學沙門師恢大章噩無夢銘古鼎俱有倡和之作嘗與翰林侍講學士同郡袁公僧岫雲外坐松隂講老子或繪為圖呉公又為之贊其待鄉曲至厚喜必慶憂必弔博士袁士元有疾經嵗不瘉先生冒寒暑履氷霜求醫請禱久而不怠他日來眎疾度河風浪忽作舟覆而溺先生徐起色不為變曰無使病者聞之為我驚也同舎生項誠之久客杭老而無依先生親徃迎之願終其身與處然既隠居無求於世至杭之呉山見古梅及藤蟠曲竒怪乃以為益友四年二月丙辰無病而卒先是郡人金諒有山在鄞東湖之西亭預為先生營夀蔵至是其徒奉冠劍瘞焉傾城徃送雖軍卒小夫亦設祭道傍受授法者諒及錢津與諸交遊作天壇道院築誓壇以蔵其書曰老子講義闕巻嗇齋文集闕巻先生所自著曰瀛海記言十有七巻皆一時名人為先生所著初呉尊師别有館在城東門人呉某毁之先生嘗受遺命於師力欲復之在勢者隂庇呉某不能直故其殁也猶以為憾云素弱冠始識先生信之龍虎山若神交者後四年偕徒歩徃見呉公撫之華蓋山時吾郡處士孫君履常呉君仲谷相與登臨嘯詠意歡如也又十有八年素事適鄞而先生化去踰月矣嗚呼悲哉葛邏祿廼賢與其徒鄭守仁請書先生之遺事并蔵焉金谿縣梁安峽義渡記戊子撫之屬邑曰金谿其南五十里有梁安峽石壁峭險兩崖雙峙南城諸水皆㑹於此上游有渡曰馬頭度峽東而水深不可渡渉臨川營前里有張昭孫不恭慨然曰吾先君葬梁安山之中距渡才二里於是作堂以祠其父外為屋以待渡者息肩於此以永嘉浮屠普愿守之割腴田若干畝以贍舟人而并食焉既而重之有餘財者曾某呉某皆施田以助之始終贊其成者項山寺主僧師啟且以其寺近因屬永久任其事庶幾無隳廢時也呉君之子擴以書來京師與其友危素曰願有述予讀周官書夏官之職有司險焉掌九州之圖以周知其山林川澤之阻而達道路山林之阻則開鑿之川澤之阻則橋梁之謂之司險者有敵國之侵陵故也今國家盡得四方之境土固無俟乎設險以守其國故司險之官不設然道路橋梁亦有専領之者顧有司率急於錢穀簿書之事以此為迂緩不切無復加之意矣由是津渡之舟悍夫㓙人把握其間爭纎㣲之利棄性命如鴻毛者蓋多有之雖留難之禁著於令甲而亦莫之能革嗚呼可勝嘆哉今張君與州里之賢豪致力於此非有所驅廹而出私財披腴田無少靳吝斯亦可以言義非歟乃為書之以示來者蓮華寳勝寺記己丑豫章僧志祐來遊京師以事狀告於臨川危素曰吾所居寺在南昌之境曰蓮華寳勝寺有田三百餘畝唐尚書右丞相贈司徒謚文獻張公祠堂在焉宋興間田之在官塘者為民姚氏所據主僧澄江力歸之至於今公牒具在澄江復環寺種竹積嵗多至三萬餘箇入國朝僧至寳作室四楹竹間榜曰蓮溪書院泰定初僧紹能將逝囑其徒曰吾歿後汝力於為善於是僧覺先作善法之堂至順初僧紹定與長者萬仁作石橋於寺西曰萬年之橋再紀至元之二年主僧宗慶與僧徳寧以公庫餘財建三門西廡僧徳淳作亭寺前曰鎻翠亭建外門曰碧蓮梵景明年覺先出財建海㑹堂及東廡又明年領住持事至正五年新佛殿真堂伽藍神祠洎諸塑象庖㕑庫庾與夫器物百須無所不悉因請為之記志祐且曰諸師之相繼致力於寺事後人何可忘考張公之遺跡久而益著子其得無意乎按張丞相說最親重公與通譜系曰後出詞人之冠也公進中書舎人㑹御史中丞宇文融先獻䇿括天下遊户及籍外田署十道勸農使分行郡縣說畏其擾數格沮之公謂說曰融新用事辨給多詐公不可以忽說曰狗䑕何能為至是融又請吏部置十銓分治選事說亦不從融恨恚乃與崔隱甫李林甫謀中傷說遂罷相公亦改太常少卿出為冀州刺史以母不肯去鄉里故表換洪州都督公之在官豈嘗休於此耶惟公起自嶺海舉道侔伊吕科立人之朝直道正言身之進退係乎天下之治亂蓋亦可謂百世之師矣彼為浮屠氏學既已出世而離倫而能崇敬先賢嚴其祀事顧豈可與淺見薄識者論哉自澄江師而下皆宜表著其功以勸來者安公隄記己丑至正八年僉福建閩海道肅政亷訪司事安侯以選為龍興路總管既至官均賦役簡獄訟旬月之間政令悉舉居無何連月不雨侯徧禱羣祀已而淫雨不止禱而又應江水暴溢居民幾致漂溺禱諸水神水遂息先是城西新坊水涸則徑湖中春夏溺則人馬俱病溺者不可勝數侯按視之喟然嘆曰修築吾職也欲命之屬吏則慮其並縁以厲民乃首出俸錢以為之倡屬諸翠巗寺住持沙門師知及集衆力為之曾未經時而隄成長若干丈當其要伐石為橋下疏水門行者恱與衆合辭請名曰安公隄郡父老以余鄰郡之諸生備官太史書事紀功乃其職業使為文刻石以記成績昔鄭公孫僑以乗輿濟人於溱洧孟軻氏譏其惠而不知為政何謂政徒杠輿梁是已侯之作是隄於是知為政矣皇上仁被四海憂郡縣之凋敝而鰥寡之無告更立保任之法而責其成功其急於為治之意可知已顧方今之郡縣輕重難易勢有不齊龍興江右一都㑹臨之行省以憲府可謂重且難矣以侯敭厯中外聲望素著畀以千里之任侯亦夙夜憂勤思殫其智慮以建立事功此其一也是宜書之以勸來者侯名謙字仲益江州路能仁禪寺三門記己丑江州城南隅有浮圖東魏天平二年沙門祖道瘞佛舎利其中貯以水精鉼金銀鐵石函䕶惟謹南唐李昇時軍師威烈公何洙廼作佛寺號曰福聖宋遣曹翰取江州屠其城寺以舎利所在獨免於兵燼天聖間賜額承天沙門智聡大加修葺尚書禮部郎中祖士衡實記之已而名師有若白雲端佛印元鐵靣感宏智覺皆相繼主斯寺號為叢林之盛政和七年改曰能仁紹興十一年龍圖閣學士蔣璨題其榜淳熙十四年有僧來自天台笑嬉怒罵類狂易者人目為風和上一旦與僧智聡富民巨賈為之興修事具洪文敏公所為記宋亡何公所施田在鄂之嘉魚者田人因而有之寺僧祖印本中宗溥應辨訟於官府弗直辨有弟子曰致堯始息田訟而専力造作人爭致財縣鐘之樓藏經之殿煥然興復郡人李貴和施田百有餘畝山若干畝今名曰福田莊致堯主寺事卄有七年而退休焉至正二年行宣政院以南康沙門師嚴學行淳備選為住持四方學者相慕而至乃修僧堂衆寮百爾器備而居者始安顧田入之㣲食莫能給郡人黄仁嵗以穀三百五十石貸諸田人取息以助寺僧惟惠經紀寺故所有田在虵口湖尾者六百有餘畝収粟以繼於是食粗給矣仁復以茶地若干及南郭思賢橋為施而然燈之費無復屑屑求諸市人六年夏大風雷雨壊三門乃遡江至荆州玉泉景德寺福祐倡施者出錢五千餘緡既還寺僧徳永亦以五千緡與師嚴之徒宏教購蜀良材至於荆值巨筏蔽江而下因得檜柏四百餘株以七年九月庚申經始中為屋五間東西各四間規制雄壯倍加於舊官府民庶知師嚴之公而能勤皆出錢助之九年夏丹雘甃磩訖工使宏教至京師求予記之師嚴之言曰吾佛氏之門曰三空無相無願三解脫也謂頓空我法不滯法相不存所願耳然斯亦曲垂方便欲其舎彼所滯深入一乗之門而已若無深造上乗十方世界一道塲也十方世界一門也十方世界一佛真法身也又有所謂三門耶予昔與師嚴同客金陵知其清苦好修不自表暴觀斯言也為其徒者宜於此有所悟入矣故因書其作門之役而并及之靜明書塾記己丑昔者四明袁正肅公提㸃江東刑獄行部信之貴溪作象山書院以祠陸文安公於徐巖其流風遺俗久而不冺故近世其邑有陳先生立大者出毅然有扶樹正道之志而世莫能窺其藴奥也其為學也上達乎性命之㣲致謹乎事物之細兢兢業業夙夜靡懈使先生用於當世推之功業固鑿鑿而精實然隠約於閭巷終以老死天也非人所能為也先生家有蔵書若千巻而繕寫㸃校手澤存焉又有所著論語正義卄巻其子善益自尊庋題其室曰静明書塾中設先生之像春秋嚴祀不逺數十里俾素為之記素天厯至順間數拜先生於家所以啟廸訓誘無所不用其情瞻其風采如孤峯絶壁莫可得而近也素之凡陋徳不加修而行義無以踰人嵗月不居侵尋遲暮仰思先生之盛心若何而圖報哉先生雖沒幸而遺書猶有賢子孫襲而蔵之天下後世之士有欲聞先生之言論風㫖而過貴溪之邑造其家拜其像讀其書為善之意如川方增浩乎其不可遏則先生之隂被於學者有不在兹乎乃為之記刻諸壁間翰林國史院經厯司題名記己丑世祖皇帝始御宸極建翰林之官至元元年爰置學士院四年更置翰林兼國史院階正三品二十年設典簿㕔以楊勛為之大徳九年院升正二品更典簿㕔為司直司設司直一員以陳景元為之都事一員王恭政為之皇慶元年院升從一品司直司為經厯司設經厯一員以田澍為之都事一員王璧為之至正元年復以經厯兼經筵參贊官此其沿革之大凡也九年夏學士承㫖威明公瑪南謀於僚友刻石載名昭示永久屬經厯闕汪古君圖沁特穆爾以勲臣家子選為都事好尚文雅力贊其成於是經厯司亦當有記石既具君屬素為述之素竊稽前代代言之官纂修之職皆號為清華之地國朝合而為一勢嚴而事重其贊畫幕府者簿書稀簡獄訟不聞一旬之間亦三至公署而已則朝廷之優容文臣亦已至矣仁宗皇帝蓋常申命擇賢以任之聖慮所及淵乎深逺非臣之愚所能測識然而居是官者其可不思所以報稱之哉儒英閣記己丑宋右文殿修撰致仕中大夫贈寳章閣待制諡獻肅柴公之六世孫季承作髙閣南溪之上以藏先世之遺書因其婣兄陳君汝賢至京師以我漳州府君有斯文之誼請為之制名素常讀四明袁正肅公銘公之墓有曰維是獻肅卓哉儒英則請以儒英名之陳君又以季承之意俾記其閣方公為吾州軍事推官韓佗胄枋國誣害正人以濓洛所傳謂之偽學轉運司移檄令自言非偽學始得為考試官公奮筆曰自幼習讀程伊川書以取科第如以為偽不願考校於後遷太學博士宗正少卿言事切直其守襄陽兼帥漕事提㸃淛西刑獄刺舉克當其在經筵所以陳說者皆崇正黜衺磊落明白袁公嘗引漢鮑宣之言朝臣無有大儒骨鯁白首耆艾魁壘之士議論通古今喟然動衆心憂國如饑渴者臣未見也惟公足以當此矣嗚呼兹其所以為儒英者歟然其時君惑於䜛衺使公用不盡其才儒英之效未著於天下非可惜哉素昔承詔纂修宋史嘗為公立傳則公之髙風大節足以震耀於後世而無恨焉公沒世百二十餘年而季承猶以詩書克世其家將繼世而為儒英為善之報其在兹乎素家去於越不三宿可至他日歸休田里拜公祠下讀其遺書登斯閣尚能為季承賦之蘭溪橋記己丑吾金谿東行四十有五里其地曰蘭溪昔産馬蘭俗又稱馬蘭橋馬蘭者紫莖翠葉一名澤蘭宋之末橋廢横木為畧彴車馬必亂流而濟惟徒歩者稍踐而過焉春夏之際溪水横溢則徃徃阻阨弗得進溪上有毛氏蓋自宋南渡後江寧縣丞諱辨之子弟由南城之龍䕃里實遷於此今二百五十餘年矣毛翁士謙之居與橋最近清池茂林相為映帯翁年踰七十而子息皆無絶孤處一室至正四年水旱疾疫並作翁病且革徃依其族人翼㑹翼方建西溪家塾以尊祖敬宗為先務哀而留居其中翁且去以其所居鬻於龍虎山曾君日省曾君更治室宇扁曰蘭溪寓所命其徒閩中髙昌宗守之曾君之族與先世之墳墓皆在金谿嵗時還家必道經蘭溪慨橋之久廢屬同里羅君義方請曰毛氏羣從常欲為之而未果就君得無意乎哉曾君輙出錢買石傭工屬錢唐州民匠提領毛君一䕫督治之於是一䕫亦資以粟米而諭其意於宗族隣里聞者輸財助力靡有難色曽未幾嵗而役夫告成無復病渉翼至京師語予曰願有記惟斯橋距余家為甚邇余之少嵗數過焉屢嘆夫民之未有餘力以及於此曾君學老氏者年在耄耋是舉也蓋無所為而為之無所為而為其心公而無私者歟是宜記之刻石道左後之仁人君子睹其將壊而修之庶幾曾君之善式克有繼而惠利於無窮豈非盛哉曽君字省吾毛翁字君實一䕫字君堯翼字遇順髙君字元適羅君字敬徳橋之成至正六年也九年四月甲子記信州龜峯瑞相寺記己丑信之弋陽南去二十有五里有山如龜南北望之則羣峯叢映歛焉如一東西觀之則兩山對峙南聳銳而獨立北馮陵而臂引睨其背則横亘峭碏如堅壁固壘冠首有堞靣其前則攢巒複㟧蟬聨星錯矗矗嶷嶷更相朝捧其將至也四視環合若無從而造焉既而縈厓繚岫斗折以入環以羣山而峯之得名三十有二一峯曰石蜃能吐納雲氣以占雨暘其中峯曰石龜唐乾寧中僧茂蟾作寺其下名曰靈勝至宋真宗改曰瑞相太子少保趙公抃龍圖閣學士韓公元吉皆嘗賦詩丞相陳公康伯請於朝更曰顯親崇福寺今復名瑞相其寺僧有闕於其學者子瓊光應重仁事載傳燈錄其有道而居是山者曰晦菴光雲菴慶曹原生山堂淳桕庭永孤雲權其由此出主名刹者徑山䝉菴聰雪峯螺菴肇觀其人則知其足以為兹山重也國朝延祐五年禪師從正主是山明年有鬱攸之變逾十年規制悉復舊觀又三年以老求退薦禪師徳學自代凡未備者徳學師俱致其力八年之間法席大盛至元五年復燬於火衆皆號泣道元容色弗變徐慰之曰此殆天數豈不聞成住壊空世間相也吾縁未盡當力復之何憂之有既而率諸好施者鳩工掄材以次興復雄麗倍於他日矣於是使其徒行觀來京師屬余為之記今國家崇尚釋氏崇墉峻宇徧於京邑大者縣官作之嗟乎勞民力而求福田豈佛之心哉觀夫瑞相之興獨因其州里之有餘貲者相與相成之則正學二師之行孚於其人可知已抑其山川之勝足以致其徒坦坦施施而來趨焉則繼傳燈而見於紀錄者將相望而出余故考昔人記其地形而述其顛末使并刻之懐徳書院記少昊氏之四世陶於雷澤虞帝求旃以為士師造律執中封于臯為臯陶其後封於英六今六安州也宋丞相晏公殊謂臯陶墓在焉州治之東古有臯陶祠地纔一畝後臨犴獄湫隘弗稱至正八年秋達嚕噶齊伯嘉納君與知州趙君孜協謀遷之規為書院博求其墓於民間屬軍千户將建公署於城東隅乃買地易之其勢靣陽後負崇岡東西廿餘丈南地倍之而多十餘丈二君率僚佐出俸錢具木石州民之好義者皆來助之為正殿左右廡講堂前門各四楹繚以周墻經始於是年某月日明年某月日落成成迺以書來屬素為之記素聞儒先之言曰唐虞之世道在臯陶嘗思之而莫究其㫖蓋當此之時在廷之臣徳之相似者伯禹及臯陶耳伯禹之勞績著於臯陶臯陶之知見則宻於伯禹伯禹之功天下所共知臯陶之功非虞帝與伯禹不知也禹即位之二年臯陶薨史記曰帝禹立而舉臯陶薦之且授政焉而臯陶卒而後舉益任之政斯言也其知帝禹之心雖不幸而不及君臨天下而黎民固已懐其徳矣是邦自臯陶分封之後至於今三千六百餘年始尊祀表章於今之賢侯亦可謂盛哉按臯陶之告其君曰慎厥身修思永惇叙九族庶民勵翼邇可逺在兹君子以為體用具備品節詳明即大學之道至於知人安民之論又必本於兢業信所謂朕言惠可底行此來學於斯者服行其言而深致其力將見人才蝟集用於邦國則書院不徒作矣伯嘉訥君於是州以清簡為治其民愛而親之趙君名進士以選來官於此故其發政知所先務同知何君城判官姜君權皆能克合其謀故并書之說學齋稿巻一
