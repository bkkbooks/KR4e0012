body:
  text: 説學齋稿卷四明危素撰送道士李九成序庚寅余未弱冠讀書於貴溪盧氏之館時盧尊師自間處玉清道館每休暇輒過其室尊師為之陳豆觴從容竟日而退則與其徒嬉逰茂林修竹之間彈琴焫香翛然不知世慮之牽人也後數年再過之尊師已仙去徘徊久之乃行及客京師驅馳塵土以求升斗之祿每讀剡原戴先生所著拂雲樓記思玉清之勝茫乎若弱水之不可度矣李君九成尊師之弟子也與余别幾三十年相見於輦下其齒後於余握手道舊故驚其鬚髮亦變余於是浸尋將老問向時逰從諸子則多物故吾視人世為何如哉昔者向子平宗少文志在山水之間以自娛適好爵不足以縻之余之不肖竊尚友其人於千載之上茍得乞身以去名山大川可以逰目而騁懷一日復尋舊逰之迹於玉清之館期與君踐斯言於他日未為晚也送鎦志伊采大元文乘序庚寅文章之有功於世尚矣烏可以為儒者之末技而輕之哉自宓犧氏之先吾不知其幾世幾年其間雖人事簡質風氣未開然載籍無所稽而鴻荒莫可詰由後世觀之無乃失之於野而非先王御天下之意也彼三墳八索九丘今不可得而見之矣詩書春秋具載四代之事帝王之功業於是乎可考其大凡於後厯世有史其文人有别集固汗牛馬而充棟宇逰於書林藝圃沛乎有餘哉國朝起北土而并天下號令所加海內臣服昭華延喜之珍蓋梯山航海而至府庫盈羡而民物阜殷古未嘗有也至於文章之盛視前古宜無所愧有國百年未有能博采而並傳者甚則散亡磨滅無復加之意焉向江浙行省參知政事趙郡蘇公稍編輯文類若干卷既刻而行於世宜春鎦志伊讀而嘆曰尊官巨人之文則既列於此其或抱道懷德而髙蹈於山林或守志厲行而自逺於聲利至於憔悴枯稿之士所以汲汲營營於文字之間冀是可以自見於寥寥千載之後而卒泯沒而無聞非可惜哉乃治裝發京師而其志將及禹迹之所至不盡得當世之文不為之止也吾徒日俟其成書使四方萬里皆知纍聖之深仁厚澤涵煦於區宇者殆百年矣故民生不識兵戈之苦而得以從容摛詞而弄翰其言皆足以鳴國家之盛然則志伊是行非有斯文之役而其功在於本朝矣志伊與余相好其行也序以送之至正十年三月庚戌朔臨川危素序送蘇縣尉序庚寅真定蘇卿伯常調保定行唐縣尉將行京師之大夫君相率賦詩送之卿亦過余而别昔余數以事道出保定之境時遇行者坐卧草間飲泣歎恨或曰吾所乘馬甚良為盜所奪矣或曰吾資財若干為盜攫去矣頃之縣尉率健卒若干人佩長刀弓矢馳馬疾若風雨問耕夫云嘗見盜否耕夫以不知對乃復還余再過其地詢之終不得盜私怪其地距朝廷近方國家天造草昧蓋有據西山以為畔亂旌麾所向係頸轅門方之今日之盜強弱衆寡固有間矣承平之久玩視法令使道塗之行旅惴惴憂栗如履不測之淵不可謂非有司之罪然而君子之論禦盜非難無盜為難捕獲誅斬政刑之末豈必用之哉使其革心而易慮改過而遷善其本於禮乎蘇卿嘗為太常檢討天子有事於南郊討論儀禮賜豫幣帛則固習於禮者其治盜於行唐也吾知其能使之無盜是以貴乎知本者如此夫黎省之詩序庚寅黎子省之自安南以使事至京師士大夫多愛重之及還録其詩一卷以遺余皆道中所賦其詞清而暢其旨婉而正蓋飄飄然有凌雲之思者也夫文章之傳儒者視之以為末藝然實與天地之氣運相為升降君子於此觀世道焉大江之南自疆宇分裂宋中世以來以詞賦試進士而安南亦倣而行之皇元諸巨公繼作力剗前朝之餘習駸駸然以及乎古故中州之士知有所趨向安南邈在炎海之中其始也亦漸乎晚宋之風數十年間朝貢之使相望於道塗故省之奮然欲盡掃其敝以追作者志豈淺近者所能知哉省之既行余謹藏其詩而為之序送夏仲信序庚寅京師衆大之區四方之士茍負其一藝之長一才之善逺者萬里近者數百里杭川輿陸自東西南北而至者莫有為之限隔人之生乎斯時可謂大幸矣然生質髙下言人人殊况其習俗不同趨向亦異修於家而壞於逰者紛紛然皆是也必傑然不沒於流俗庶幾有以自立焉廬陵夏君仲信其能自立者歟蚤從其從兄會稽令仲善北來仲善既調官南去而仲信獨留從辟用有稟祿即迎養其母已而復自力於學既而思曰昔者子路之去魯曽子俾之哭墓而後行吾其可久去墳墓乎乃治裝以行文人咸賦詩送之以豫觀於仲信可謂傑然不沒於流俗也夫仲信僦居鳯池之里左圗右史講學不輟自是益自勉焉成其德業所以顯親而揚名其亦異乎漫然而出修於家而壞於逰者矣安福周氏族譜序庚寅至正元年安福後林周氏九世孫浩字叔量修其家譜為例略十二章蓋自其先南唐御史矩由金陵遷西昌之爵譽里御史府君七世孫倩始遷後林皆在郡境觀其譜圗固已眀且盡矣素竊睹近世士大夫之家往往譜牒滅磨無所於考每為之慨惜叔量能追念先德致謹乎此可謂賢已然周氏之先出於后稷鄒孟氏曰稷思天下有飢者猶已飢之則其心廣大宏溥同乎天地故詩曰誕后稷之稽有相之道凡為后稷之苗裔者宜若后稷之宅心斯可也叔量之於其族念兵燬之餘譜圗之軼已五十年拳拳訪求而備書之推此心以達乎天下後世其亦庶幾后稷之心乎素之不佞亦后稷之裔也願與叔量勉之太行書院四詠序庚寅太行書院者國子伴讀獲鹿髙健文剛之所建也載道在經紀事有史羣言迭興百氏諸子緗帙牙籖卷以億以秭是以作教善之樓猗猗修竹卉木載芳亦有良朋來自逺方麗澤之兑講習有常是以作盍簮之亭聖學之傳維鄒孟氏養氣浩然要在集義室宇肇營名則久制是以作集義之齋太行之雲絪緼變化膚寸之生雨澤天下執友友旃春秋冬夏是以作友雲之軒孰記其樓御史中丞安陽許公也孰名其亭集賢大學士太原吕公也禮部尚書襄隂王公實題集義之齋而友雲軒者文剛之友安陽蕭貢士亢宗所寓也書院之學者童冠侁侁響然來臻登其樓有稽古之功憩其亭聆伐木之詠入其齋知進學之基處其軒契觀物之妙是故古之君子藏修遊息無往而非學者皆此類也文剛之布置經營其勤若是而豈徒哉而豈徒哉亢宗將請世之名能文章者各賦詩以揚其美而余為之序栁待制文集序庚寅天之生才所以資一世之用使之盡其才者天子宰相之事也千尋之木生乎髙崖深谷人迹所罕至之地匠石之欲營宫室者必即而取焉况於人才之足以為邦家立太平之基者乎詩曰藹藹王多吉士維君子使善治其天下國家者宜於此留意焉可也方仁宗皇帝在位崇尚儒術蓋朝廷極盛之時於是浙水之東有栁先生道傳出執政知其才用之於成均又用之於頌臺卓有譽聞及出提舉江西儒學滿秩而還家食者餘一紀今皇帝召還為翰林待制將進用之俄卒於官先生為國子助教監察御史馬雍古公薦先生可任風紀御史大夫特克實不從江西之還在朝之人有忌嫉之者厄而不用及公論開眀擢置館閣而公老矣故其所學百不一見於功業所以傳示來學者獨賴文章之存而已先生少厯逰前代遺老之門該綜百氏根極壼奧故其文雄渾嚴整長於議論而無一語蹈陳襲故蓋傑然於當時者也先生既沒門人戴良宋濓類輯為若干卷而屬素序之先生官豫章素以諸生見焉凡訓誘奬勵者久而彌篤知其得於天者不可謂薄而厄於人者往往若是是故讀其文而深惜其才之不盡用也宇文氏族譜序庚寅太史宇文先生公諒既增其家譜持至京師屬臨川危素序之蓋其先自成都寓吳興宋世多顯仕者端平以後蜀有兵擾不可歸而以詩書為世業至先生復收世科為名進士可謂盛矣後周書云宇文之先出自炎帝炎帝為黃帝所滅其子孫遁居朝野後大人普回因狩得玉璽以為天授故國號宇文遂以為氏李延夀曰宇文部出遼東塞外其先南單于之逺屬世為東部大人或曰鮮卑呼草為俟汾音訛為宇文若今木要甲訛稱為趙是也天台胡三省氏謂後周書為非而是延夀歐陽子宰相世系載俟汾之説而開封王應麟氏亦取之比嵗有旨修宋史素以經筵檢討備數史官求遺書江南見先生於錢唐其後先生以書言凡兩寄先世事狀而皆不及達史館故紀載之際頗有遺恨今譜既成先生身為史官當撰次家傳以傳於世可也夫以宇文既出於遼東塞外其文學政事照映今古由此觀之不必生乎中土然後為足貴耳古之眀王立賢無方者其以是歟先生字子貞元統元年進士送吳仲傑還豐城序客有問於僕者吾子楚人知龍淵太阿之為神乎僕應之曰晉人雷孔章云斗牛之間頗有異氣張茂先即補孔章為豐城令掘獄基得之於是拭之以南昌西山北巖之土光芒豔發置劍水上精光炫目至寶之不可祕藏如此哉雖然此物之可寶者若夫人才之所當寶客亦知之乎今有人焉其孝弟能追乎古人學問無愧於今人恂恂而不矜也屹屹而有立也亦産於龍淵太阿所出之地得不謂之寶乎噫龍淵太阿之為寶內以靖諸侯外以誅叛逆其用固可尚已人才之為寶所以安國家利社稷其為用當何如耶昔魏侯有徑寸之珠照車前後各十二乘齊侯曰寡人之所寶者檀子朌子黔夫種首此四臣者將照千里豈特十二乘哉夫龍淵太阿潛伏幽壤其氣激烈上干雲霄故遇知於識者況於人才之生寧能甘於晦藏而沒沒無以自見彼龍淵太阿之為神張雷二子識之矣若人才之出精於鑑裁者其誰乎吳俊仲傑秀出豐城蓋非物産之美獨能當其竒觀乎吳君之才且良誠世之所寶然而辭親而客於輦下者七年而無張茂先雷孔章之眀察世孰從而知龍淵太阿之為貴雖莫知其為貴龍淵太阿固自若也吳君與僕尤厚善故書與客言者以贈之貴溪鄭氏家譜序庚寅豫嘗患近世士大夫之族譜牒不具無所徴信夫人之生莫知所本始則與羽毛之類奚以異彼閭閻崛起之徒竄易傅會尤可哂也比客京師頗從四方之名士觀其家譜於是貴溪鄭咺宣伯出其所修世譜蓋自周厲王少子友至於後唐左押衙立始徙信之貴溪松洋里自立至於咺且十有六世咺之從兄弟之後又三世矣故其家譜號為詳備按押衙君之七世孫將仕郎晉始編為書九世孫宗學博士俊民十一世孫武昌令穰十二世孫鄉貢進士元齡儀鳯元芝十三世孫承直郎子顯旻十四世孫吉州軍事推官之秀鄉貢進士宗得之怡及咺之父貴相繼纂録則其詳備也固宜至其凡例所列有曰貪財為姻同姓為昏贓汙逆惡鬻其塋墓者皆削去其名夫以鄭氏世為衣冠之族詩書之澤為深且逺固安有如上事哉其作法之嚴不得以不若是也鄭氏在唐世為太姓厥今非有專官以掌譜牒顧安得鄭氏家有賢子孫如咺者乎余之先亦出自姬姓故咺俾序其首雲松隱者圗序庚寅雲松隱者西域彥修君之别號也孰為之圗祕書監劉君伯熙也彥修君世胄髙顯蚤逰成均厯官清要今與劉君同官為少監然襟度夷雅恬淡自將居京師修文坊恆杜門却掃留情詩書文藝之間嘗誦唐李翰林廬山巢雲松之詩而愛其山屹立江上飛泉怪石佳花美木往往而見昔賢之遺迹可以厯厯指數誠東南之名山奧區徒以縻於職守未遑置身其地故寄興是圗朝夕覽觀焉嗚呼世之人亦孰窺其髙致哉昔者翰林暫過九江雖嘗賞愛廬山而有青天芙蓉之喻亦曰吾將而已則其巢雲松之語終弗能踐今彥修君際國家盛眀之時駸駸日鄉於顯用其勢莫得遂其超然逺舉之志則雲松之號僅見其倣佛於圗畫爾若余之不才貪戀微祿於輦轂之下眷焉鄉邑實邇兹山於是及其強健乞身以去託迹煙霞水石孤迥寂寥之地則隱者之稱宜歸於僕吾彥修君果能讓之否乎劉君亦肯為之圗否乎送李文翔序至順間詔奎章閣學士院修經世大典申命禮部尚書庫庫擇善書者三十人以進是時號得人為盛學士賴其助為多天子將悉置諸館閣會升遐中書姑以儒學教授命之今銅陵縣主簿李君文翔其一人也君貢方物至京師間過余曰吾少逺逰及歸見宗人髙年者曰吾家本宋外戚和文之裔女真陷開封從髙年南遷僑居台之黃巖內附初兵火洊起故書無存者子嘗修宋史其能為我備陳之蓋余所聞李氏故上黨人自判右金吾街仗兼六軍司事贈太尉元靖公幼有至行鄉里推服劉知逺起晉陽次上黨史𢎞肇時為先鋒都校聞元靖名召署親吏乾祐初𢎞肇總禁兵兼京城巡檢多賊殺軍民左右懼稍稍引去惟元靖事之益謹及𢎞肇被誅獨得免郭威與𢎞肇素善即位訪求𢎞肇親舊得元靖謂之曰我與史公受漢厚恩戮力同心共奬王室為姦邪所搆史公卒罹大禍我亦僅免汝史氏故吏也為求其近屬吾將恤之元靖上其母弟福且素主其家盡籍財産以付福威嘉之以元靖𨽻柴榮帳下後見𢎞肇子孫必厚禮之初補供奉官從征高平以功轉供備庫副使改作坊使宗訓立命元靖告哀南唐還判四方館事宋初李筠叛命元靖帥師屯河陽攻大會寨拔之改澤潞南面行營前軍都監與石守信髙懷德羅彥環破筠衆於碾子谷及平澤潞遣元靖先入城收圗籍視府庫因請歸其父喪還京師許賜豫甚厚拜右監門衛大將軍充三司使從征李重進還為宣徽北院使仍判三司乾德二年拜樞密使五年加檢校太傅時劍南初平禁軍校吕翰搆亂軍萬餘亡命在其黨中言者請誅其妻子太祖疑之以語元靖元靖請盡釋之從征太原班師命元靖為後殿中道疾作命乘涼車還京師元靖叩頭言涼車乃至尊所御是速臣死耳固辭得免以讒人訟於太祖出為鎮國軍節度使六年召為左衛大將軍太平興國二年河決詔元靖按視出為雍貴潯賓橫欽六州都巡檢使尋移瓊崖儋萬四州都巡檢使麾下軍士咸憚於行元靖出帑藏數百萬悉分給之衆乃感悅時黎賊擾動元靖抵其洞穴撫慰以私財遺其酋長在嶺海四五年恬不以瘴癘為慮衆皆懷附代還拜為右千牛衛上將軍雍熙三年卒元靖生連州刺史知涇州諱繼昌字世長建隆三年蔭補西頭供奉官太祖欲選尚公主元靖固讓涇州亦自言不願元靖為聘婦太祖頗不悅開寶五年遷西京副使入為右班殿直東頭供奉官監大名府商稅嵗課增羡會詔擇廷臣有勞者府以名聞授西京作坊副使淳化中齊飢多盜調登萊沂密七州都巡檢使至道二年蜀賊王鸕鷀平餘黨猶據險為寇拜西京作坊使峽路二十五州捉賊招安都巡檢使旋改兵馬鈐轄賊酋喻雷燒以金帶遺涇州涇州偽納之賊懈不設備因掩殺之進西京左藏庫使咸平三年王均亂蜀與雷有終上官正石普同受詔進討寨於城西門賊忽開城偽遁有終等各以所部徑入涇州覺亟止之不聽因獨還寨賊果閉關發伏悉陷之有終等僅以身免涇州寨安堵如故所部諸校聞城中戰聲泣請引去涇州曰吾位最下當俟主帥命是夕有終馳報至徙涇州屯雁橋門三月破彌牟寨斬首千級大獲器仗逼魚橋門均脫走涇州入城嚴戒部下無擾獲婦女童幼置空寺中事平遣還其家以功領奬州刺史俄知青州入掌軍頭引見司景德二年帝幸澶州遣先赴河上散諸軍鎧甲遼人請和欲近臣充使乃令涇州與其使姚東之偕詣遼部俄與韓和同至行在尋擢為西上閣門使三年將朝陵寢以汝州近路衛兵所駐命知州事兼兵馬鈐轄大中祥符元年進東工閣門使以目疾求歸京師入對勞問再遣尚醫診視將真拜刺史復任延安表求休致不允改右驍衛大將軍領郡如故祀汾隂留為京城新城巡檢鈐轄改左神武軍大將軍權判右金吾街仗其子遵勛尚萬夀公主天禧初主誕日涇州過其家迎拜為夀帝知之密以襲衣金帶器幣珍果美饌賜之翌日主入對帝問涇州強健能飲食拜連州刺史出知涇州表求兩朝御書謁拜諸陵皆許之二年冬卒遣中使護喪以歸鄭伸者客元靖門下十餘年元靖待之漸薄上書訟元靖得賜同進士出身為酸棗主簿所謂讒人者也早死其母值嵗飢嘗詣涇州乞食家僮竟前詬逐涇州召見與白金百兩時人稱之涇州生和文諱遵勛字公武少學騎射馳氷雪間馬逸隊崖下衆以為死和文徐起亡恙也後舉進士大中祥符間召對便殿命尚萬夀長公主初名勛真以遵字闕為元靖孫授左龍武軍駙馬都尉賜第永寧里主下嫁而所居堂甃及瓦甎多為鸞鳯狀和文令鑱去主服有龍飾悉屏藏之帝歎喜命領澄州刺史謫均州團練使徙蔡州踰年起為太子左衛率府副率復左龍武軍將軍領宏州團練使真拜康州團練使給觀察使祿時涇州官刺史和文請班其下許之涇州得疾和文馳省不俟命帝遣使令乘驛赴之既還上表自劾帝使近臣慰諭之遷澤州防禦使又遷宣州觀察使求補郡自試出知澶州賜燕長春殿作堤捍河七日而成遷昭德軍節度使觀察留後拜寧國軍節度使徙鎮國軍知許州水軍多不練習和文簡拔十去七八後以疾請援唐韋嗣立故事求山林號詔不許天聖間章獻太后屏左右問曰人有何言和文不答太后固問之和文曰臣無他聞但人言天子既冠太后宜以時還政太后曰我非戀此但帝少內侍多恐未能制之耳嘗上三説五事以論時政晉國夫人林氏以太后乳母干與國政太后崩和文請置之别院出入伺察之以壓衆論嘗師楊億為文卒為制服及知許州奠億之墓慟哭而返又與劉筠相友善存恤其身後卒贈中書令諡和文子知澶州贈兼侍中諡良定諱端懿字元伯武康軍節度使知相州贈開府儀同三司諱端願字公謹安德軍留後贈昭德軍節度使諡恭敏諱端慤字守道良定通隂陽醫術星經地理之學七嵗授如京副使侍仁宗東宫尤所親愛嘗解方玉帶賜之稍長出入宫禁如家人七遷濟州防禦使為郡牧副使杜祁公為樞密擇外戚子弟試外官乃以侍中知冀州為政循法度民愛其不擾轉運使移州捕妖人李教教已死恩州王則據城畔人言教不死在賊中遂降單州團練使知均州改滑州兵馬鈐轄賊平實無李教者乃以為汝州防禦使提舉在京諸司庫務遷蔡州觀察使同勾當三班院徙華州觀察使以母喪起復為鎮國軍節度觀察留後願終制許之仍結俸命提舉集禧觀出知鄆州兼京東西路安撫使京東水民多飢大發倉廩以賑置弓手局教以戰鬬遂如精兵治汶陽隄以却水患民便之尋授定逺軍節度使知澶州不拜以留後知澶州卒帝方宴禁中聞之為徹樂賻以黃金三百兩贈威德軍節度使諡良定再贈兼侍中開府以穆獻公主恩七嵗授如京副使四遷為恩州團練使仁宗以嵗旱御便殿慮囚放宫女開府上疏謂縱釋有罪小人之幸放宫女為宦者専制反失所歸何以弭災變纍進邢州觀察使鎮東軍留後知襄郢二州本路轉運使獻羡財數十萬被賞開府言常賦三折其民不堪即上其事帝怒奪轉運使賞申折變之禁移廬州富鄭公謂曰肥上之政何以減於襄陽開府曰初官喜事飾厨傳以干名則譽者至更事既久知抑豪強制滑吏故毁隨之弼深然其言英宗初同提舉在京諸司庫務帝以疾拱默開府求對進曰陛下當躬攬權綱以係人心不宜退託失天下望拜武康軍節度使知相州請歸授醴泉觀察使神宗即位遣使即家録取異時章奏賜詔褒之河東城囉烏開府手寫趙普諫太祖北伐疏以聞連年請老以太子少保致仕凡大禮成賜金帛器幣品數視執政哲宗嗣位進太子太保欽聖皇后以甥舅之故嘗幸其第禮獻穆祠堂命近侍掖開府勿拜元祐六年卒帝輟朝臨奠賻典有加贈開府儀同三司恭敏官左藏庫使執獻穆喪辭起復詔特給俸纍遷東上閣門使幹辦三班院嘗侍羣玉殿仁宗獨賜珠花飛白字寵顧特異知邢冀衛三州至蔡州觀察使元祐中以安德軍留後卒贈昭德軍節度使諡恭敏初良定在嘉祐時嘗密請建儲人無知者元豐間恭敏袖舊稿上之神宗歎曰近世之賢戚也良定子成州團練使知蔡州諱評字持正少涉書傳嘗以公主遺奏召試學士院及殿中丞意不滿辭之後二年再召試復止遷一官愈不悅由東頭供奉八遷皇城使以父告老授西上閣門使為樞密都承旨出使陜西河東還言鄜延之人皆謂城囉烏非便乞速撤毁解一路之患師出安南調兵及河東又言王師南征而取卒於西北使蠻聞之得以窺我以榮州刺史出知潁州還幹當三班院使契丹分畫河東地界幾二年乃決賜袍帶金帛以賞勞進成州團練使知蔡州卒贈冀州觀察使賜白金千兩此文翔先世事也李氏從髙唐度江家於山海曠絶之地百有餘年宋失其國宜其不足取徴文翔雖為學官於汳則又五十年矣此其志之可悲也夫傳曰公侯之子孫必復其始文翔在館閣與一時之名勝逰討論國家之故實况於更練之熟閲厯之深足以自見於當日公侯復始吾於文翔蓋日望之故備書所聞以為贈定武王氏族譜序辛卯王氏盛族也其出不一有媯姓有姬姓二省雜姓四定武之王莫知其所本其可考者自仁遇始仁遇生顗舉宋寶元闕年進士為隰川尉贈太子太保隰川公生子三人皇祐間皆舉進士長子僅終水部郎中知雅州贈太子太傅雅州公生孝孫知代州五臺縣贈太子太師五臺公生安中元符三年舉進士厯官二府而定武之族益大豈獨其富貴烜赫於一時哉素嘗讀初寬集而竊考清源公之行事直道正言無所回撓其論權姦蔡京以為欺君僭上蠧國害民天下韙之及開北邊京父子合謀謂公名望大臣可使鎮撫新附之邦乃出為慶逺軍節度使河北河東燕山府路宣撫使知燕山府徽宗之暗不疑其姦何異顔太師之使李希烈也然公所陳之事灼見幾先而其君不悟卒至宗廟邱墟生民塗炭公之立朝大節足以信於後世矣今天子詔修宋史史官為公立傳既已奏御可謂發潛德之幽光窮天地亘古今而不朽後之為人臣者可不監諸公八世孫漸能文章與素邂逅吳中備道其家世之懿漸從弟晉貢於江西來上春官出其世譜俾素序之因書其後至正十一年二月壬寅臨川危素在京師金臺坊僦舍書先天觀詩序辛卯先天觀詩一卷自翰林學士承旨楚國程文憲公而下總若干人方曽尊師貫翁為此觀擇山水之勝而亭臺髙下位置各適其宜逰山之君子不及至者以為恨學道之士尤樂其喧囂之逺可以離世而獨立也素之叔父功逺甫少從尊師學在京師以觀之圗及四眀戴先生所為記求題詠於朝之名卿大夫清河元文敏公與先叔父為莫逆交得記文手書一通南望再拜曰江左之文章猶有斯人乎太史臨江范公德機之詩曰玉堂學士危與吳謂先叔父及玄教宗師鄱陽吳公也元公親題其後深加贊賞元公學問傑出中州然挾其才不多讓人即此可以觀其揚人之善尚有古人之風焉當此之時國家承平以文物相尚名人巨公畢集輦下雖一詩之出必各極其所長期於必傳而後已故范公與太史浦城楊公仲宏豫章揭文安公之詩皆作於布衣之時其後雖為顯人今讀其詩亦非率爾而為者先天觀聞於四方萬里豈不以其詩而傳歟自薛真人玄卿以來詩若干首則尊師十數世孫毛遂良叔達所求初叔達至京師俾素賦之素辭不敏安敢繼諸公之作求免於瓦礫之譏後十年叔達將請於其師遁教宗師劉真人耕隱刻梓以傳又屬素序之惟尊師行義甚髙與開府玄教宗師張公居同邑定交貧賤時張公既遭逢國朝寵遇甚盛數招之不至其沒也僅藏宋髙宗書隂符經及此卷爾張公祭之以文曰偉哉斯人秉是正直則尊師之為人可知己他日仙者金蓬頭結草庵觀旁獨居草有六年素屢宿庵中聞松風澗水之音清清冷冷有髙舉逺引之志顧竊祿於朝侵尋華髮讀諸公之詩恍若夢逰塵湖之上其能無感於其中乎臨川王氏世譜序辛卯臨川王氏世譜一卷宋纍贈太師中書令兼尚書令英國公十三世孫允升所藏也昔荆國公昆弟以政業文學克大其家厯世滋久而子孫多散居他郡素郡人也嘗求其譜於祠堂蓋詳於前而略於後至金陵訪之亦不可得以屬諸名垕字載之者垕杜門鍾山讀書養親數有書問而不及此允升自其七世祖德慶史君卜居諸暨而未遑一歸臨川來逰京師出示此本猶其先世手澤素留之數年謹録而藏諸孔子謂夏殷之禮皆能言之而嘆丈獻之不足徴然則斯譜之存係於吾邦文獻豈可忽哉三皇祭禮序辛卯皇帝御極之十有七年詔祀三皇遣大臣攝事三獻用樂著為令從江西湖東道肅政亷訪使臣文殊納所請也臣素供奉翰林嘗定撰樂章太常博士臣任栻爰制樂名御樂局大使臣盧亨審其音律就正於禮部尚書臣趙璉乃以上聞臣素調官奉常為博士竊思既隆其禮宜定著儀文頒行郡縣屬臣栻拜監察御史因討論典故為祭禮一卷敘曰昔孔子之傳易繫辭敘宓犧氏神農氏黃帝氏裁成輔相之功大矣蓋有先天地開闢之仁後天地制作之義利及於千萬世之久雖竭四海九州之奉曽不足以圗報萬一禮曰法施於民則祀之孰有先於三皇者乎然而三代以來卒莫之能行報本反始何其闕然唐玄宗僅置廟京師宋太宗祭宓犧於陳神農於亳黃帝於防而已郡邑遍祀咸秩無文未有盛於我皇元也在至元初以醫家專其享祀議者謂三聖人之功之德含齒戴髮者皆所當尊而事之豈獨醫家所得專之耶由元貞以來臣僚間嘗以為言有司漫不之省今皇帝克承丕緒嚴恭寅畏事神治民者靡不盡其道故斷而行之於乎盛哉臣素蒙恩幸被任使與聞禮樂之制作顧以非才惡能上副聖天子敬祀神明之意臣實懼焉姑識諸篇端以示來者廣信文獻録序辛卯信東南大郡也其山竒拔其水清寫其鍾而為人有文章尚節概自唐吳武陵父子及校書王貞白啓其端緒至於宋室南遷中原故家多僑寓於此而士習益盛由僉書樞密院事張公叔夜直祕閣知同州鄭氏驤以來皆能仗節死義尤足為是邦之重矣余鄰家貴溪之境少讀栁儀曺作吳君文集序奬譽備至余往求之卒不可得而武陵之文亦復不傳及被命修宋史信獨無一字送官攟拾他書僅成數傳其間闕遺固亦多矣蓋州縣無良吏家無賢子孫使忠賢泯沒史家有遺恨非可惜哉永豐士舒彬文質時客京師睹其事而慨焉乃發憤還其鄉網羅散逸得昔人所為文辭久而會萃成編題曰廣信文獻録文質居貧方汲汲於養而寢食之間不忘乎此訪求故家世族至於浮屠老子之宫殘碑斷碣無不搜輯衆頗非笑之而文質不畣其老師宿學及聞前代故實者則曰盛哉文質之舉也已而日積月纍可以更考見數縣之事及再逰京師假公私書補其未備而所得益富而文質將還江南遍求以紀載之向使廣信之人皆有志若此則吳氏父子之文安得并與飄風遊塵一歸於昧耶余故嘉其篤於好古而為之敘廣信桂氏三世文集序辛卯廣信桂氏自司空公顯於五季宋初其後以儒學擢科第者數世我陸文安公稱其族盛而尚禮法宋忠臣謝公君直母家也余至治間客逰貴溪之境始聞桂氏伯仲以文學為鄉先生乃齋沐修頌伏謁門下於是淡圃先生武仲方頤白鬚類古君子不以余為少年揖讓為禮甚恭猶扺掌談謝公言論風旨使人毅然有立志退則從其子林伯遊而林伯方覃思經術思有所著述以翼衛聖賢之道而不務茍阿於時好蓋余少林伯十有四嵗林伯之子孟又少余六嵗而孟天才飄逸文采曄然尤為稱其家者也其後先生即世余亦以家貧干祿久而不能歸間數嵗而林伯與孟則以書道其殷勤友誼甚篤也乃者孟之子訪余於京師其名曰庸其年亦幾三十余於是見桂氏四世而亦將衰矣庸槖其曽大父大父父三世之文請曰吾子於我有世契願序而傳之余讀孟東蒙之詩其四章曰內充既和外形載方相時允塞退休式康其六章曰聖軌有卓刪述是儀爰指我的眀德是持所以述贊其大父尊府君可謂善言德行余之不佞誠不敢易其辭孟承其家學之緒故其文辭有作者風昔人三世有集以為儒林之盛事乃今於桂氏見之何其懿哉庸遊於成均謹重而力學使豫未老并讀其四世之文豈非餘生之幸故書以為序果囉羅易之金臺後稿序辛卯易之金臺前稿余既序之矣及再至京師又得後稿一卷為之論曰昔在成周之世采詩以觀民風其大小之國千有八百西方之國豳得七篇秦得十卷而止夫以雍州之域實在王畿自豳秦而西未見有詩豈其風氣未開習俗不能以相通也歟易之果囉羅氏也彼其國在北庭西北金山之西去中國逺甚太祖皇帝取天下其名王與輝和爾最先來附至今已百餘年其人之散居四方者往往業詩書而工文章易之伯氏既登進士第易之乃泊然無意於仕進退藏句章山水之間其所為詩清麗而粹密學士大夫多傳誦之然則果囉羅氏之能詩者自易之始此足以見我朝文化之洽無逺弗至雖成周之盛未之有也昔余客鄞為文送易之北來以為祖宗取天下豐功大業宜制樂歌薦諸郊廟易之之才足以為之聖君賢相制禮作樂豈終舍吾易之者哉衛氏族譜序辛卯衛本周文王子封初食邑於康武王封紂都之東國至秦二世始廢其君角為庶人其後散處四方今可考而知者曰合陽派其初祖忠傾曰夏縣派其初祖宋酆州士曹勳曰興元派其初祖唐將軍志忠曰華亭派其初祖誨誨六世孫闐宋政和八年舉進士仕至左朝奉大夫通判鎮江府纍贈太師魏國公其長子時敏通直郎知仁和縣生三子曰溉朝請大夫直祕閣知處州纍贈宣奉大夫曰洵迪功郎海鹽縣主簿曰洙嘉定七年進士朝請大夫户部郎中兼闕司郎中若淳熙十一年進士及第參知政事纍贈太師秦國文節公涇則魏公次子季敏之子也户部公之玄孫鐘久居京師念宗族之遐邈命其子好義增修世譜屬余為之序余嘗以事過華亭訪衛氏子孫聞其賢而有文者其字立禮杜門不與人接且將二紀欲問其故家遺事卒不可得猶幸因鐘而稽其世緒之詳蓋華亭之衛莫盛於宋世變以來衣冠之族往往淪替譜牒散亡而傳聞荒忽而衛氏之後獨可徴信如此異哉夫人事之得喪一去一來者天也至於上承詩書之澤下為曽玄之計厥有道焉昔康叔之始封武王告之以祇遹文考又曰敷求殷先哲王曰丕逺惟商耉成人曰聞由古先哲王説者曰近述諸今逺稽諸古不一而足以見義理之無盡斯言也凡康叔之裔皆可服行之矣鐘之北遷混於闤闠而不為習俗所變知教其子吾知衛氏之必復其始故序以徴之眀倫傳序辛卯明倫傳五十卷曰君道父道母道子道婦道夫道妻道友共交友師生家臣僚屬知舉凡十五門蜀郡楊君三傑之所著君既序次之而列其凡例於前監察御史以君書有補於世教薦之於朝集賢翰林禮部議以克合中書移江浙省刻其書蓋嘗求君著述之意以為人之處人倫之常可能也至於處變而處其變者不可能也且常而至於變固人倫之不幸素其位而行顧不在於我耶然而未易言也非格物之深使義精而仁熟固不免於毫釐之差千里之謬過與不及其失則均君為之書誠足以資學者格物之助譬諸養生之菽粟治病之藥石其可闕哉抑先王之澤既熄數千年間議論之未當處置之失宜經權之不眀性識之昏蔽雖處君父之尊尤不能眀乎臣子之所當為況於其他乎此書之盛行於天下家藏而人誦之彛教庸行具有成法因時制變不失其常豈待權然後知輕重度然後知長短君著書之功於是為大若是而猶陷於偏黨而不自覺無乃自暴自棄之甚者君亦末如之何矣君在京師數與余論天下事觀其練達政務而沈毅有為則其書非直為空言也乃序而歸之君字曼卿元氏世録序壬辰唐之末世盜賊蜂起黃巢黨栁彥璋陷撫州先南庭府君昆弟戮力平寇攻彥璋於象牙潭斬黃可思李道謙禧宗嘉其功授府君刺史府君之弟諱子昌為新州刺史再授虔州刺史改弋州刺史加饒州制置使楊行密自稱留後遂自為淮南節度使及其子渥偽稱吳改元隆演盡陷江西州縣弋州府君依吳越錢氏梁貞明三年十月六日卒年五十有八弋州府君二十二子其十一人德昭易姓改元氏從吳越王錢俶歸宋事見宋史宋以德昭為右僕射兼侍中晉國公生九子幼子守文咸平進士官止大理寺丞知白州生子絳天聖五年進士神宗時參知政事官至正議大夫魏郡公太子太師諡章簡生二子耆寧耆弼五孫延祖似之紹京紹直紹著曽孫之可考見者曰康曽自章簡公二子而下其厯官皆莫得而詳五孫亦不知耆寧有子若干人耆弼有子若干人康曽者亦不見五人之中孰為其父弋州府君子草一人晉國公為最顯曽未七世已漫不可稽而欲求草一人之裔愈難知己自易姓以來危氏有諱清臣者嘗與章簡公以詩敘宗盟章簡公亦歸南城界潭省墓刻石永福僧寺至尚書都官員外郎右正言諱佑章簡公實銘之章簡公故第在平江之帶城橋至正四年素以事道出平江遍詢其後無有能言者徴諸吳郡志亦無一字及之括蒼潛安撫説友尹臨安作郡志頗載其事平陽張君仲舉與素同官史館間語素曰杭之新城有儒者元姓自謂與子同出信乎素喜甚會大梁段君吉甫亦在史館將還錢唐亟以此事屬之段君三使人訪諸新城終無所聞章簡公墓在錢唐縣履泰鄉之鳯皇山北庭觀驢君元賓以選守杭元賓與素有交誼以是為請諾焉及紅巾賊起杭城陷素備官於朝不能即還江南因稍列其譜圗而附以金石簡册者為元氏世録一卷用藏於家他日續有所聞當備紀焉以見夫宗族之誼雖逺而不可忘也玉堂集序壬辰昔我太子太師章簡公以世家子登宋天聖五年進士甲科厯仕州縣號為清強神宗既更庶政欲慎選詞臣宰相王公安石對曰有真翰林學士但恐陛下不能用耳元某是也時雖作龍圗閣學士難下遷知制誥遂自外遷翰林學士其制書詔令純深溫潤抒思深長長於應制神宗深加賞激至於碑表詩歌之文無所不精丞相蘇公頌論公持論前言往行講尋源流或推究天人善惡之應叩其所屬往往更相推許由是知公之學豈可以淺近窺哉素之先世藏公玉堂集讞獄集等書兵燬之餘無復存者及客京師得玉堂集二十卷於翰林國史院公庫因假傳鈔蓋為學士時代言之作也又從鬻古書者得玉堂詩集十卷餘所得者鹿苑寺記等文數篇而已謹序而藏之凡所以頌公者皆非一家之私言也自公之沒二百六十餘年吾宗詩書之澤猶未至於斬絶者抑公有以振起於其前歟後之人讀公之書尚無怠於世業可也送許巡檢序壬辰至元間漳之南勝寇作郡民往往結寨以自保長泰有寨曰天城居民最多而逼於賊龍溪士許君存衷傾資募兵擊賊亡算遂解其圍天城之民不至汙染而父子兄弟夫婦獲相保以生存衷之功也事平存衷恬然不自言後十有四年憲帥兩府薦授南勝定南寨巡檢將行過豫執别蓋自寇平之後多以功狀來上若今永春尉胡君長泰主簿方君豫嘗與論事知其才足以有為皆為文以送之矣存衷以一介書生奮勢不自顧而力與賊抗以衛其民非灼知大義之所在其能然耶此豈與武夫悍卒同日而語哉昔者竊議之中州江南歸於版圗者厯嵗滋久國家之法制莫非以惠安元元為本然而盜賊之竊發或連數城其故何歟守令之失職武備之不修有以致之然也閩粵去朝廷萬里方盜之起警報上聞非旬日不可達及選將用兵聲罪致討而賊勢益張誠宜使其民自相為保謹斥堠置烽燧聲勢相倚而緩急相救則盜雖劇可平矣古者寓兵於農其意或出於此顧以百萬之師使之長驅逺征寒暑之異候飢渴之失宜吾未見其利也況於州縣困於送迎黎庶疲於供給故曰莫若民為保為計之善漳之禦寇已試之眀驗何憚而不行哉向也存衷之處布衣捍禦之功已章眀若此今為王官以捕盜為職業功名之立將兆於斯行大夫君子其得無言以送之乎浸銅要略序壬辰德興張理從事福建宣慰同考滿調官京師會國家方更錢幣之法獻其先世浸銅要略於朝宰相以其書之有益經費為復置興利場至正十二年三月某甲子奏授理為場官使董其事理持其副屬余序之序曰錢幣之行尚矣然而鼓鑄之無窮産銅則有限理之術乃能浸鐵以為銅用費少而收功博宜乎朝廷之所樂聞也當宋之盛時有三司度支判官詩申能以藥化鐵成銅久之工人厭苦之而事遂寢今書作於紹聖間而其説始備蓋元祐元年或言取膽泉浸鐵取礦烹銅其泉二十有二五日一舉洗者一曰黃牛七日一舉洗者十有四曰永豐青山黃山大巖橫泉石墻塢齊官塢小南山章木原東山南畔上東山下東山上石姑下石姑十日一舉洗者十有七曰西闕焦原銅積大南山橫槎塢羊棧陲旻冷浸橫槎下塢陳軍罏前上姚旻下姚旻上炭竈下炭竈上何木中何木下何木凡為溝百三十有八人政和五年雨多泉溢所浸為最多是書理之先贈少保府君諱潛所撰以授其子贈少師府君諱盤成忠府君諱甲少師之孫參知政事忠定公諱燾實序志之我武宗皇帝詔作至大錢理之從祖諱懋與理之父諱逖以其書來上皆命為場官未及鑄印而場司罷至理復因是蒙被異恩幾於古之世官惟其父子祖孫專於一事其講之精慮之熟可知己何患乎冶鑄之無功寶藏之不興哉雖然生之者衆食之者寡為之者疾用之者舒顧上之人力行何如耳昔者張氏若贈少師諱根著述傳學者忠定公事業在信史公侯復始將在乎是異時之所立當不止於此也理字伯雅潏水集序壬辰潏水集四十卷宋中大夫集英殿修撰李公之文也公諱復字履中世家開府之祥符其先人纍官關右遂為京兆人公年十有六取國學解自以年少十年不試禮部方刻苦學問元豐二年登進士第不就制舉宋用兵靈夏時相誘公為侍從公毅然卻之邊臣請造戰船戰車公則又力疏其非役乃罷其節概之粗見者若此所藴之大者固未試也參知政事觀文殿學士吳越錢忠肅公從公之孫龜年龜朋得公文集將刻而傳之不果錢公之孫左丞相成國公象祖稱公學問淵源文章爾雅議論醇正淳熙九年守信州乃刻於公庫以成先志今百七十年矣素少讀夏書建安蔡氏於禹貢導河積石之下引公數言且謂公之學甚博自是欲求公他文久而弗得比供奉翰林始獲讀公全集猶是賈丞相似道家本廣信舒彬文質以書來言曰吾郡所刻潏水集僅存而多所脫落彬逰京師遂摹刻其書以來彬又從儒學假舊藏本補其闕以遺素仍假翰林本校定然彬與素皆貧恨力不能完其版姑序識之使吾後之人知先正之文日就湮沒其難致如此彬之髙誼詎可忘哉公嘗謂漢唐之文人皆竭其精思自謂濶步一時曽何所補亦小技而已其志必欲發道之奧眀理之隱求其文之可傳也永豐王氏族譜序壬辰廣信王君志道以其家譜示余於京師曰此大母俞夫人手筆也吾少孤大母鞠而教之七世祖朝奉府君家訓八事亦書於譜尚書韓公無咎內翰洪公景盧為府君挽詩書諸壁間夫人懼夫壁有時而壞則又書於譜若夫人之於王氏承家啓後之意何其懿哉素昔修宋史知君之先有大勳勞欲為之倣歐陽譜法撰次為書請以夫人手澤櫝藏於家廟顧旦暮驅馳有不暇及君將歸江南乃以序為屬敘曰王氏其先琅琊人轉徙大名成安其可見者唐末處士肇肇子景為洛州録事贈將作監將作子遷贈光祿卿光祿生明遭宋之興克樹大業為推誠翊戴功臣贈太子太傅其後仕者相踵而起其居永豐者由太傅四世孫同始至君又十有二世矣夫以太傅際風雲之會功名顯赫著在彛鼎厯數百年之久而胤胄繁衍厥有其由方其將兵數萬下江南兵至洪州不妄殺人市不易肆革李氏之敝法而薄其賦稅嗚呼此豈武夫悍將所能哉至若朝奉之訓不可起無益之爭興無故之訟骨肉自相吞噬用度過為侈靡輕棄祖業謀拆故居廢四時祀先之禮忘在庭義方之訓其為言至簡非獨王氏可以服行之凡為人子孫者以是更相告語則興者不能以遽廢廢者亦可以使其興也敘其譜而推本其原而及其先訓亦所警夫世之人且以自厲焉文殊師利菩薩無生戒經序癸已梁武帝時菩提達摩至於金陵問答不契折蘆渡江留楞伽經曰此可傳佛心宗震旦之人有為佛氏學者敬信而誦習之因是而開悟者未易悉數蓋天竺距中國十萬餘里言語不通文字亦異則其書之未及翻譯者尚多有之不獨楞伽而已皇元泰定初中印土王舍城剎底里遜曰指空師見晉王于開平論佛法稱旨命有司嵗給衣糧師曰吾不為是也因東逰髙句驪禮金剛山法起菩薩道場國王衆諸臣僚合辭勸請少留師乃出文殊師利菩薩無生戒經三卷欲使衆生有情無情有形無形咸受此戒聞者歡喜諦聽血食是邦者曰三嶽神亦聞此戒卻殺生之祭愈增敬畏師之言曰直指人心見性成佛我道則然説法放戒老婆心切故是經因事證理反覆詳眀讀者若楞伽之初至嘆息希有嗚呼五濁惡世其人之迷謬已甚不有以警動開諭之終無以為入道之基矣師之學得於南印度吉祥山普明尊者天厯皇帝詔與諸僧講法禁中而有媢嫉之者窘辱不遺餘力師能安常處順湛默自悔居無何諸僧陷於罪罟師之名震暴中外四方信向彌篤今皇帝眷遇有加資政院使薑金剛既施財命工刻是經以傳門人達藴請豫為序上都分學書目序癸巳開平距大興且千里大駕嵗一行幸恆以仲夏之月至及秋則南還故百司之扈從者驟往倐來無復久居之志在上者固簡其約束而弗遑有所程督國子監嵗以助教一員佩印分學學正學録或一員伴讀四人實從諸生之在宿衛或從父兄多至數十人以稟給庖𨽻自隨學館即孔子廟西北為之逺絶塵囂人事稀簡助教專於教事非休假不出户可以稽經諏史探索精微之藴百司扈從者求如分學之安適亦云鮮矣至正十三年助教廬陵毛君文在實在行中乃節縮餐錢之羡購書一千二百六十三卷為三百五十册置於分學蓋上都書最難致昔賀涇陽王為留守嘗遣教授董君買書吳中藏於學宫刻書目於石凡文臣之嗜學者往往假讀之比還必歸諸典守者先是分學亦假其書或他司已假則不可得有志於競辰者甚為之惜顧分學買書自毛君始繼至者將嵗嵗而增益之當至於不可勝算諸生學古以入官治心修身一徴諸方册毛君之功夫豈少哉祭酒魯郡王公移牒開平府俾以其書與儒學舊書並藏置書目一藏崇文閣一藏開平儒學一隨分學而余序其端是年分學者學録李文伴讀劉夀張儼苑致陳信也艾蜚英竒納克實山百韻詩序乙未余好考求宇內山川風俗物産獨北方無載籍至其地者往往不能言雖言之不能悉也往年古田主簿番陽蕭澄嘗為和寧學官出其所撰和林賦又有李生者亦番陽人為兵馬司吏其人儒者頗記録其槩余將撰次為和林志顧有所未暇爾同郡艾君蜚英為內史府掾史甘貧勵行氷蘖自持同列疾其異己令式百司官曺凡後至者當逺役君名最居上乃令分府北行聞者為之不平君欣然曰吾壯逰之願畢矣即日就道館遇竒納克實山下暇日因登是山作詩百韻千言以紀述其勝至正十一年季春之月也後五年孟秋之月君為左警巡院判官與余皆謁告養痾録其詩相寄鋪張皇元之豐功大業此固余之素志又足以助成其書故幽憂之疾為之灑然以蘇君之為惠者至矣古人有云登髙能賦可為大夫其君之謂與因書其後以歸之杜氏世譜考異序乙未至正八年天台杜君昌閭奉其世譜航海以達京師俾史官臨川危素為之序素以杜氏世大族何以序為君自是相見輒以為言乃取其書玩繹之有未盡合者因旁稽他書著為杜氏世譜考異一卷敘曰昔者周成王封其弟叔虞於唐唐子孫改封為杜其後宗族散處他國隰叔奔晉為士師因為士氏會食邑於范又為范氏故宣子謂魯叔曰陶唐氏御龍氏豢龍氏豕韋氏唐杜氏范氏皆其祖也杜氏之後泄適魯為大夫出奔於楚生大夫綽綽生段段生赫為秦大將食邑於南陽衍子孫因居焉世稱杜衍赫三子上黨太守秉生南郡太守札札生御史大夫周唐大厯七年安平公顒六世孫太子賓客信嘗修譜宋中興館閣書目猶載此書則嘗刋行於世矣以司徒岐國安簡公之善著書羅絡古今號為精密未遑自修其譜何耶歐陽文忠公有言自春秋諸侯之子厯秦漢千有餘嵗得不絶其世譜而唐之盛時公卿家法存於今日惟杜氏則其譜宜最為詳盡而猶有所抵牾學者之欲考求故實夫豈易言哉素嘗求史館遺書於行者過越問祁國正獻公之後無有也至黃岩得太子贊善梓州通判誼丞相清獻公及其子滸之事刋諸宋史又嘗撰世德之記以遺君考異之作抑亦見素於杜氏深致意焉他日君歸其鄉搜訪考訂使歸於一是山林之下宜有好古博雅之君子以補素之不逮云爾説學齋稿一百三十三首豫前三十年從吳純甫借觀今吳氏之書往往散失豫一日忽憶此書亟問其家幸而尚存為之甚喜蓋公所自書前有臨川危素太朴著七字而篇别不為聨卷紙尾皆暗記所作年嵗獨以賦頌贊記序為次以此知公自珍其文若此蓋録藏之以待編次者也然尚有其半而軼矣説學齋稿者亦豫向時所見標題亦公之真迹今復脫去昔宋太史稱公在至正中以文名天下淵深精純獨繼歐虞之後豫家苦無書而公集五十卷尚未之獲見故命童子録而存之嘉靖三十八年六月癸亥歸有光跋説學齋稿卷四
