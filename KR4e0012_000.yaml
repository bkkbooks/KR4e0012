body:
  text: 説學齋稿别集類五明提要臣等謹案説學齋稿四卷明危素撰素有草廬年譜已著録據千頃堂書目其文集本五十卷明代已散佚不存此本乃嘉靖三十八年歸有光從吳氏得素手稿傳抄其文不分卷帙但於紙尾記所作年嵗皆在元時所作有光跋稱共一百三十六篇此本乃止一百三十三篇又王懋竑白田雜著有是集跋稱賦三贊二銘二頌三記五十有一序七十有六共一百三十八首以有光跋為傳寫之誤然據懋竑所列實止一百三十七首數亦不符殆舊無刋板好事者遞相傳録故篇數參差不能畫一實則一本也素晚節不終為世謬笑其人本不足稱而文章則歐虞黃栁之後屹為大宗懋竑跋稱其文演迤澄泓視之若平易而實不可幾及非熙甫莫知其深其珍重鈔傳蓋非漫然矣乾隆四十六年四月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:c74bfa2ae76a3d4c13c1b4fc4489e83f83efde4c91ce9535918b7dc545ed15e2
