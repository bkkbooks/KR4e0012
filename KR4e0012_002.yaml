body:
  text: 說學齊稿卷二眀危素撰王左山房記庚寅王左山房者友人劉君景陽所居之室也君所居距樂平東三十有五里曰劉坊又曰流芳劉氏由大梁來遷者十有餘世矣自流芳北行二里有山曰王護王護之西門山曰鞍馬二山之間委蛇行五里許寬平多水田四山周環如張幕帟名曰尚忠又並山之東穿澗行數百步折入深塢才半里南有小山形如伏虎左右又有支山拱揖北面大山髙數百尋是為王左山景陽出逰四方以廣其學一旦思其親治任南還謀樹屋三楹於小山之麓覆以白茅題曰王左山房取古人有王佐之才而世不用者悉圗於壁而詳書其出處始終於上屋前鑿方池種蓮中置石刻周元公愛蓮說小山上雜植松檜異石兩旁之山有竹木桃梅之屬有良田可藝粳稌清溪湛然埀笭箵為宜天氣清朗奉其親嬉逰終日乃歸景陽來屬余記其所謂山房按樂平廣記王左山起新安厯鳯逰三山而至於此在衆山中最為雄秀蓋勝處也景陽之先當宋東都盛時去京邑之紛華樂山林之幽獨其逺識髙趣豈他人所能及哉乃若史數百年之久世以詩禮相承君子之澤如彼其深長聞者其可不思也夫其圗於壁者其才皆足輔其君成文武之業致隆平而頌清廟惜其不見用於當日或陪湛於下僚或老死於草野斯世斯民不被其澤此天之不欲平治天下也可勝嘆哉然而仕止久速各惟其時者其惟孔子乎景陽眀聖賢之學蹈中庸之行乃所願則學孔子者也雲林圗記庚寅雲林山在金溪縣東山由大庾嶺厯贑建昌之南境至􅀈嶺入邵武之光澤有山髙千二百丈漢初徐仲仙遇仙之所至烏佩山仙人烏君上升時委玉佩處過太和山小和山委蛇而走南城達於金溪之境其髙上摩霄漢者三十六峰其中峰最髙者曰石錐其左曰白馬又名玉馬以其形似也上有浮丘先生祠浮丘先生者或云姓李黃帝時人或云周靈王子晉其弟子王郭二君俱陳留人訪其師至此然臨川境內多有其祠焉其右曰崖山山勢起伏九十有九其深谷産靈藥異草本草云臨川士人家婢食黃精能飛者意其處也山頂多石磴飛瀑其名曰磜有深潭廣一畝古木蒼藤隂翳慘淡神龍居之宋有沙門師劉中宫自蜀來此結茅山中居民苦旱問之乞雨師云今嵗數當不雨吾憫爾貧雖雨才沾足蔬畦而已他日師入潭中遺履石上涂叟者守其履俟之七日師自外至謂叟曰汝可謂誠篤問其所欲曰吾惟嗜鴨肉今禱雨者必先以鴨祭叟然後得雨師嘗謁撫州守書刾曰豢龍僧其守惡其幻詰之曰龍安在師曰眀公勿驚以金盤盛水探懷中若朽草置水中風雨大至龍飛躍而去鄧氏自五代居山下宋建炎中苗傳劉正彥作亂鄧雱集民兵追破其黨號忠義社於後纍立戰功掃禦一方入國朝設巡檢至元末天下已定乃罷今山谷猶有壁壘在焉近崖山有神童峰方仲永者蚤慧生其下荆國王文公所作傷仲永是也入南城貴溪有曰豪豬鬨甚險絶余嘗與今德慶路總管府知事楊君季子訪故潯州路總管府經厯祝蕃逺先生於太原僧舍猶應劭所謂前人見後人頂後人見前人履底毒蛇奔狐時出草間蓋畏涂也又嘗與祝先生夜宿田家白雲滿谷獨聞水聲而已豫所居髙橋有小溪發原山麓至元十一年先大父白鹿府君由邑之梯雲坊徙居於此讀書之室曰處一堂開忩正靣諸峰韓子云橫雲平凝時露數岫修眉新畫浮於天宇與此甚類余少肄業其間有書若干卷皆先世所藏嵗縮衣食之費增若干卷以三代所來碑刻若干卷有琴一不上絃獨以先父太常府君遺戒不設奕具耳蜀郡簡君大碧與余客吳文正公所謂作雲林圗道士方壺子亦愛余山居幽僻數為之圗張彥輔真人奉敕寫欽天殿壁余時在經筵用米氏法為余圗之翰林侍講學士虞公嘗為賦詩海內之名勝相繼有作於是有聲之畫無聲之詩悉萃於几席南金大貝不足為貴矣然故舊從而以雲林為余别號則非余志也上古簡質稱名而已周之彌文乃有字焉有字而不以稱又為之號末世之敝也况昭武黃長睿近集賢宣城貢文靖公句吳倪元鎮皆號雲林子余於三君子無能為役敢襲其號乎間以圗求詩於祕書達嚕君道夫道夫曰吾既來能即其地子盍為記以副此圗至正十年十有二月辛卯寄居城南頭陀寺雪下盈尺道無行人夜展圗玩之忽憶去家十有四年左親戚棄墳墓竟何為哉在令式中嵗之後亦許致仕豫眀年四十有九距納祿之年固非逺矣幸而清朝從其早退歸與樵夫野叟嬉逰山間上下雲月歌諸公之詩亦足以自樂也上都宜興州孔子廟建兩廡記庚寅至元二年上都路宜興縣始建孔子廟後六十有五年縣升為州初廟之成僅有正殿而兩廡未備至正八年虞城邊侯來守是州舍奠於先聖先師退而徘徊中庭睹從祀之無所乃謀於僚佐士民首出俸錢以倡之咸樂於趨事無敢後者既成繪孔門七十二子與夫漢唐以來諸儒於壁間如令式十年季夏肇興工役仲秋落成儒學正陳士元與州之士紳某某等具事狀抵京師請記於素惟鄉也疆埸彼此之時宜興號為塞外天運循環皇元勃興此邦遂界兩都謂之赤縣世祖皇帝臨御天下未久即詔郡縣通祀孔子而宜興之學興於斯時然而嵗周甲子而廊廡未成而從祀猶闕前乎邊侯豈無守令之良顧乃涖政濶疏漫不加意蓋猶以昔之宜興視之然則邊侯之於仰承國家埀精斯文之㫖汲汲焉圗以化民而成俗可謂盡心於職守古所稱循良之吏同一軌轍信乎其可書也侯名思誠字眀善無量夀庵記庚寅京師寅賓里有無量夀庵者居士屠君所建也君名文正更名覺緣山陽人事其親至孝至元元年大兵驅至開平日夕思念其母南望悲泣時年草有七矣因禮佛性道者為師絶葷酒持五戒誦佛名號冀與母遇始自五年正月元日日誦妙法蓮華經至初八日竟又始自五月朔日一食周月竟九月朔亦如之行住坐卧呌佛一聲恍然如見其母恆以清旦誦四聖真詮臨暮禮白蓮寶懴夜禮佛千拜乃寐十有一年還至大都眀年師事蓽菴滿禪師於慶夀寺滿號之曰居士時宋已內附疆宇混一私喜可見其母亟馳書候之則知北來之眀年母已沒矣居士劈踊號慟若不能生乃卜六月癸未集善信百餘人建白蓮社草有一年出已資七百貫買地十畝於大廟之西作無量夀庵樹佛殿四楹屋宇象設無不具足浚井治圃手植嘉木草有七年四月癸酉朔為其徒盛陳教戒其言曰諸佛菩薩不可不念九品净業不可不修越七日晡時吾當去至是日己卯沐浴更衣書頌畢隱几而坐俄有白虹從西南下埀庵中廣數丈如飛橋微雨灑道門人舉佛號五聲竟作禮跏趺而逝口吐異香彌月不散葬諸太史莊之阡子覺興善繼其志皇慶二年遇灾庵盡燬覺興裒金於好施者復謀營建未幾規制悉還其舊覺興又沒其徒魏守溪請於鄰之大長者翰林學士承㫖裕嚕特穆爾公曰昔先師之作庵且七十年矣未有刻石以告來者守溪之責也公以命史官危素按宋通判贑州事尹應元所撰行道碑而知居士之慕其親若是其至及世祖皇帝誕降之辰用其法祈天永命故其庵名之曰無量夀充其事親與君之心可為孝子為忠臣是宜書之傳示久逺若居士之作此庵匪獨求夫福田利益而已雲臺大隱記庚寅昔余好逰觀名山往來廣信之境由龍虎山東行二十五里望見雲臺之山蒼翠插入天際意其下必有遁世之士棲息其間不然宜為珍館以居仙者乃至正二年上清宫周君孟章始即雲臺之下曰竒扎爾者作石室為夀藏眀年搆屋若干楹中為觀極之堂堂東為丹室而為臨清之軒左廡為神祠右為賓位石室之下積水為池大旱不竭曰還原池總名曰雲臺東麓初君以儒家子少從上清之奉真西院陳尊師其學老莊之道而果於違世而絶物矣昔楚大夫悲世俗之迫隘思輕舉而逺逰慨然有志於方仙之學然其術甚微其言甚祕非余所知也若周君退藏山林可謂心跡俱超而身名無纍人間愛憎喜怒休戚之感是非榮辱得喪之役舉不能入其中矣是故古之為其學者其跡多在於荒崖絶谷人跡罕至之所信乎雲臺之勝惟仙者能居之君識量髙逺機辨過人善治煩劇而解紛挫鋭築斯館也將以佚其老焉陳尊師嘗作大隱道院尊師既沒而君主之至正九年災而君又為之更新所以敬其所承傳者果若是其重也君之門人徐廷傑余同郡人屬豫為之記翊正司題名記庚寅國家承平百年文物大備諸官署皆刻碑題名以為故實翊正司令丞與上幕之賓稽諸案牘亦礱石列書之屬史官危素為之記按成宗皇帝即位之始以潛邸齊哩克昆民户人匠無所統屬立管領隨路民匠打捕鷹房納綿總管府鑄銀為印章秩三品其屬提舉司二一曰人匠以董工藝一曰納祿以治賦役大德元年有㫖以所降歸德楚通等三百五十户置歸德亳州等處管民提領𨽻焉延祐六年敕更名曰翊正司置諸色人匠局嵗作行殿先朝皇后往往親視工事賜勞官曺有差故鹿項龍狀輿輦金脊吾殿猶存於局其任亦重矣於是重其任必柬其官僚昔者由斯而進用於政府臺察者往往有之修其亷隅克勤厥職人臣之義也官於翊正者其任之重如此可不慎哉可不朂哉吏部主事題名記庚寅吏部主事公署有題名之碑自至元再紀元之六年始顧今十年而石已盈於是托和齊君彥清楊君伯敬齊君中允來為是官謀續刻之而屬史官危素為之記素讀周官書首列天官其職可謂重矣然其事今歸之宰相執政獨所謂以叙正其位以叙進其治以叙作其事以叙制其食以叙受其㑹以叙聽其情其事則今吏部所專掌也皇元奄有萬邦自府史胥徒及一命而上其進退豫奪皆聽命於吏部眀天下威福之枋以綱維斯世其事權之重為何如哉然事無大小公牘之署必自主事始本之以理揆之以法使公論無所蔽私恩無所施上無幸進之譏下無淹才之嘆則為不負其職矣嗟乎為是官者可不慎歟可不敬歟龍山堂記庚寅端本堂正字王君景先請豫記其居龍山堂者因諗其堂之所以得名蓋景先家在保定之遂州去州治七里故俗呼為七里公孫莊其西十有五里有山蜿蜒蒼翠涵清蓄潤是為龍山西麓有穴大如車輪四時之風出於四方地志以為數有仙人往來其間下有深潭蛟龍居之嵗旱禱之輒應故又名澤山山之北有星月巖黑山班姬山沙門法猛入穴中見石堂唐大厯中闕黑山班姬山曺世叔墓在焉隋煬帝征遼親闕班姬云東比曰黃金臺西曰郎山唐張燕公讀書處曰黃崖山而其髙秀莫與龍山抗故景先之先君子松江府君為堂以面之且以為别號府君諱圭字闕蚤逰成均後以通國書入仕厯官多在閩粵及致政而歸起居飲食恆處是山與里之耆俊載酒臨眺彈琴詠詩山之浮嵐暖翠飄入坐席信可樂也其後又作樂全亭於圃課子孫讀書府君既沒景先即龍山之下結廬授徒者數年他日試藝燕南薦名春官對䇿大廷皆冠多士益知府君之善教其子也按今遂州戰國時武遂縣也史記趙悼襄王二年李牧將攻燕拔武遂是也上下數千年間皆為邊境兵戈相尋蓋無寧嵗皇元有天下承平百年而遂城實邇京師其民沐浴聖化有休養生息之樂而府君獨能以詩書開其後人雖其卓識逺見出乎衆人抑亦遭時休眀卒遂其志客有覽觀龍山之勝徘徊斯堂慨然思府君之德於百世之下王氏之盛寧有既乎文始道院記庚寅信之龍虎山距余家一舍而近余少讀書其間與了然子居相邇及留京師聞了然子已棄家為老莊氏之學宿留於東方出滄海之上㑹稽之人往往見之余以戀祿於朝不遑裹糧以求而叩其所造有懷其人輒悵然久之客曰子之於了然子殆區中之緣而情好之牽爾曽不滿了然子之一哂蓋了然子善推眀其師之說其與弟子言有曰大虛無所聞𤣥妙無所為杳冥無邊際生育無定期是道也天地因此啓日月由此眀萬化從此生宓犧得之而畫八卦軒轅得之而說隂符堯舜得之而有天下大禹得之而治洪水吾太上得之而演道德青靈君得之而出洞𤣥又曰天即地也地即天也隂即陽也陽即隂也一即萬也萬即一也不可謂之在彼不可謂之在此不可謂之非此不可謂之非彼不可謂之在內不可謂之在外混然融然貫通而無間者也余於是嘆曰了然子之所造至於是乎其學者趙守真與其弟守𤣥請余記其居文始道院其狀曰吾之先於宋有屬籍家於海鹽州之安仁橋木父闕州僉書判官㕔公事某之所卜也吾父諱時亨遭宗國顛覆乃著道士服舍宅為崇真庵祠𤣥武之神及髙曽以來神主至正五年吾兄弟聞了然子棲於越上遂延禮以居之幸了然子之不吾棄也已而更曰文始道院庵故有土田悉以供道院之用州之好道者潘大成王安孫皆欣然相其成道院之規制為之一新四方來學者若還其家所以紹承先志無敢或怠嗚呼世之人梏於血氣之私囿乎氣數之末孰知天道之廣大而窺其全體然則了然子之言燦然而易見洞然而無疑故余記其道院而并書之了然子姓倪氏名守中惠州路東坡書院記庚寅宋元祐八年八月端眀殿學士兼翰林侍讀學士守禮部尚書蘇公軾出知定州眀年紹聖元年四月以侍御史虞策殿中侍御史來之邵言落職奪一官知和州尋知英州六月責授寧逺軍節度副使惠州安置十月至惠州寓於合江樓數日遷嘉祐寺二年三月復遷合江樓三年四月復遷嘉祐寺四年二月白鶴峯新居成峰在歸善縣北十餘步下臨大江逺瞰數百里蓋惠之勝處也權臣聞公之安於惠再責授瓊州别駕昌化軍安置四月發惠州又三年徽宗即位乃還而卒至是公流落嶺海者八年矣紹興初䖍冦謝達陷惠州民廬官舍焚蕩無遺獨存公故居烹羊致奠而去淳熙五年郡守韓公磊重建祠宇丞相留公正記之嘉熙元年黃公自眀撤而新之嘉祐五年趙公汝馭故創四楹南曰南堂北曰北户取公語也故有德有鄰堂思無邪齊皆更作焉景定五年師公顯行來守郡實公之里人增創來問亭墨池丹竈蔬畦藥圃及睡美軒斜川佳處江山千里各有名扁兵後盡廢國朝至元三十一年僉廣東道肅政亷訪司事張公處恭稍茀地樹堂以祀公大德十年郡經厯韓君克恭乃拓而大之延祐四年僉事張公世榮出行部使者托爾齊公以公故居為言張公首出俸錢為祠堂久之圯壞至正六年僉事周公伯琦至惠敬謁祠下顧瞻徘徊㑹同知總管府事觀魯公治郡政成上下孚信曰是吾之志也即斥大其祠作孔子燕居殿為東坡書院既代還具其顛末抵京師屬素述之惟公父子兄弟起西南萬里外俱為宗工巨儒而聲名震耀海宇愈逺而愈光蓋出而遭逢其國之休運上有仁宗為之君下有韓范富歐陽為之臣一時居顯榮者汲汲焉以薦賢報國為先務所以矜嗟奬寵者無所不用其極公兄弟既擢進士公之父亦以布衣授官與修典禮豈非太平極盛拔茅彚征之時歟一旦憸人用事來之邵與李定舒亶諸人織羅誣蔑爭欲致公於死地磨牙肆毒不遺餘力曽不若後之盜賊猶能知敬此詩人比青蠅於讒口而反覆切責之也然公於患難得易有孚心亨之㫖登山臨水發為文章嘗舉栁栁州之言曰孰使豫樂居夷而忘故土者非兹丘也歟則惠之君子俎豆而尸祝之其小人託帝命假巫語以招公之魂要皆出於秉彛好德之良心也觀魯公與公異世而崇敬表章所以宣眀昭代尊顯斯文化民成俗者克盡其道誠不可以無述也觀魯君字元賓其先北庭人讀書好古亷而有為今以選為杭州路總管府達嚕噶齊石鹿書院記庚寅至正六年鄱陽陳君楨作書院於饒州安仁縣之琯溪又四年十月庚子甘露降於松樹日光映之瑩若膏沐而光采爛然飲之其味如飴衆奔走相告以為陳氏之瑞始君得勝地於所居之近翦剃榛棘值微徑草樹䝉密地勢斗絶乃盡力攀緣睨之不百舉武而豁然平衍環以羣山中為方池鑑虛涵碧陟其顛喬木成林石磴蔽虧兩石旁倚呀然如蚌蛤有石昂首若靈禽之翔因名之曰鳯鳴臺三石之最竒者在其東中峰削立平若敷席曰磐石折而西為亭曰含光亭又西大石圓頂方趺若樹碑碣稍前為上谷崖之回者曰生雲突然垤者曰雪丘窪然坎者曰鹿泉君於是即磐石之下為書院授徒其間中祠孔子别為山房以庋藏先世書籍及甘露之降復為亭以志瑞暇日馮虛四顧千里之逺近在目睫烟雲雨風變態萬狀超然塵垢之外萬鍾之祿干駟之馬不願易也因其姻友臨川孔君英來京師俾素為之記素聞君之先出自九江之義門家法之懿踰數百年雖散處他郡而流風餘思未盡泯沒君篤於孝友鄉里信之宗族稱之顧其志願無所慕乎其外而婆娑逰衍於水石之間與其門人子弟講說先王之道經世孰有喻其樂者乎誠使一家之善推化行於一鄉逺而達於一國人人有士君子之行則其為瑞莫大焉甘露之瑞斯為之兆歟君字士周寧都州儒學新作禮殿記辛卯寧都州儒學正臨川李君實再舉於江西來京師屬其郡人危素書其學禮殿興造之始末歸刻諸麗牲之碑按寧都之廟學創於宋末因仍簡陋圯壞弗支至正八年知州益津胡侯秉彛與學政務章鄭君大同始謀改作焉明年春逹嚕噶齊髙昌侯拜布哈至首帥僚屬出俸錢以倡好義者卜以七月某日建而胡侯與鄭君俱以秩滿去官於是知州濟南趙侯天澤與李君至趙侯以興學為己任公退即詣學宫晨夕程督曽不數月而殿之蓋瓦級甎黝堊丹漆及聖師象貌章服煥然聿新矣始學之廩入才百有餘石而趙侯能以義帥其民故民爭歡趨之以成其事惟州之山川險塞其人往往尚氣節貴亷恥道之以義則易於為善其天性果敢然也顧為治者多以遐逺視之是以發政茍且教化不眀使其民陷於罪罟而莫知恤今州之大夫乃能究先王為政之本而盡其職業之所當為豈非賢哉抑是邦之前修則有桂州節度判官孫公立節肇慶府節度推官曾公興宗所謂奮乎百世之上百世之下聞者莫不興起者也雖世殊事遷故老淪謝而二君子之言論風㫖存乎方䇿者則有未盡消磨其模範典刑足以師表後學諸生之逰於庠序者既知夫立身行已無愧於鄉之先達然後可以上窺孔子之門牆而入於官可不勉諸素固嘉州之大夫知政務之緩急且重李君之請於是乎記之梅江書院極髙眀樓記辛卯極髙眀樓者梅江書院之樓也書院在寧都州之北郭所以祠宋肇慶府節度推官曽公樓之扁榜則丞相信國文公所書蓋若干年矣久之樓壞㑹濟南趙侯天澤來牧是州儒學正臨川李君實請於侯曰樓將壓矣壓則眀公與僕皆將何辭以自解眀公其圗之侯悚然曰吾之責也乃率州之好義者相與出力積木石傭工役而經營之君上春官而以語同郡危素曰吾於寧都幸遭賢侯恪承上命以興學眀教為先務故是樓完繕於敝圯之餘諸生既具石請子為之記蓋極髙眀之語載諸中庸其義宏矣昔者曽公逰於新安朱氏之門幾草年朱氏以純茂篤實切已致思用工正當稱之方慶元間羣凶枋國詆排正學斥逐善類一時學者諱名其師曽公執禮益䖍未始少挫師既沒星馳弔哭服心喪三年則於死生患難處之有素非所造極於髙眀其能然耶以是名其樓託意深逺矣來逰於斯者馮髙而四顧山髙川回萬象軒豁超然吟風弄月之趣細故芥蒂無復滯留其胸次將與舞雩詠歸者同其樂焉雖然易傳有之智崇禮卑崇效天卑法地極髙眀者智之崇也子思子所謂道中庸者其亦禮卑法地之意歟因記其樓而并以所聞者質諸是邦之學者云爾賑恤樂户記辛卯國朝滅金之五年嵗在戊戌詔曲阜孔公元措括故太常知禮樂者給驛傳徙諸東平眀年孔公至燕訪求掌樂許政等九十有一人世祖皇帝中統三年九月東平萬户嚴公忠範言宫縣二舞工人未備請以土人習之中書省臣呼嚕巴哈議以為是且蠲其賦役至元三年中書以東平等處禮樂户道逺資糧費重止留九十有二户餘遣之還取京師旁近諸生三百八十有四人補其數十九年十一月太常寺官塔爾楚圖嚕斯拜穆蘇公言禮樂户籍田皆貧命丞相哈喇哈遜公核其數户賜鈔五千貫丞相僧格枋國乃征其賦役司徒薩哩瑪公等請復之制可成宗皇帝元貞元年十月太保伊蘇徹爾大司徒烏爾圖岱兩公請賑其乏詔賜御史臺贓罰錢八百五十貫大德十一年武宗皇帝有事於太廟禮樂訴於上前詔丞相竒塔特布濟克公人賜鈔千貫至大二年親祀者二初賜幣帛各一束再賜鈔各七十貫幣帛各二束仁宗皇帝皇慶二年人賜幣三束鈔五貫延祐七年英宗皇帝賜帛四百四十五束綿四百四十五斤仍命中書與之糧食至正三年今上皇帝享帝南郊丞相托克托公請於上人賜鈔百五十貫從之十一年春丞相阿嚕圖攝祀先農天甚寒大樂署令髙君泰丞布延特穆爾復以為言因核實得户賜鈔三百五十貫帛若干於是協律郎邢敬忠丞規以余庀職史官請書其事以刻貞石諾之而未遑為也㑹遷太常博士乃考諸故記并叙祖宗以來未嘗不致謹於禮樂鍚賚優渥而恩澤深醲若乃眀律吕之原通制作之義其功至於舞百獸而來儀鳯固非臣下之職也趙氏家法記辛卯趙氏世居京師善俗坊其曰榮祖字紹先敬祖字顯卿昆弟素相友愛臨財能讓顯卿厯官為延津縣尹有惠政秩滿代還以疾卒於家紹先哭其弟絶而復蘇因中風疾顯卿之配劉歸才三年至是年草有五以志節自誓未四十日生遺腹子紹先喜甚力疾禱於天地曰弟之亡命也願保此孤兒幸不絶其後逾年紹先亦卒族人以其配徐無所出謂當付家事於劉劉流涕固辭曰某年幼於事未通曉嫂氏為家長某當任其勞可也於是事無巨細一一咨决於徐娣姒織紝以為生保育其孤甫七歲即命入學至冠猶從外傳鄉先生名之曰可溫字以仲良以門廕授香河縣稅官將行徐曰汝方從仕顧食指衆豈能給一家之養吾居家宜侍汝母行可溫拜且泣曰兒得成人於今日皆二母之恩伯母春秋髙豈忍去左右哉劉亦願留於家因奉徐之香河官滿還京徐亦中風甚劇可溫母子夫婦求醫藥晝夜不就寢惟可溫所進食乃下咽越四旬始蘇可溫夜禱神眀嵗餘稍能行履卒年七十有三可溫為服齊衰三年至順三年可溫葬其闕氏寡姊至元元年又葬叔父文慶四年葬從兄弟二人五年葬叔母張至正二年從弟沒於外家遣童兒歸其骨四年從叔父亦沒於外親取葬焉其葬諸喪治棺槨塋域必務堅固服與情稱聞者為之感動改方城尉吏部留為永平倉使時劉年近七十可溫服勤左右益謹耆老以其母為貞子為孝上其事於有司覃懷李君執中與可溫同官為余言其事夫慈孝節義人之大間出乎此則淪胥入於禽獸鬼蜮天典民彛壞亂不可扶植京師四方萬里之所法則幸而有貞孝之人出乎其間眀眀天子在上旌其宅里以表著之風化之行習俗之變孰有先於此者哉乃著趙氏家法記異時秉史筆者尚有徴於斯文廬陵蕭氏先世畫像記辛卯廬陵蕭祖生以先世畫像寄余於京師余肅容敬觀間則考其厯官行事而嘆其生世之後不及承下風而望餘光然猶幸得以窺其容顔於圗畫焉祖生九世祖諱南强字彥柔纍贈朝奉大夫八世祖諱遵字元卿為吉州文學七世祖諱知節字唐叟少至孝紹熙間伏闕上書請立寧宗為太子丞相周文忠公奏補登仕郎轉運使趙公彥橚薦授迪功郎監衡州耒陽縣户部贍寧酒庫轉從仕郎攝耒陽安仁縣二有聲治攸縣寃獄多所平反纍贈大中大夫六世祖諱逢辰字應甫寶慶二年擢進士第授迪功郎濠州司户參軍辟淮西轉運司提轄催促綱運物料官轉從仕郎權安豐軍添差淮西轉運司幹辦公事轉承直郎論邊事尤剴切辟浙西制置司凖備差遣轉奉議郎權提領封樁所幹辦公事通判通州提督天賜鹽場改知黃州黃岡縣權通判黃州改通判蘄州差監行在都奏院出為淮東制置使司參議官轉承議郎知髙郵軍兼淮東提㸃刑獄遷大理寺簿權知寧國府差主管台州崇道觀轉朝奉大夫改湖北轉運判官兼安撫制置司參議權知鄂州轉朝散大夫直祕閣知鄂州兼湖北路轉運判官升直寶謨閣計度轉運副使兼知鄂州轉朝請大夫朝議大夫封廬陵縣開國男食邑三百户依舊直寶謨閣主管亳州眀道宫進直華文閣充京湖制置大使司參謀官轉中奉大夫户部郎中總領湖廣江西京西財賦湖北京西軍馬錢糧專一報發御前軍文字兼京湖制置大使司參謀官特授中大夫樞密院撿詳文字依舊直華文閣提舉成都府玉局觀降中奉大夫久之起為江西安撫副使兼知吉州祕書郎歐陽公守道稱其厯官多在邊城撫字以寬和鎮壓以嚴肅綜理以精勤故所至皆有可稱述者髙祖諱安中字仲和貢於江西轉運使恩授登仕郎銓試第一授修職郎袁州宜春縣主簿安撫公守吉州奏為書寫機宜文字改夀昌軍武昌縣主簿景定五年再舉於江西循從事郎德安府觀察支使曽祖諱元永字正之兩貢於江西轉運司吉內附郡守周天驥辟佐府事遷朝列大夫同知南雄路總管府事能撫綏其民加中順大夫瓊州安撫副使祖諱泰登字則平為湖南儒學副提舉擢承務郎僉海北廣東道提刑按察司事以奉訓大夫兵部郎中使安南不辱命授連州知州丁外艱起為江西等處儒學提舉僉嶺南廣西道肅政亷訪司事奉直大夫拜南臺監察御史南人任風紀最有聲者父名憲孫字闕以恬於進取蚤納其祿武昌路總管府推官致仕方康强受養福祉未艾云嗚呼宋之亡七十有餘年而公卿大夫之家變滅澌盡何可勝數蕭氏之子孫祿仕者猶數世夫豈偶然哉蓋其利澤之所施於人者久而不忘抑亦用之不盡其才留其有餘者以遺其後人耶用掇其大要而為之記陳氏尚德堂記辛卯瀏陽陳君闕以尚德名其所居之堂而自著家規十有六條刻諸堂中俾世守之其子頤孫舉進士授邵陽丞將歸榮其親則過余求記其堂按其家規曰讀書必由小學大學循序而進講眀修身齊家之道當見諸行事毋徒事文辭以釣聲利祭祀用朱文公家禮參之以司馬文正公書儀著為成書毋遽增損凡祭宗子主之叔父雖尊不當主祭不奉神鬼浮屠不用巫覡搆堂四楹每食男子居外女婦居內童子别席有酒肉則共食不足則奉親慈幼而已子婦定省毋闕廢臨事絀已奉公或教之不從則婦出子逐勿為姑息以紊家法取婦毋茍利其資産家事三年以次掌之事無大小必告家長毋得專行男子各為生計公庫給本錢居者月歸子錢行者殺其四之三子婦績麻十有二斤取紡纑十斤女子未嫁者取其半子婦治絲織綾緙者六十有一匹豫一匹女子三十有一匹豫一匹能增置産業及桑茶竹木必紀於籍毋私蓄私假私與飲食衣服冠婚酬酢私親餽遺一取諸公庫定為品節毋過於奢仕而有餘祿者亦歸諸公庫僕婢授之以事而責其成此其大凡也然其堂曰尚德者著其保家本其在於斯乎嗟乎甚矣其德之不可以弗尚也彼有德之不尚而惟力之是騁未有不傾覆敗裂者以嬴秦之强虎視六合而威震諸侯曽不旋踵而亡其國有天下者且然况一家乎是以知力之不足恃蓋如此夫且所謂德者本之吾所固有而非自外至亦何為而不尚之哉今君之處其家規肅肅乎區畫之嚴密可謂謀之深而慮之逺其為子若孫者夙興夜寐毋喪厥德則其興也將綿綿而未艾九江之宗家不獨專美於前矣是為尚德堂記世學樓記壬辰素既銘宋正言陳公長元之墓其曽孫怡可復請記其家之樓曰世學者其言曰吾家福之長樂所居之東偏舊有樓三間乃上世講學之地昔五世節度府君與東萊吕成公工部侍郎四眀袁公樓宣獻公為同舍又同擢隆興進士第後四世為正言府君幼則匿膏油夜誦或向月眀每聞般若寺曉鐘輒起亦擢開慶進士第自有斯樓逮於正言府君且九世矣嵗月滋久棟宇將壞大德五年正言府君還自燕薊乃圗新之未就而沒怡可與諸弟助力粗完延師以教子姓間出逰而歸憑闌撫景瞻龜石之儀刑挹南溪之芳澤緬懷厥先大懼無以繼緒世業願為之記俾來者勿替而益勉之素蓋觀乎古今事變而嘗為之慨焉以嘆士君子以詩書起家一再傳而弗墜者鮮矣三四傳者世以為異而且交譽之五六傳者厯數郡而不一遇焉多至於七八傳者吾未之見今也陳氏九世而得正言公十有一世而傳諸怡可之昆弟怡可之昆弟况有子有孫自是以往復不知其幾世嗟乎世祿非難世學為難此吾徒於陳氏喜談而樂道之者也昔者孔子於夏殷之禮以為杞宋之文獻有不足徴典籍之湮沒則考據無其書賢者之淪亡則咨訪無其人豈不可惜哉夫以杞宋之有國而猶久而荒墜若此陳氏逺處乎百粵之地而能保其詩書之緒於世氏更革之後可謂難矣登斯樓者尚有以徴於吾言怡可字通理揚州正勝寺記壬辰有為浮圗氏學者唐廣眀二年建寺於揚州郡城左北廂南進賢坊賜額為興教禪寺五代燬於兵宋建隆二年僧德欽乃重修創大中祥符五年賜改額為正勝尋復湮廢乾道間天竺教院僧如祖力學苦行務興其教有董評事諒者舍宅以居之遂為大隱菴菴在北進賢坊之念佛巷基廣五畝百六十步如祖增加營葺廣其殿堂以安徒衆淳熙十四年請於州移正勝以為今額如祖示寂楚州净慧院僧師謙號普眀大師以州之命來主是寺始度弟子十有七人善妙善億善倚善德善相相繼住持景定二年夏寺復燬善德持鉢化金建立殿宇郡人謝都機者施財為塑佛像作藏室以貯經揚既歸職方江淮諸路設釋教總攝官未幾命善德主治平禪寺仍俾其徒宗祐領寺事加號崇理昌化大師判教門專令甲乙相傳勿變久之棟楹梁桷腐黑撓折延祐元年宗祐乃撤而新之益加宏壯其徒了忠裝飾靈山九士諸天像又建法堂四楹東廊十有一楹作方丈以為燕休之所至了恭作西廊八楹了真以舊藏殿庳小復謀崇廣於是殿堂門廡包湢庫庾始獲具完繚以周垣繪以丹碧大侈前觀先是如祖乞米飯僧逮咸淳間善德始置土田若干頃以給食又置塔基廣七百餘步於城北以藏遺骨塔南有屋五楹以供祀事了靖所搆也厥後宗祐了榮道元了恭了真了泰先後增土田若干頃時則有若了忠了眀道夀道茂咸有力焉殫力以相其成者道通道照行進道濟道成道秀云至正十二年道秀領常住事謂創寺迄今幾四百年其興廢之故久而無所考證因屬僧行海撰次事狀京師安靜寺住持僧行璽請余為之記蓋佛之說行乎中國而尊崇護衛莫盛於本朝揚為南北之要衝穹官顯人往來無虛日富商大賈居積貨財之淵藪其成此固不可以為甚難然猶經營數十年而後大完以是推之則天下之事豈可易言哉惟能思其成之之艱則不至於壞雖壞必至於復興吾於正勝觀之矣太行書院先賢祠記真定之屬縣獲鹿其里曰閻同國子伴讀髙健實作太行書院健之幼則慕學聘儒先生講道於家春秋丁日及月朔望懸先聖畫像行釋奠釋菜禮其先君子懼其䙝也欲作廟以祀未果而卒既終喪健之母房發所畜粟帛以搆書院禮殿廊廡齊舍包廩莫不具完為屋於杏壇之側以祠鄉先賢訪其遺像悉圗於壁間晉中書舍人賈公緯及其曽孫宋左僕射昌朝金太常丞蔡公圭左司員外郎元公好問國朝御史臺侍御史張公德輝江南行省參知政事賈公居貞翰林學士承㫖正公思亷元公雖世居太原嘗買宅於獲鹿其女子子又歸邑人故合祠於是健之遊於成均與安陽蕭文翔雅相好至是聘為子慶師文翔抵京師述健之意請為之記素嘆曰中州自金源氏兵革糜爛衣冠文物掃蕩幾盡逮於本朝雖沐浴數聖之澤而生氣猶有未復健也乃能特立獨行為今人不能為之事何其韙哉維祠之建本諸禮所謂祭鄉先生於社健其習於禮者歟按中書不幸生干戈之際然猶篤好史學憂唐之事荒忽無考乃著唐年補録之書僕射之在經筵以易春秋進講疏林禹年月傅㑹易算之失皆有功於名教蔡元兩公之奧學雄文震耀穹壤張賈兩公功名在竹帛利澤被斯民乃若王公之敦厚老成其學得於元公者固已刻諸琬琰而盛傳於世此數君子要皆天下之士不獨其鄉邑所當崇敬尊祀而已書院之諸生來逰來歌於此瞻昔賢於一堂懷英風於千古其亦有所感發者乎詩曰誰謂華髙企其齊而尚毋自畫焉可也揚州普門禪菴記壬辰揚州郡城東隅普門禪菴在焉初至大三年僧志如買地若干畝至順間創建佛殿塑阿彌陀佛及阿羅漢諸天像建法堂六楹東廊十有一楹西廊十有四楹置蔬圃十有七畝於東城之下元統三年築三塔於江都縣之永真鄉其徒行真作方丈之室行定作三門八楹方志如之經始也囊鉢不畜一錢至以其說動人或伐材於山輦石於淵捐金於帑逺近相助其應如響前淮東宣慰使特穆爾圗固蘇實始終相成之無土田以為恆産乞食以給衆揚為南北都㑹其學者經行無虛日輒駐足是菴待之未嘗厭倦又制為規訓戒厲將來令甲乙以次相傳於後年七十有五而終用其法茶毗得舍利無數志如蚤學於䝉山異禪師禪師授以十六字為宗派曰志行願清普賢妙道智慧圜眀真宗河紹志如所度之弟子曰常貴正順和成堅用應夀仙真因定惠戒觀實正林信妙善滿行住了心恭俊清福賢皆冠以行字從其師之命也至正十二年行戒領菴事乃營具造嵗月師弟子傳序因京師安靜寺行璽求為之記余聞異禪師振其道於江左當時學者多歸向之蓋其所造詣甚深非紛紛假託欺誑以從事乎口耳者也故志如之建此菴豈茍焉安逸於旦暮之頃是以逮今恪遵律度相率不怠則其身教固可知已堅定而不遷汨撓而不變是在夫逰其門者何如耳居斯菴尚思無負其志哉尼山大成殿四公配享記癸巳今皇帝至元三年重建尼山書院奎章閣侍書學士虞公集實記之未及大完而山長彭璠卒後十有七年鄒縣達嚕噶齊瑪哈穆特增塑顔曽思孟四公配享殿中邑士趙守寬李之質因其同里陜西行省左右司郎中張君思政來京師屬素為之述按顔子之侑坐肇於唐太宗貞觀二年冬尚書左僕射房𤣥齡國子博士朱子奢之所建議也宋神宗元豐七年夏復增升孟子侑坐禮部郎中林希之所奏請也度宗咸淳三年春增升曽子子思逮我朝混一天下且四十年延祐三年仁宗皇帝在位崇學右文御史中丞趙公世延始言南北祭禮不宜有異當升曽思如典故制曰可先是四公列坐兩旁禮部以為翼承道統述眀聖經作則萬世以立人極論德定名列次配侑東坐西向於禮為稱至順三年進封顔為復聖公曾為述聖公思為宗聖公孟為亞聖公仍命詞臣為制書一代之典可謂備矣瑪哈穆特之作邑於聖賢之邦欽承上意克修墜典其為政知所先後從可知已禮曰有其舉之莫敢廢也君其知禮者哉雖然君為是舉蓋有難者方盜據徐方力抗王師鄒之為縣密邇其境朝廷憂其供給之繁增設邑長以君才敏而擢用之軍旅繹騷君應答靡有凝滯將士歡悅及徐平撫安疲氓飛芻挽粟徭役平允當此之時又能汲汲焉以興學眀教為務是以謂之難也今年春君以仲丁藏祀致齊之夕夢升禮殿瞻仰聖師行事之際乃覩配享未備惘然久之首出俸錢為之倡僚吏士民相率來助邑士張敬祖主其出納曽未數月而工告畢德容晬溫觀者肅敬蓋啓聖王與夫人顔氏禱於是山神秀所鍾篤生聖哲繼天測靈萬世永賴所以紹斯道之傳發微言之祕四公之功終古如一日矣書院之諸生尚考求於方䇿非四公之學不敢學也邑大夫之望於諸生者庶其在此可不勉哉金溪黃氏墓記乙未金溪黃冔告其同邑危素曰吾黃氏之先有國子孫散處江淮間居光州固始者出於漢豫州牧婉孫固至唐監察御史滔之孫峻避亂徙閩峻孫光仕王氏官諌議大夫分其子散居他郡今邵武南城臨川多其後也徙撫州南梧桐坪者曰祚梧桐今𨽻金溪又有居板橋水南曺洲紅門相去環十里間族亦大皆云出於閩祚生述述生漢淳漢斌漢斌之後甚蕃别居湖潭漢淳五世孫衛以周禮貢於鄉上名春官行至安仁沒焉其子裳年十有一聞喪號泣扶柩族人憐之提攜以往貧不能舉喪歸因葬其地母熊氏亦死外家取葬焉稍長歲必一至父墓安仁有王氏哀其志舍於家妻之以女生子曰有慶久之挈妻子還鄉田廬為他人所有卒葬板橋其配葬湖洲有慶築室母墓左躬耕給食秋冬則輦鹽於家貿易米粟來年夏輒平價豫鄰人然家用亦裕乃曰貿易之事可恆為哉二子元吉元亨教之讀書曰勿效吾所為當習而祖業可也卒葬洪厚配饒氏葬辛方元吉弟兄居則同食出則同行衣冠儼雅論說終日自幼至耄未嘗改其度元吉生朝美朝哲卒葬化原配丁氏葬蘇原元亨生朝華朝俊卒葬湖洲配丘氏葬夏阮朝美端願似不能言嘗從道間見遺衣帛物不顧而行歸州守雷默參族人聞之曰此兒他日必為君子以女妻焉女素驕貴及歸黃氏遂易節為和柔讀易有得於䝉卦名其室曰山泉端居終日若是數年俄安坐而逝生至道葬夏阮雷氏葬洪厚朝哲嘗避亂負其兄以行﨑嶇山谷饑餓終日得食僅足食兄兄不忍輒半分之國家將用兵安南使民作海艘乃囊其私財就役不以煩兄時官府並緣厲民所持不給配胡氏取已資裝白金足之胡氏亦自此不加簪珥曰吾士人妻也安事華飾為生立中夫婦卒葬蘇原朝華以詞賦中待補進士宋益王廣王航海江東提㸃刑獄謝枋得起兵朝華得檄率鄉里壯士行有取民菜茹按法斬之衆驚曰黃公儒生也何嚴厲若此乎生元老敬老回老卒葬湖洲配張氏葬夏阮四世墳墓皆在金溪順政鄉朝俊徙南城南城鄉翁原亦和易嵗一還故鄉㑹宗族老不能行令子亦如此生允學允定允恂卒葬所居傍配李氏葬里之西圍至道生正平無後立中生冔斾元老生觀生敬老無後回老生順生闕允學生麒麟允定生驥允恂生滌淵昔從祖元亨嘗作族譜由貢士府君而上惟始遷之祖墓在梧桐餘已莫詳所葬由諱裳府君而下墳墓始有考焉然猶可以知其世次先後厥今兵燹之餘文字無一存者所書世次與夫生死年月復有遺忘者矣宗族逃散念念痛心平昔聞諸先人得先世一二遺善子能為之墓記得以慰我後之人子其毋讓素之大父白鹿府君本出水南俱諫議公後而冔結交嵗行兩紀觀其所述庶幾孝子慈孫之情哉蓋周官之法設墓人以掌塋墓後世此職已廢宜乎冔之慮患若是其逺也南豐曽氏祠堂記乙未宋之盛時曽氏顯於南豐有浮圗之宫曰歸信者祠堂在焉其後多宦逰他郡因定居焉至於國朝祠亦圯壞不治沂國公諱仁旺九世孫知南安軍冲子家於金溪有薦於世祖皇帝授以僉福建閩海道提刑按察司事到官未久而歸閒則命族弟三德至南豐載沂國以下繪像更為祠堂於金溪之南原祀焉至元三十一年也後五十有八年為至正十一年三德之孫熙修壞補敝棟宇采章煥然更新因里中士黃君冔來逰京師屬素為之記素世居臨川熟聞曽氏故事况南安公嘗受業先曽大父仁和府君其伯氏參政淵子則素族祖姑歸焉素嘗數過南原之祠瞻拜遺像退而讀中書舍人文定公翰林學士文昭公之書至於廬陵歐陽文忠公我臨川王文公彭城陳先生真定韓公維延平楊文靖公新安汪公藻南唐江文忠公我朝野江程文憲公銘功述德之詞百世之下其光曄如則為之反復加嘆者久之然則曽氏之祠豈止其子孫所當致力而已古者國無先師則以鄰國之君子為之先師南豐今雖為州故撫之屬縣以一郡之間宗工巨儒名臣正士磊落相望有不待合祭於鄰國顧郡縣之吏與夫鄉之學者有不察焉何也熙也克承先志保有故業又能嚴其紀事其賢於人可知己厥今冦攘兵燹之後盍亦購求遺書尊閣祠下以待後之君子則素他日乞身於朝歸與俊彥之士沉潛其間豈非餘生之大幸乎哉昔者文昭嘗作譜序不載曲阜集中書以遺熙使並刻諸石兵部續題名記乙未至正四年今陜西行省左丞髙昌亷公為兵部尚書刻石以紀官僚姓名於兹乙紀矣而書諸石已滿尚書髙昌烏爾圖謀諸僚宷賓幕各出廩祿更買石以刻之以余嘗承乏員外郎去官未久宜為之記嗚呼自國家用兵以來諸司往往增置職員而兵部為最多雖曰最多而王事靡盬至有未嘗覿靣者向非有所紀載則孰從而考之哉又安敢望其修子孫後世通家之好哉然則此石之續刻誠不可闕諸且本朝兵曺之職掌其事非一今日之所當急者乘傳為先務使者旁午道涂晝夜不息芻粟踊貴而蘸户凋敝通變宜民必有其說幸以恩榮所被獲聨官位未遑一日同堂而合席相與究論其或罷或行定立規制以貽永久此今尚書髙昌公與余相與嘗慨然於斯由是知六曺設官所以綱維庶政若復使之馳驅四方則曠廢天職其敝有不可勝言者故豫為之記而并及之靜修書院記保定劉先生以道德學問髙天下既沒之七年新安縣三臺鄉作専祠以祀之並立孔子廟與眀倫堂諸生齊室皇慶元年間朝廷賜額曰靜修書院靜修者先生之别號也蓋三臺皆有隱君子曰南溪老人梁至剛與先生友善間往造焉輒旬月之留至剛之子泰及劉英李䝉王果李真從先生逰英早嵗為吏一旦幡然折節為學故先生始則拒之甚嚴終則與之最厚至是首倡祀事何平章暐留守布達實哩各發金幣禆之興學闡教大振儒風英之力居多從容贊畫者至剛之功也至元五年縣逹嚕噶齊布哈裊山長王朝佐始搆兩廡繪從祀像然距今五十餘年未有識書院之顛末俾後世傳焉者非闕典歟至正十五年冬鄉貢進士東平杜禹來為山長慨然以是為己任謀於縣尹中山劉得亨創建神門畫泰等四人像以侑食郡達嚕噶齊布哈公聞之曰吾守令之責也首出廩祿命滿城縣達嚕噶齊海夀取碑材於西山已而吏民聞風慕義欣然來助他日公使吏來屬素為之記嗚呼去古既逺世之風俗賴以不墜者不在乎世之君子者乎先生生大河之北當國家混一之初鋭然有志承聖賢之絶學雖罄南山之竹極其形容贊美固不足以得其精微之萬一來學於斯讀先生之遺書於是窺其門户望其宫牆入其窔奧力追先生之遺躅於百世之上其庶幾乎此書院之作然則英也不獨服勤至死以事其師其有功於後來之俊彥豈曰小補之哉顧今用兵河南共億無藝守令士民卒能成禹之志刻石紀載以圗不朽可謂知所先務其牽聨得書者以此臨川危氏家譜序乙丑臨川危氏家譜一卷居金溪縣者繇諱怦而下七世列為支三居臨川縣者繇諱忱而下列為支三十有六而以始遷江南之祖冠其端信州刺史府君諱仔倡别改為元氏又以元氏之譜附其後其出處行事録其大概昔閩之宗有字福可者不知諱常修譜工部侍郎府君諱昭德及吏部侍郎延平馮公夢得序之從曽祖諱浩又修譜朝請大夫南城周公方序之當宋末未克成編元大德間從祖諱瑞思竟其志而未備素在童子時請於大父願其刻而藏焉仲父諱有成客京師求翰林侍講學士四眀表公桷序之泰定元年從臨川縣之族得舊圗於是所謂三十六支者始得校定其僞失益詳焉危氏之始莫可稽或謂周武王之妃感異夢而生有文在手似迂誕而難信然疑若未可以遽削也撫州刺史府君之事尚矣而自宋淳化以來以眀經述文擢科第仕於朝於郡縣者衆多也今則或有失其名或有絶其世可悲也已嗟乎微而大大而微賤貧貴富之一去一來者天也非人之所能為也至於浚詩書之澤樹忠孝之節惡可以衰盛而易其心哉知不可以衰盛而易其心則吾徒之自勗其能以已耶謹志於首將以戒我後之人泰定二年嵗在乙丑正月平徭六䇿序癸酉延祐間徐長公先生來主簿金溪縣豫以縣民常造先生所請舉子業間出其長子中立字宗道所著平徭六䇿豫録之藏於家當此之時宗道為廣東道宣慰使司都元帥府令史上其䇿江西行中書省行省得其言亟命從軍廣西未幾客死所著之策遂為空言其可哀也夫豫得其書十有四年矣而猺獠尚據山區谷聚之險創作甲兵賊殺官軍俘人子女敓人資貨以至勞廊廟之經營罷州縣之餉餽彌年曠日荒忽不常豈所謂六䇿者未有舉而行之者乎不然何其久而未之能息耶儒者之論必曰先教化是固然也蓋必有以因事而制變隨世而立功古人有言識時務謂之俊傑然則宗道之䇿寧可廢之乎嗚呼宗道已矣其負能尚氣概渙然竒男子世豈多見也茍有能知其人而求其䇿以之攘除外患超立殊功夫豈難哉然則宗道猶不死也宗道沒其長子士原才十嵗今既長能劬學哀其父之不幸從豫求是書襲藏之以俟知者因并序而歸之惜豫文不足以顯宗道也宗道卒時年三十有一云楊氏族譜序甲戌金溪縣北去七十里有山名印楊氏世居之蓋其先自唐景雲初來守撫因家臨川縣長寧鄉之小邾里其六世孫曰浩始徙印山浩從弟文林郎潭州節推掞嘗修其家譜八世孫武子增修之襲而藏之者九世孫從龍也校定而刻以傳之十世孫曰應泰曰三杰曰和也書之者十一世孫敏也應泰又請於故翰林學士子吳子奎章閣侍書學士虞公序之子吳子勉之立其本意有在也虞公外家楊氏知之為詳故又言當與今全州總管宗瑞同出華隂豫讀宋侍講學士無為楊公序其家譜分新昌院淮南院蜀院閩院丹陽房滎陽房其先固皆羊舌氏之後而華隂最先盛矣其逺者勿論已姑自宋中世以來言之文靖公顯於延平學於河南程氏立朝有風節倡道於東南門人弟子率皆豪傑竒偉之才尊宗列派逺有原緒豈非盛哉文元公顯於四眀學於臨川陸氏髙眀純一進道不倦雖今之學者棄而弗講然質諸鬼神而無疑百世以俟聖人而不惑者又焉可誣也為楊氏子孫者盍亦思夫宗家大人之學若何而學耶於此知其求端用力之方而自得焉則將光眀赫奕不止於今日所觀而已此子吳子所謂立其本也雖然豈直楊氏子孫當思之耶天下後世之尚友古人者不能遺也應泰與豫厚善來徴續書其後故為之書送琴師張宏道序甲戌樂何為而作也將以養人之性平人之情宣天地之和而已先王之澤熄樂經淪亡人亦莫知所以養其性平其情所謂天地之和者往往變為乖沴無可得而宣焉是以其器雖存其聲雖尚可以追考則亦吹竹彈絲敲金擊石而止耳茍求其本則何能得其依稀存其倣佛哉琴在樂中為絲屬可獨作然而古之音逺矣近世咸宗宋少師楊纘氏毛敏叔氏諸人所度曲謂之浙譜謂數十年以前人所彈者為江譜故浙譜行而江譜廢蓋一時之取舍各有不同如此以此觀之愈變而愈新愈出而愈繁遡而上之軒轅氏陶唐氏有虞氏之時其變也多矣知樂之君子有所感也夫豫章胡子泉為豫言臨川𤣥妙觀道士張宏道能琴將負琴以逰請豫言為贈豫將有所質於宏道今夫合木以為器綸絲以為絃其聲萬變千化焉且聲之出也果於木乎於絲乎於木耶無絲不鳴於絲耶匪木無聲是何與古之樂作鳯來儀獸率舞者無論已後世蓋有精於此者亦能使惟裂瓦飛鳥翥魚躍景星列卿雲出甘露降醴泉湧若此者又何與是必有道矣宏道亦嘗思之乎思而得之則子進乎技矣送曽君靜從軍廣西序乙亥元統二年夏汝寧章侯以處州路萬户鎮撫州出征黎人有功升廣西兩江道宣慰使司都元帥將之官先還撫南豐曽君靜告於侯曰某書生也兵法雖非所習於先生行師之道則嘗講之今猺獠崛强未息請從君侯行侯曰諾於是與其素所交者别其友危素為之言曰壯哉曽君之行也夫儒者之學於古也豈欲浮湛里巷而不思以自見哉欲自見而不遭其時不可也今曽君有其時矣豫嘗識章侯蓋精敏謙和疏暢眀達人也則曽君之在軍中也宜其知無不言言無不從者且繕甲兵振師旅具糗糧以事夫斬馘俘鹵騷動南服之境一方有事四靣助之其事體至重也彼區區之猺獠負固山溪蟻聚而鼠竄曠嵗彌年而不解傷夷我民人暴露我吏士使耕者不安於田里商賈不安於道路是不待教而誅者也然而人性之善蓋相近也彼豈生而好鬬爭哉其欲避害就利愛親戚畏死亡一也今欲苖薅而獸獮之其間豈無脅從誣枉而不能自直者使之玉石俱焚則有可哀者矣為有司者盍亦自思其撫馴之果盡其道與漸摩之果盡其術與抑未盡歟計其民生長溪峒之間曷嘗一日而聞禮義之教御以寬則玩而肆震以威則憤而暴此勢之必然者古之善治天下者內中國而外逺人良有以哉故趙充國曰戰而百勝非善之善者也吾曽君嘗誦先王之書而知此誠得馬一匹從以數老兵將元帥之命播告朝廷德意諭以禍福使之知恥而自新則長鎗大劍可以示弗復用矣於是刻石以揚天子之威靈以紀元帥與羣執事之功則曽君又能琢雕文章侈大而張皇之顧不韙歟顧不韙歟若夫身之遇不遇有命焉不足為曾君言也送史縣尹詩序丙子君子之於小人察其所趨而已至若見之於事則觀乎時之有遇有不遇勢可為與不可為勢不可為而强為之時之不遇而强行之古之知進退存亡之道者不如是也仕於今者乘國家混一之久法制修眀黜陟嚴信不可謂時之不遇矣然而人心風俗之變久矣服勞州縣者亦誠難哉縣之附郡者其難尤甚焉無論其他姑以吾撫州而觀之臨川附縣也郡臨其上百須咸取給焉為長令佐二者郡之史茍非嘗學問者莫不頤指氣使之至於郡之皂𨽻亦平視或反相訕侮送迎餽􅀈日無虛於斯時也欲少狥其誅求而茍免於譴責往往臨財而不思義論勢而不知理喪其節而隳其名者相望也君子深憂之吾是以為難也或曰此一縣耳而謂之難則漢唐之長安洛陽宋之開封彼其貴家大族相陵壓事又煩劇則將不為乎吾以為不然彼漢唐之長安洛陽宋之開封望尊而勢重也望尊而勢重則號令之發若霆厲而颷馳未易撓其勢也至若今之為縣則大不然上官制之奸胥欺之民之稍富强者得以把握之甘心於汚穢枉已而從人者可幸無事若稍鼓其才智暴其操行毁辱不還踵而至矣雖君子不以利害成敗而論事然有先見之知者於眀哲保身之道亦靡不盡焉嗚呼是其事固與長安洛陽開封相遼絶哉若真定史君景讓昔之令崇仁也粒粟縷絲以上無所受於人家種田於沔陽收其入以資衣食故翰林學士吳先生韙老崇仁亟稱君以為今之亷吏也世豈易得哉及調臨川猶在崇仁也君之言曰吾所得為者吾不敢不勉為之若其勢有不可為者詎可易而為之哉是以終三年而上無所迫責下服其長厚今其還也咸惜其去而不留作歌詩以送焉豫聞察司有薦侯任風紀者蒸民之詩曰衮職有闕惟仲山甫補之將見有如尹吉甫者為君歌之矣送陳子嘉序戊寅古之時公卿大夫稱其德府史胥徒稱其才無分儒與吏也自有儒與吏之分為儒者髙談名理而不屑於小物故常近乎迂為吏者深拘文法而不求其大體故常近乎刻迂則政弛刻則民怨故儒與吏亦常相詬病若枘鑿不相入焉是不知理與律者明體適用之士不能偏廢也國朝草昧之初天下豪傑乘風雲而起者衆多矣然皆布列乎朝廷以謀大事發大議至於郡縣往往荷氊被毳之人捐弓下馬使為守令其於法意之低昂民情之幽隱不能周知而悉究是以取嘗為胥曺者命之具文書上又詳指說焉彼胥吏之患中原吾不知也楊以南北輩嘗賤且厄於前代一旦得用如猛虎之脫檻饑鷹之掣講其勢不得而禦之由是視賄賂為權衡或更一字而生死禍福其良民或援一例而聾瞽箝制其官長使聖君賢相子惠元元之意不得播其下而疲癃殘疾鰥寡孤獨有不勝其用可哀也夫故廷臣之有識者取學校諸生參錯用之使其貪邪迷謬者有所觀感可謂仁厚矣哉然而上官茍賢者也則破絶崖岸時與儒生講說詩書禮樂以風動其人顧不韙歟其不然則反謂儒者不能巧牢籠而工諂事乃擇其貪黠者黨詐張肆其吞噬者有焉彼儒生茍賢者也自以為吾之學足以治其國家天下屈而居下嘗自悼矣不得於上山林而已何至俯首包羞低回隱忍以自辱哉甚者反舍其所學而以趨世媚俗為能則號曰用儒其實非也故必有髙才絶識者出乎其間上之使下也以禮下之事上也以忠夫如是其民焉有不被其澤者乎大梁陳君子嘉工舉子業使羣進於有司可得髙第既而科舉廢學官薦為六安府史陳君曰古之聖且賢者蓋有為委吏者焉有為乘田者焉有為抱關伶官者焉府史與上官謀議政事者隨其所得為而致其力學者之事也乃來江寧省其親而後去豫嘉陳君積學而有才色溫而氣和故厯道其所聞以送之使下以禮吾望於六安之大夫焉事上以忠吾望於陳君焉請書以為序釋洙翠屏文集序戊寅豫嘗觀大慧禪師之言曰忠君愛國之心與生俱生假使鐵輪旋頂而此不可磨滅為之廢書而嘆詩云天生蒸民有物有則民之秉彛好是懿德豈不信夫論者謂釋氏之學逺去倫紀其然乎宋慶元間小人用事若福王趙忠定公以宗室為賢相擯死湖南一時大賢君子相繼去國而吾朱子楚詞集注之作蓋為此而深致意焉千萬世之下聞其事讀其書者感慨係之矣而王之鄉人鄱陽僧景洙後百餘年好表其事不一書之是非忠君愛國之心秉彛好德之善昭眀不昧其能然耶使洙師生於當時必能上疏正言如四眀楊文元公投劾去官如鄱陽柴獻肅公豈不增夫綱常之重而公論不至若是其掩晦矣雖然傳有之發潛德之幽光誅奸諛於既死則韓托胄張釜之徒死而有知聞洙師之論斷豈不局促愧懼於地下乎吁為人臣者亦可監哉泰定三年洙師示寂又十年其徒伯𤣥掌書記於大龍翔集慶寺豫來逰海上過金陵暇日出洙師文集而觀之而嘆其於世道有補焉𤣥之言曰洙師姓江氏早孤有賢母蠶績以資其從師聞里有善記盧同月蝕詩者亦具禮幣使往學焉其篤教類如此故師亦刻厲精勤六十餘年不廢書史是以該洽深實而尤邃於易𤣥將梓師之文凡若干卷與好義之士刻而傳之其志殆薄俗所罕見故豫為序云張文忠公年譜序己卯故贈攄誠宣惠功臣榮祿大夫陜西等處行中書省平章政事柱國追封濱國公諡文忠張公年譜一卷素所撰次叙曰古之君子其出處進退豈茍然哉立人之朝食人之祿必憂人之憂其志在於天下國家而措心積慮不止乎其一身而已如此然後有以建立於當日埀休於無窮焉彼未得而患得既得而患失斯孔子所謂鄙夫夫茍得鄙夫而用之則君人者獨何賴哉自昔以來居髙眀耽寵祿之人滅䃺湮沒不可勝數惟忠臣愛國有德有功者能自見於一時雖更千萬世之下其生氣凛然足以使夫頑夫亷懦夫立不與死俱亡也傳曰不有君子其何能國豈不信然與公諱養浩字希孟泲南人年少從名師力學逰京師太傅魯國康里文貞公一見而竒其才辟為掾曺由是厯踐華要為堂邑時有惠政在民拜監察御史力詆權臣參議中書諫作燈山君相方將用之公以親老辭歸田里以吏部尚書召不起居喪有詔起復又不起泰定間屢召皆不起文宗即位除翰林侍講學士尋改陜西行御史臺中丞公乃幡然曰西土旱災久矣其民苦饑饉吾寧忍不為之起乎散其資財即日就道凡所以為其民計者無所不用其至竟以憂勞薨於位海內惜之嗚呼觀公之去就大節從容得宜非所謂有志之君子者耶使公得君而行乎國政所至又可量耶公之文有雲莊集四十卷既刻於龍興學官經筵檢討魯郡欒公旭復掇集中之文關於治教大體者為若千卷别刻之以傳素在草澤聞公行義既久至京師又從公之子祕書郎引盡取所藏名卿大夫士紀述交際之文及公行事履厯通載為此書周雅有之民之秉彛好是懿德天下後世有志於自任者尚有所考觀焉故并為之序武伯威詩集序己卯詩之作夫焉有格律之可言發乎情止乎禮義而已王澤久熄世教日卑於是代變新聲益趨於浮靡何能有以興起人之善心懲創人之逸志也哉故共城邵子曰删詩之後世不復有詩矣余讀邵子自序其擊壤集深有感於斯言也蓋嘗欲效其體而為之又退而思邵子之為邵子其始學也冬不罏夏不扇夜不就席者數年將以去已之滓久而玩心於髙眀知天地之運化隂陽之消長至於安且成必造乎此而後邵子可幾也區區模擬其文字語言之末則豈希聖希賢之道乎及問學四方來京師聞武君伯威甫閉户却掃授徒於家翛然深坐不接世事他日其門人山東牟謙持伯威甫詩二編來請序余反覆讀之其詞肫肫篤實朗朗髙眀志學於邵子者也嗚呼斯道之將墜於地也久矣諸子之言千蹊百轍總之不離詞章訓詁異端三者波流茅靡出彼入此所謂思誠慎獨集義為仁之訓能真知實踐於此者蓋鮮矣伯威甫有志於其逺者大者豈不傑然拔去流俗哉則其為詩固非雕琢章句流連光景者之比余故喜而序之伯威甫宣德人大德間以神童貢於朝有㫖學於成均厯翰林中瑞司典簿丁內艱服除授汾西縣尹遂不復仕夫仕不仕不足以論吾伯威甫余所喜者喜邵之志不孤也趙鈐轄傳序太廟都監閻塤謁素而告曰塤之父故趙姓而繼閻氏既而世父闕又學浮圗法吾父憂之乃以吾兄為之後然後吾父安焉此書者趙氏七世祖府君家傳願為之叙按府君諱伯深字逢原秦國康惠王德芳六世孫也府君之父子徊以德州兵馬都監戍棣州尋左遷監無為軍稅府君奉其母張歸汳值金人陷京師府君遂失母獨與乳母走吉州居焉建炎二年府君之父起為䖍州兵馬都監而父子始相值紹興八年府君舉進士監吉州安福縣稅後十年父以建昌軍兵馬都監終府君益念母日飯道士覬為尋訪二十一年㑹曽慥安撫四川辟府君幕下行次棧道前行者奔還言有虎當道乃止逆旅一道士自西來告府君曰而母為瀘州曺鈐轄婦生二子而曺死因忽不見問後至者則曰實未嘗見虎府君白慥丐治檄至瀘訪得之遂迎以歸又後十有八年而終賦詩美之者由慥以來至於今二十有三人題而識之者由丞相周必大以來至於今十有八人府君之傳則淳祐間通判某州事潘忠恕所撰也嗚呼當宋二帝北行之日宗屬妃嬪罹禍者三千餘人他王侯以至庶民遭俘虜者不可勝數髙宗播遷僅保微緒於東南亂亡之後能若府君之母子相失而復得百不一見也非誠孝之心上通於天詎能然耶素讀中興以來宗室列傳不著府君之事則史氏不能無失矣先是其宗士㬚嘗録羣從之言行曰玊牒勝談多文采風致之事使其及見府君之行而書之則於天典民彛豈不有所係乎哉府君之沒書七言四句詩若安於生死者其有得於修鍊之術者與慥通於神仙說所著書往往而在府君之傳其自慥與當是時程氏之門人流離死徙使府君及與之見其不能一變至於孔孟之道吾不信也我師之取宋大戰崖山秦王之後孟某者赴海死其子由儕感奮力學善事其母今居南豐素將録府君之傳以寄之并為之序云借書録序壬午余家唐宋時徙臨川先世多藏書國初罹兵燬無存者其存者不多具見故物記方髫齔先大父俾治儒業甚篤及長出就師友稍知自厲而無書家又貧不能致書學未成輒為童子師得錢以供賦稅給衣食問遺姻族應接賓友其贏悉以市書妻子數告空乏而書不可以不備也若此者幾草年然捃拾纎細書亦不能多致獨賴藏書之家多素之親友雅知其嗜好之専肯以書假借或久留而不怨或數請而弗拒故於天也日月星辰風雨霜雹之象於人也聖賢仙佛文武忠烈戰伐攻取賊亂姦詭之迹於地也山川郡國城郭冢墓草木昆蟲之物靡所不載反之於身則性命道德昭焉施之於事則禮樂刑政具焉至於法書碑刻稗官小說方技之微術數之末亦莫有所遺顧素之朴愚固陋而窺萬一於其間者皆諸君子借之以書素得而讀之之力也向微諸君子吾幾不得古人著書之意矣則諸君子惠利於素何其厚哉故載其所借書目并附其家世名出處為借書目以示子孫太平十䇿序壬午太平十䇿者臨川艾君本固之所著也其綱曰開經筵以廣聖學廣儲畜以備水旱行銅錢以助鈔法嚴考績以擇守令崇節儉以厚風俗汰冗員以厚正官奬亷讓以化官吏舉孝弟以正民彛通資格以任賢才修武備以振國威艾君上書時今太師忠正方入相得君書大喜中書參議何庭蘭世稱能吏亦曰若言可用下之部而吏議沮之不報余嘗論之四民之中惟士有天地民物之責雖窮居草茅其慮必周於天下後世此昔之君子先天下之憂而憂也君處田里之間民生之休戚見之詳矣國政之得失思之熟矣而又能窮經考史以損益古今之宜此十䇿者蓋其燦然可舉而行者為國而不先乎此則以為治者皆自詭而已顧豈可以老生常談視之哉今夫居髙位食重祿者非無其人而乃使布衣之士焦心勞思徒步五千里奮然言事言之而又困於吏議吾不知其何說也因閲其草稿書以歸之山菴圗序癸未聖井山在信之上清宫東南上為神龍所居嵗旱禱輒雨蓋人迹罕至之處延祐中永嘉金蓬頭先生修其學於先天觀風月良夜乃逰聖井山捫蘿而上樂其深邃髙逺也徘徊久之其門徒頗為構室廬以待先生之來豫家雖鄰境距其地不數十里朝發而夕可至且余性嗜佳山水而先生􅀈心所敬慕者然僅能相從於先天所謂聖井山者未能一逰徒見其積翠千仞髙入雲漢則其幽敻可知矣方外之友曰方壺子者早棄塵事深求性命之學從先生最久先生既去人世方壺子稍出而逰觀天下名山至於京師曽未旬日即思南還與之交逰之素者爭挽留之張君彥輔知其志之所在乃取髙句驪生紙作聖井山圗以慰之彥輔君國人隱老子法中而善寫山水鄉者侍臣有進其畫於延閣上覽而說之余數從講官入直嘗與古畫並觀幾莫可辨矣然其畫人所罕得雖逰從之久者亦不能强求也初魯國大長公主好名畫以自娛玩欲得其畫而張君終不肯與他人可知己今獨嘉方壺子之髙趣而為是圗方壺子謂余本山人戀祿於朝去其田里甚久故特以相示使不忘乎樵牧之事亦反招隱之道也方壺子將結菴於金先生故隱之東偏約豫為投老之計其古之交誼然耶歐陽子思潁之詩曰及身强健可為樂莫待衰老須扶攜則余之非才乞身而返其初服有日矣方壺子其候我於仙岩之上游哉書其後以要之云耳夏小正經傳考序甲申素昔從翰林學士吳先生學禮得所校大戴禮先生曰猶幸此書夏小正存焉然嘗患其經傳相混而注釋未詳嗚呼古書之存者鮮矣而是書厯三代脫秦火而未至於泯滅况於日星之行氣候之節國家之政生民之業具列於此學者可不務之乎句章史君季敷甫嗜古學作夏小正經傳考句證以山隂傅氏本及采儀禮集參究同異附以釋音復取先儒解經所引小正語及事相附近可以考訂者隨事疏於傳文之下脫衍者列叙於後即其采托之詳訓詁之密非篤於古學不能然也素以使事求史館遺書過句章得是書於君之子孰孫讀之旬日乃因其請叙於篇端君臣政要序乙酉至正元年九月皇帝御東宣文閣出君臣政要三卷召翰林學士承㫖臣庫庫學士臣多爾濟巴勒崇文少監羅羅傳敕翰林侍讀學士臣索諾木直學士臣巴克實崇文太監臣必里巴哈少監臣羅羅宣文閣鑑書畫博士臣王沂授經郎臣布達實哩臣周伯琦等譯而成書又敕宣徽供其稟稍越三月書成又敕留守司都事臣布格以􅊳厥字書之臣嘗讀唐史開元元年晉陵尉楊相如上疏𤣥宗覽而善之今考此書相如為陸渾尉進書在開元十三年疑史失之也書載召為左拾遺其制詞猶在蓋史略之也由此觀之史其可盡信乎其書拳拳於興亡之故反覆乎天人之理忠厚懇惻出乎愛君憂國之至誠道揆法守於是乎在且樵夫之言聖人擇焉况其著書立言有可傳於後者乎臣竊稽相如進書之嵗東封太山告功皇天天下極盛之時曽未數年鑾輿播遷國勢危促馴至於極亂矣是以古之聖王制治於未亂保邦於未危夙夜憂懼恆致慎於斯故知之而必行從之而能改斯可也向使𤣥宗篤信而允蹈之尚惡有天寶之禍哉臣讀其書未嘗不為之掩卷而三嘆焉宋臣蘇軾繕寫唐陸贄奏議以進而曰若使聖賢之相契亦如臣主之同時陛下照臨萬方作新庶政思以承億萬世無疆之休乃御延閣爰出是書俾以精微達諸國語聖心之所在有非淺見薄識所能窺其萬一也臣素執事經幄身親見之乃因臣巴克實所訂重加校讐疏於其下藏之中祕以備乙夜之覽故得竊述其區區之志云說學齊稿卷二
