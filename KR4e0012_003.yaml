body:
  text: 說學齊稿卷三眀危素撰昭先小録序丙戌宋德祐元年十月乙卯通判常州陳公照死城守後六十九年為大元至正三年皇帝詔修遼金宋史其曽孫顯曽以書告史官翰林直學士王公沂師魯翰林修撰陳君祖仁子山經筵檢討危素太朴請録公死節事陳君及素復書曰史官修撰余君廷心實當紀公事而慎重不輕信於是顯曽又亟以書告余君反覆哀痛余君雖愛其詞然猶難之後從國史院史庫得德祐日記載公授官嵗月與夫復城城守兩轉官城破死節褒贈等事甚悉始為立傳而顯曽未知也遂走京師使謁余君以請今其傳既上進矣顯曽退而輯次諸公為公所著文字及其前後所與書問題曰昭先録使素序其端素使過常詢其父老而參以野史雜記所載獨恨忠義之家其子孫往往才智下不能道先世事可勝悲哉而顯曽獨卷卷焉於此懼其先德之不傳可謂賢矣且顯曽學行淳懿方出為當世之用此録蓋不待序而傳者然素讀宋禮部郎官鄧公光薦續宋書謂常之天慶觀道士收城內外積骸萬數至不可計井池溝塹無不充滿僅餘婦女嬰兒四百而已大軍入江南屠戮未有如此者則常之事史家尤當盡心焉按大元丞相巴延驅降將吕文煥由常鄉臨安先是左丞安塔哈攻之月餘不能下㑹守臣趙與鑑稱病溫人王良臣者屢舉不中流落無藉人也適寓常與錢訔者詐稱郡官開門迎降降書首署錢訔而末及已今法以署後者為長良臣遂守郡訔乃次之是年三月故參知政事姚公希得之子訔以知某州家居宜興與公合謀起兵民二萬復常州事聞丙申授訔帶行軍器監簿知常州調揚州兵七千𨽻之五月戊子公差通判常州六月戊辰特以其職起復加奉議郎於是樞密院都統制劉師勇副統制王安節皆以督府命分兵守常加師勇安撫使殿前都統制張彥攻吕城八月加彥遙郡觀察使師勇防禦使又命統制張全將淮兵二千來援文天祥督軍平江公之子應黿奔訴乞援天祥義之使朱華將三千人尹玉將五千人㑹於五牧全往橫林設伏於虞橋大兵掩至麻士龍死之全不救走還五牧華欲掘塹設栅全皆不許大兵薄華軍華力戰自辰至未華軍死於水者不可計至暮大兵繞出華背曽全謝雲胡遇曽玉先遁尹玉力戰手殺七八十人全軍隔岸不發一矢華軍渡水挽船全斷挽者指於是多溺死者尹玉戰死全亦宵遁惟尹玉殘軍五百與大兵角皆并力死戰無一降者質眀易崇等四人脫歸天祥謀再遣兵道不通矣全淮東僨將也嘗從許文德復清河兵已入城全鳴金散衆文德不敢以斬將自專送之帥閫竟免之及是天祥欲先斬全并置敗將於軍法以全朝廷所遣請於陳宜中宜中又免之卒以降天祥至餘杭姑斬曽全以狥耳自吕城之敗城中短氣猶堅守四十餘日殿司及所親藉藉偶語欲進異謀輒憚師勇忠壯莫敢發言俄羣鴟飛鳴匝城中衆疑其妖亡何大軍有鴉鶻亡集城工請以善馬金帛贖之師勇不與與淮將謀卜十月丁已率徑兵宇圍出戰乙卯巴延親率草萬衆扺城下急攻北門將士力戰甫退遽攻南門屬地分將張超離所部謁神祠大兵自超所守處登城軍士不見主將拒鬬不力城遂破撥發官傅忠導師勇以數百人開東門拔栅踰塹而去師勇弟馬墮塹躍不能起師勇遙舉手與訣轉戰而前間道疾走幾危者數比至平江才十一騎云安節善用雙刀率死士數人巷戰及左股斷猶手殺數十人大兵脅之降安節大詬曰汝不知守合州王節使耶乃吾父也吾豈為降將軍辱吾先人遂死之天祥後繫燕獄為詩哀常州云常州宋睢陽也北兵憤其堅守殺戮無遺死者皆忠義之鬼哀哉哀哉詩曰山河千古在烟火一家無壯甚睢陽守寃哉馬邑屠蒼天如可問赤子果何辜唇齒提封舊撫膺三嘆吁訔縱火自焚公調兵巷戰敗歸坐聽事左右牽馬請由小東門出公曰去此一步非死所矣日中兵至堂上慷慨不屈死於所居之位是時淮軍死鬬人殺數人乃死有婦人重傷伏積尸下見淮軍六人為大兵所逐六人反背相拄且前且鬬殺數十百人乃斃莫謙之者宜興浮屠起兵戰死徐道明天慶觀道士不降死至是宋雖危猶用褒恤之典贈麻士龍正任髙州刺史一子承信郎尹玉濠州團練使立廟贑州一子承節郎賜田二畝王安節保定軍承宣使諡忠藎二子大使臣恩澤賜銀絹五百㑹子草萬田千畝姚訔龍圗閣待制公得贈朝奉大夫直寶章閣一子將仕郎皆立廟莫謙之武功大夫昔聞儒者之言曰天地有大經亘萬世而不泯者忠義是也夫惟敗亡之國其人乃見而有道之朝務存至公不責其抗而録其節至於倒戈迎降開門輸欵者雖賞之爵之而未嘗不疑其心薄其行是以髙祖致丁公之戮文皇章君素之贈皆所以植天表正民德崇世功非淺見俗識所能測也仰惟今皇帝示天下以至公眀詔史臣毋諱死節素待罪史官分修忠義傳網羅放失夙夜兢兢故常之事得而備書之然猶恨死者多逸其氏名為之水慨而已顧安得家有賢子孫如顯曽之能昭其先者乎公家本寒素既祿食嵗連稔頗多積粟鄉人之乏食者以衣來質即以粟與之頻嵗不贖之衣甚多是嵗又盛釀酒九月十有三日公生之日應黿自無錫以數舟載衣及酒盡裝以入城稱夀因犒軍士畢公曰吾必死此吾宗不可無後汝歸守墳墓毋復來泣别而出故應黿既請援督府又傾家募士以補散亡革命之後杜門不出命子協購求公遺文録藏之衣冠不改終其身焉顯曽之生協禀命其父以製名字以景忠訓之曰顯曽者欲汝顯其曽祖也景忠者欲汝景慕曾祖之忠烈也汝其識之及病革遺言曰汝毋忘重闈之養及名字之命顯曽泣曰不敢已而目不瞑顯曽泣曰不敢忘遺訓也乃暝時顯曽年方十六故顯曽克篤孝誠久而弗懈余讀其昭先之録亦必為之廢書而感泣也至正六年四月既望史官危素序送葉庸生序世祖皇帝既定江南取宋之臣列置要地於是錢唐葉公驟致政府賜秩二品當是時國家初一天下立法埀訓公周旋其間多所禆贊後六十年其孫庸字子中循格補國子學弟子員將歸省其親京師之名能文辭者各賦詩送之㑹余為助教其同舍生請為之序余嘗修宋史按公為京學諸生時賈似道方枋國行公田以厲民未幾彗星見公率同舍生唐棣葉鴻蕭規等上書攻似道不少置似道怒甚收公等下獄會劉良貴尹臨安承一時之風㫖煆鍊不遺餘力棣鴻規皆死箠楚之下獨公達廣南貶所似道既斥公乃得生還而宋之國事去矣公既負才氣遭逢治朝功名顯赫於斯為盛所謂興王之良佐皆季世之棄才有不信然者與今子中之來逰於斯也天子仁聖大臣宰相無失德異乎公之時也故子中亦斂然自守眀經修行以待國家之任使而已嗟乎公之祖孫俱學校諸生也所遭之時不同故所厯之事亦異斯命之有幸不幸焉者也子中他日之來對䇿於大廷所以忠國愛君之藴行將布露無隱矣傳曰公侯之子孫必復其始吾於子中有望焉李節婦詩序素以職業在經幄從翰林侍講學士揭公扈從灤陽客有以李君卿妻孟貞節為言者揭公為之賦詩而一時諸君子相繼有作素亦賦焉灤陽在古為絶塞然秉彛之在人心者無間於古今逺邇當是時女婦之貞節夫豈無其人而傳記有所不及載非可惜哉顧今其地遂建都邑天子嵗一巡幸事有係乎風教者有司不敢不以聞以故旌其門者相望於閭巷若孟之事又得學士大夫為之記詠以傳諸天下由是觀之雖其命之不幸然猶幸生於斯世也且夫夫婦婦其具萬世之常道乎隋李德武妻裴淑英讀烈女傳見稱述不改嫁者乃謂所親曰不踐二庭婦人常理何為以此傳記耶善夫裴之言幾知道者雖然自先王之澤熄世固有夫不夫而婦不婦者則孟之所以少喪其夫不復他適又撫其子至能服官從政宜乎見稱於君子也刑部侍郎襄陽王公彥寶屬素更為述之將請朝之宗工碩人詠歌之以為世觀王公刑官也豈不曰出於禮則入於刑所以防範其民者盡得夫法外之意者然則王公亦賢乎哉送湖州吳教授詩叙丙戌士有天地民物之責故少而學則必思有以致其用有國家者設為庠序學校之教亦曰他日取才於是而任使之故有以成天下之務而善天下之俗其效莫著焉後世之學幾與古異局於章句文詞之末究其歸不足以眀體而適用聖人之道微矣古者鄉射飲酒春秋合學養老勞農尊賢使能考藝選賢之政至於受成獻馘訊囚之事皆在所當學故人才之盛風俗之厚何可及也宋安定胡先生有見於此其教吳興之學者設經義治事之齊當斯時湖之學多秀彥及為政又皆適於用蓋先生知夫道與器不可離而二之也嗟乎何其後世之不然歟新安吳君君輔甫分教於湖吾固知君之能振先生之遺法於已墜將見湖之士彬彬而出無愧於古昔則君之政業當樹立於永久矣送鄒景孟序丙戌道家者流鄒君景孟自江南來京師訪豫曰子知吾里中二仙之事乎有超然子者為之傳宋尚書謝公又為之書超然子既自隱其氏名謝公余所向慕者因取而讀之蓋陳太素者字靜甫新喻人時新喻袁屬邑也雄于資少即求導引之術隋大業間逰沅湘值蜀郡羅太冲元真者史臣之子連試春官不中第因棄家逺逰陳君與語甚契乃同之武陵尋陶靖節先生所記桃源者聞王能尊師居華隂不知其年隱見莫測得辟穀之方然善飲酒醉則放歌於道或竟卧終日二君往見焉頓首資叩久之尊師曰世之人沈冥於聲利安知違世絶俗之事哉二君請益力乃期以後三日至至則授一卷書曰行之不倦仙道可冀蓋鍊白石法也復見何仙娥於長沙娥使還新喻用其法煮白石十有二年石不壞俄二泉涌出取以煮之石化為霜二君服食而冲舉所坐之石悉成玊屑唐武德二年八月望也邑令為作白石觀已而飛茅墜地三日而生長可尋丈又作仙茅觀貞觀九年居人見仙仗出於雲端云宋徽宗時賜白石額曰善應仙茅曰洞真紹興二十二年縣尉韓顯祖作亭泉上榜曰錬石泉主簿趙儼之為之記此其顛末涎第之可考者景孟學於山中篤志道術蓋二君之登真且將七百嵗矣遺風流俗庶幾未絶泯滅夫學仙之事論者恆以為茫昧不可詰觀二君之所就何其異哉彼文成五利熒惑世主者固可疾已乃若巖棲谷遁之士服食而引年視世之顛迷於汙濁膠轕於旦暮豈不有間乎景孟歸其鄉宿留於仙茅白石之館二君之逸軌固能追之翰林學士承㫖歐陽公書􅎟仙二字以遺景孟則所以期之者不涉凡近可知己承宣集序丙戌承宣集者宋政和間朝請郎權發遣南雄州軍州事周公諤所著也叙曰吾讀周官書所以治其天下國家大綱舉而衆目張可謂密矣後世一切偷為茍簡之計授之以一縣一縣之事有所不盡知授之以一郡一郡之事有所不盡知任之以天下能盡達夫天下之事者蓋寡矣其故何哉蓋當世之亂離則兵革起而有所不暇為世之小康則虛談勝而有所不屑為於是乎率皆墮於因循茍且之習政有所不舉法有所不行凡舞手以乘民者一聽命於胥吏馴致之久民情愁怨天灾流行其禍不至於敗亡不止也公以宏深之學剛正之氣通練之才所厯皆可考見其成績晚起廢斥守此州著為是書而有日成月要嵗㑹之遺法焉故山陽徐先生積亦屢稱公之為政觀其書可以見其志焉公去南雄百八十年而宋亡此邦遂歸皇元職方纍聖之深仁厚澤被於遐方為牧守者固多慎選其人􅀈世殊事異其設施之道有因有革不可比而同者然公之書久將泯沒不忍使之無傳㑹東平嶽公齊髙以名進士守南雄而廬陵劉君楚竒自中祕出為郡幕長皆好事者乃録其書請刻諸學宫余嘗為史官傳公事請并刻之懼余之言不足以重其書又請順慶守麥公敬存為序以冠篇端麥公南雄人也序公書為宜嗟乎余之卷卷於此書愛其庶幾有周官之意故反覆道之覽者推其類盡其材則事功可立矣孝經闕序丙戌古文孝經出秦火之餘而顔芝子卓所獻今文孝經十八章已行於世孔安國馬融為古文傳長孫氏江公后蒼翼奉張禹乃說今文劉向校書不以古文為是故不列於學宫劉炫作稽疑不以今文為是陸德眀謂古文世既不行隨俗用鄭𤣥所注今文司馬貞力主𤣥注惟劉知幾主安國傳於是黨同伐異爭論蜂起唐𤣥宗遂注今文刻石長安仍詔元行冲撰疏自是以來祖述者幾百人宋司馬文正公言壁藏之時去聖未逺作古文孝經指解范太史季信州袁正肅公近世導江張氏皆宗司馬氏而不從顔芝本惟朱文公及會稽俞氏臨川吳氏兩存之王勔之勉注書甚夥晚乃用力於孝經章分句析條紀燦然博考諸家之說擇其要者梓而録之而大要以朱氏為宗嗟乎以此書觀之千載之下而欲臆度縣斷於衆說紛紛之中非篤信精察者不能然也夫孝之為行大矣推而行之其道溥矣王君其善錫爾類者乎王君曺南人仕至太醫丞老而劬學尤可嘉已鄞江送别圗序丙戌至正四年素奉使購求故翰林侍講學士袁文清公所藏書於鄞屬其孫曮同知諸暨州事方以事往海中待之久而後還鄞之士君子聞素至甚喜無貴賤長少日候素於寓館所以慰藉奬豫無所不至其退處山谷間者亦褒衣博帶相攜來見館名㴠虛唐祕監賀公之故宅下瞰月湖後枕碧沚方盛暑清風時來坐有嘉客鄞故文獻之邦距宋行都不逺往往能言前代故實又各出其文章如逰瓊林瑶圃燦然可觀驛吏愕眙相語向使者之來未嘗有賓客如此之盛也及訖事而去顧瞻山川為之徘徊眷戀者久之眀年史越王裔孫文可因果囉羅易之至京師寄鄞江送别圗以相遺其士君子又為詩若文題其上素何以得此哉素山林之鄙人學未卒業以貧干祿無寸長以自見且非有穹官峻爵以聳動當世遡其先世未嘗宦逰此邦而有遺愛在其人何鄞之士君子待遇之隆一至於此其殆有宿緣耶此圗陳元昭所作筆意髙雅其紙猶是越王所畜皆可葆也史館暮歸因志其後使兒子謹藏之溪香文集序丙戌古者豪傑魁壘拔出之士視其時與勢往往寄迹方外以自晦其才智吾嘗從浮圗老子之徒以求其人亦時與之遇雖不能盡窺其中之所存察諸語言文字有不可得而遁其情矣鄱陽釋正則故大姓曺氏幼則志氣英發從宋江東提刑謝公君直逰讀孫吳書問則拊髀感慨視鄉里小兒碌碌不足數及謝公變姓名賣卜閩中執拘北行師以親老不能從久之剪鬚髮入里之華果寺學禪定於鐡牛禪師道出瀏陽之道吾山中龍湫甚神有欲居寺者卜之吉乃敢留師投偈湫中龍躍出水數尺若就之者衆為驚異定禪師與師言者非常人所能知徒見其外形骸忘物我休休焉陶陶焉視少年豪舉判然若異世矣然雅善為文詞方信紙行墨初則汨汨久而浩浩其神情變化意氣飛動猶有出入行陳激昂風雲之興豈非結習之未易掃除耶抑心華發眀其言之出若雷行風動沛然莫之禦耶或問於師曰師之入於異教者何曰吾患頭有創因不復存髮又問曰師臨文猶書姓者何曰姓吾性也性可去乎余少識師於廣信山中一見以故人相期因考求謝公之所以學師曰要不外乎易子其勉之臨川慶夀寺僧師孔借其文三編觀之至正六年里人饒旭子初至自金陵歸余所寄書篋曝書守微觀遂識其上嗚呼方外之竒士若師者吾不得而見之矣送彭公權序丙戌皇帝即位十有一年詔修遼金宋史先後命中書右丞相默爾竒斯公為都總裁今右丞相阿喇納公左丞相揚珠濟達公領三史事中書平章政事喀喇公今御史大夫秦中賀公翰林學士承㫖泲南張公廬陵歐陽公故侍講學士豫章揭公今陜西行臺侍御史大名李公翰林侍講學士長沙楊公故禮部尚書襄隂王公為總裁官各辟布衣士為校勘史成上進有司議校勘為儒學教授一考為流官制可初默爾竒斯公在相位思羅置名士幕中乃首辟廬陵彭衡公權為校勘及當授官公權遂厯言於朝著之知已者曰某有老母在廬陵兹幸獲祿食以為養願乞近便地以畢人子之志於是授黃州學教授以去士大夫咸是公權此舉而嘆羡之能文者多賦詩以送焉公權之在京師與余甚厚善余亦愛公權疏直而好義他人有一技之長一曲之善公權恆恐其沒沒也必欲家至而户曉之向也已雖未遇而見王公大人輒薦引寒畯之士又恆恐其掩困也故一舉而置諸館閣清崇之地人莫不以為宜今也始食祿而先於養則推其孝德固足以為人師矣是故古之先行義而後文華者固在於此余嘗過黃州先賢之遺蹟往往而在兵戈之息七十年􅀈國家右文之久諸生被吾公權之教者亦將興起其孝親之心移之以事君惡有不忠者乎余觀昔之善教事者亦書諸史若安定胡氏之於湖學臨川陸氏之於全學是已況吾公權之仕實兆於此行則推其孝德以至於顯融則將有執筆於其後者此史之不可少者歟公權未嘗求余文而余不能已也漢藝文志考證序丙戌漢藝文志考證六卷宋禮部尚書浚儀王公所著也臨川危素序曰儒家之學至宋而極盛大備矣嘉定而後其敝滋起大抵持鹵莽之學以爭雄述蕪穢之文以相尚假髙虛之論以自詭此其人才衰微國之所以馴至於滅亡士生其間而不變於其俗而卒能出入百氏羅絡羣言地負海㴠莫之紀極若是則免乎固陋之譏矣易曰多識前言往行以畜其德顧安得髙談性命以自塗塞其耳目哉此公所以能自拔於紛紛之中而力追古學者歟初公擢進士有列於朝稍踐華要而國事日非賈似道既斥公適當言路盡劾其黨不少貸至加恩皇子竑事實從公議及歸四眀遂堅卧不起杜門著述世號宏博此書其一也蓋藝文之見收於前史者其耳目千載之下欲考其原本證其謬誤亦誠難哉非曲暢旁通枝分派列亦不得與於斯即是可以窺公之學矣素既承詔修宋史紀載公之言行甚備復因其孫厚孫之請而序此書後之君子其亦亮之否乎公諱應麟字伯厚本政書序丙戌本政書十卷宋賀州學教授林勳所著始素得東陽陳亮同父所作序於龍川集中欲求其書不可得及至四眀從鉛山州儒學教授程端禮敬叔家亂書中僅得三葉端禮曰吾求此書久矣而未嘗見或得之願以告我至括蒼又從王興祖君起家觀朱文公與潘叔度氏手帖屬抄寫校正此書至松江始從莊肅幼恭家得亮所刋本至精好而永嘉薛士龍季宣跋其後素既假於莊氏繕寫之亟以書告端禮書未至而端禮沒端禮守經好古惜不及見也嗚呼任土作貢之法尚矣而儒者之論王政必曰井田井田豈不善哉然治天下之道或損或益或沿或革因時御變與民宜之以阡陌既開而欲復井田之制是猶書契已作而思反結繩之時三尺童子知其不可也勳於是書處之至精而慮之至密足以見其經世之大略矣當宋髙宗之南遷行經界之法其時勳之書方作也惜乎未有能薦其人而用之我世祖皇帝一天下因勝國之舊以定賦役其時勳之書猶存也惜乎未有能獻其書而行之失此二機勳之志卒未克信於後世功名之士亦足以慨然於此乎皇上詔修宋史素為勳立傳而撮其書大要存焉顧家貧不能刻其書以傳姑序而藏之以俟後之知者贈潘子華序丙戌開平昔在絶塞之外其動植之物若金蓮紫菊地椒白翎爵阿藍之屬皆居庸以南所未嘗有當封疆阻越非將與使弗至其地至亦不暇求其物産而玩之矣我國家受命自天乃即龍岡之陽灤水之澨以建都邑且將百年車駕嵗一巡幸於是四方萬國罔不奔走聽命雖曲藝之長亦求自見於世而咸集輦下錢唐潘君子華工繪事謂九州所産者昔之人擇其可觀莫不託諸豪素而是名家矣顧幸生於混一之時而獲見走飛草木之異品遂寫而傳之故凡子華之所能者皆自子華始非有所蹈襲模倣也皇上初即位子華因從臣以所畫進上賜酒勞問良久自是好事者爭從子華取之以為清賞之具而子華之名固將與徐熙趙昌同為不朽矣初子華之父以善寫真至元間見召三被詔三進官今子華年已七十有司未有薦而用之者然後知世之抱道德負才能而卒隱約於山林之下者夫豈少哉其遇不遇果縣於天與子華羇旅四十年陶然終日無所怨悔而一於其藝莊子曰用志不分乃凝於神宜乎子華之畫非衆工所能及也余五至開平數與子華相見故序以贈之送葛子熙序丙戌余幼寡昧而學弗能成其業蓋以為憂思求四方之良友以助之有葛將子熙近在里閈獲與之交而子熙不以豫為不肖而辱以為友焉子熙少孤貧甚育於舅氏與余問學於當世大儒先生之門吾二人者自負戴於道路更相為僕犯霜雪觸炙毒子熙手抄口誦恆至達旦不寐自謂其樂莫能踰之者暇則尋幽訪古至於深山絶壑時時發為文辭以託其所懷已而更涉世故憂患困苦未嘗一日不同也余來逰京師子熙以母老莫能偕行久之親喪而服除乃來視余於是子熙旅寓三四年日取經史而誦之故其學益深宏其文益粹密所為文恥以求知於人人亦莫能知之者然子熙亦自幸其知之者少也㑹皇上命修遼金宋史宰相選善書者二十有一人繕寫宋文以進子熙曰古之辭尊居卑辭富居貧吾其為傭書史乎因在選中廷議以為郡學録縣教諭仍檄行中書省用之子熙遂去余而南還矣余久在羇旅以朴愚不能媚於世亦思與子熙復求當日逰從之樂誅茅空山絃歌先王之風雅顧自纍於貧未能舍其升斗之祿為之惘然自失者久之嗚呼余與子熙蓋相期於千載之上者非一日矣則子熙宜有以處余也哉黃氏族譜序丁亥黃氏始祖唐都頭居秀之崇德大中元年其孫縈徙金華子洪浩洪生珍瑕浩生琛玘璞瑕徙南昌之西山其子贍定居豐城之沈江更八世而有吏部郎官次山又二世而有禮部尚書疇若其尤顯者其居諸暨監利分寧弋陽者皆瑕之昆弟矣禮部五世孫翰以其家譜至京師俾素序之惟素族祖漳州府君昔與禮部同朝贈别之詩見於家集今天子詔修宋史吏部及禮部與其孫茶陵軍使端卿素備數史官實為之立傳百年交誼夫豈偶然之故哉素早從處士孫先生輒得黃氏豐城分寧譜至禮部之孫已不及書乃以翰本補之而翰本復載諸暨監利弋陽譜而都頭之子孫備矣按黃氏在江南最多自素所見惟此譜與旴江唐江西兵馬節度使諱表譜浦城譜號為詳備素髙祖贈承事郎府君節度之後也友人黃冔謀合黃氏諸譜以考其分合異同顧安得皆有賢子孫如翰之葆其遺書哉素觀豐城分寧蓋由其先俱能敦詩書尚禮義繼自今衍其世澤於無窮者尚有考焉舒文靖公文集序丁亥舒文靖公文集十有六卷第録如上公諱璘字元質一字元賓眀之奉化人其學行厯官楊文元公銘其墓袁正肅公提㸃江東刑獄時作祠徽州而為之記禮部尚書王公應麟常作小傳載四眀志今天子詔修三史史官危素以公與沈端憲公同傳宋史概可得而考矣素於公相後百年相距且千里數夢寐拜公而承教焉大瀛海逸人吕虛夷公里人素嘗屬之求公文集既數年乃以書介公之六世孫莊七世族孫祥金奉遺槀至京師以授素謹取而次第之素之不敏蓋粗考公之學一本諸心故發而為言無往而非此心之妙斯豈執筆摹擬區區於文字之末者所能窺其倣佛哉因序其端以俟後世之知公者送劉子鉉序丁亥至正二年皇上有詔作遼金宋史執政與總裁官等集議設修寫四十人用翰林國史院書寫十有六人國子伴讀籍記部令史各十有二人遼金史卷帙不甚多既已進上獨宋故史紀載詳備今史氏勢不得盡削而野史雜記當參證者不可勝數於是政府選能書者草有一人以布衣辟置館中廬陵劉子鉉鼎與焉今御史大夫髙公以中書平章政事涖史事常掩人不備卒然至局惟子鉉與草人者朝夕不怠而字畫又皆楷正髙公甚喜揚言於朝宜官之總裁官用史官言按本朝故事大一統志成書者草有五人經世大典成書者三十人皆用為儒學教授今所修史尤為繁多而草一人宜遵先朝故事官之然廷議卒用為郡學録縣教諭且檄外中書授之子鉉名在江西檄中行省參政亷公曰吾史官也知草有一人者有功於史亟白僚長擇便地近闕處之子鉉授吉安之龍泉學教諭子鉉且南去京師故舊分題賦詩贈之顧子鉉方盛年其學水涌而山進用以施教於一縣既不足酬其勞又不足展其才然或疑子鉉不能無介然於其中者余讀周官書古者閭有孰以卿大夫士里居者為左右師或曰父師少師或曰鄉先生凡朝夕有教焉嵗時屬民飲酒則為之僎入自門左席於尊東所以考德問業刑善而勸賢也今一縣之大其草五家之閭蓋不知其幾龍泉又子鉉之鄰邑乃往為之師則朝廷之待吾子鉉者可謂厚之至也子鉉尚益思以報稱哉仙岩圗序丁亥信之貴溪南行八十里至龍虎山余嘗從漁者買小舟泛溪流行數里得仙岩自舟中仰望峭壁萬仞衆岩棊布如轆轤酒瓮仙倉仙棺不可勝數有三人者同坐岩中俯觀流水然或隱或顯意非飛仙不能到也樵者雖極力攀緣至絶頂僅可俯窺而石磴嵌空終莫能即至順中居民繫長綆大樹上縣竹籠坐一人其中稍至仙棺岩前以長鈎鈎二棺墜溪水中棺皆柟木所制一棺中有玉連環而已或云堯時民避水其上故其遺蹤存焉余嘗辨之堯時河水為患耳其橫流泛濫惡得至此境耶緣藤蘿而上有大岩可容數百人益折而上至其顛甚平曠浮圗師架岩為宫室復登舟行數里至桃原太史范先生嘗為之記及舍舟入山造演法觀漢張天師鍊丹處猶倣佛可見又有水簾洞者瀑流㵼崖上若縞練飛而雷霆吼入洞中可坐雖疾趨衣巾必沾濕至鄒尊岩亂石為門扉中多黃精薯蕷鷷鴟之類鄒尊者古仙人也大抵千岩萬壑草木秀潤非遁世好竒之士無因而至方壺生學道於龍虎心迹超邁不汙塵垢時時寫山水有竒趣若武夷匡廬恆岱華不注諸山數為余圗之而仙岩者又常所坐卧其間者也然其人逰方之外莫可測度興之所至不問姓名亦漫與之否則雖一筆不輕與之紫陽王君達善得其所寫仙岩圗寄至京師求余志之因序所嘗逰者而自惜其汨沒世事而不知返也經邦軌轍序經邦軌轍十卷臨川郭君慶傳之所著也其目則十有二曰格君進賢恤民正已守法勉學去邪絶私識量職任寡欲兼聽各引經史於其端而證以國朝名臣之事其後則君自為論斷以發明之監察御史以君所著有補於當世薦於朝集賢翰林兩院較其書亦以為善乃按今式命為學官君持其書使豫序之嗟乎經邦之道夫豈易言哉今夫梓匠輪輿猶有俟乎規矩凖繩而後可以作室制器況於身居輔弼凝丞之地廢興治亂之所係豈可以不學無術者茍充其位使隂陽不和水旱洊至社稷其有不至於危亡者乎傅說之告其君有曰事不師古之戒周公有兼三王施四事之思古之聖賢莫不皆然後之經邦者不求昔人之軌轍而遵行之其可乎哉今皇上嗣大厯服勳賢並用君所著書適際其㑹然而藏諸有司而已君雖受官以去猶宜繕寫進於延閣頒示羣臣俾公卿百官咸知經綸邦家具有成法一旦舉而措之宜不至於曠官而敗事則君著書之功何可計也送段學士致仕歸濟南序昔翰林學士東平李公伯宗為國子祭酒㑹國子監知印闕居勢者迫李公用其私人李公竟取諸生籍用其上名蓋濟南段某也段公家甚貧當是時聞者以李公屹然不怵於權勢而能處之以正也其後段公厯州縣入朝為監察御史出僉河南憲年甫六十有六致其事乃授翰林直學士中朝諸公嘉其知止自足為詩歌以送之且七十而致仕古之制也今法亦然世固有不俟七十而退休者非其壓於勢分有所不敢行則局於冗散有所不可行苦於羸疾有所不能行則往往思浩然而去之矣至於出佐風紀持節巡行郡縣威聲所加下吏震肅況於祿養豐厚勢尊職重而體力强健足以任事顧能決去逺引無所攀戀如吾段公者蓋未之見也古今之士縻爵祿之重任騁功利之修涂其為人智愚固可知已是故量已而受任畏滿而知止者豈非君子哉則段公賢於衆人逺矣於是世不獨嘉段公之賢又益知李公之知人送方推官赴嘉興序戊子新安方君以愚早擢科第治邑有聲用為國史翰林院編修官㑹今宣徽使札拉爾公為院長好賢下士知君故進士命取先後禁苑所為文章比録之君乃博求故翰林學士承㫖王文康公而下文集亡慮數百家册命制誥碑銘祝文詩賦贊頌等作編次若干卷名曰玉堂視草書成欲上進而札拉爾公遷他官及詔修后妃功臣列傳君與史事既受代待制而下言於院長請復留君院長曰然亟以告於政府㑹天子宰相憂郡縣之凋敝大選賢能撫綏下民遂擢嘉興路總管府推官卜日以行同館之士皆惘然有離别之色咸賦詩以道其情素以君之從祖闕府君與先曽祖仁和府君同舉景定三年進士今復為僚友因得書其首簡夫用刑之重見諸經史者君儒者固不待有所陳矣素觀國朝之命官無問事大小必同堂論之故人自為說而政多曠廢獨刑名之事至郡專責於推官則其致慎於斯固足以見聖眀之世好生之德洽于民心者如此夫今風俗之壞獄訟之興姦豪得以騁其强梗胥吏得以變其白黑嘉興浙右大郡也固宜得豈弟詳眀如君者涖之庶幾善良獲安而屈抑獲伸而無負設官之意矣昔人解字者秉中為史君之於史章善而疸惡秉其中而已則其治獄者亦惟秉其中而已送敖巡檢序戊子天厯至順之間海內黎母山冦作出師討之時主將募勇悍無賴子弟為之前驅謂之達爾罕軍達爾罕者縱恣無禁也於是盡斬刈黎人無遺種其後主將者官廣西用其法亦募勇悍無賴子弟以制莫猺獞人之為冦者初亦頗立禦冦功久則習知官府事體乃潛與冦通冦出則有司必使之逐冦冦既不可得乃盜奪財貨牛豕斬馘良民以要賞其民罹荼毒者草年去天萬里無所控訴嵗復仰給縣官耗費亡藝言者孰知其為南粵害請罷其所給一旦發憤相呼起為劇盜元帥府莫能制因上聞於朝數調行省兵擊之多不利殺湖廣省臣及諸將佐連掀數臣震動南粵盜所未至者其民供給餽餉富完之家立致窮乏天子哀矜逺人降詔書諭降此羣盜束手請命之秋也余嘗考國朝初取南粵功狀惟靜江堅壁難下他郡縣望風送欵當此之時得之敵國之手猶若是易易耳今海內既平七十年而兵連禍結賊殺王官鼠竊狗偷上煩當寧之慮是必有其故矣識時務之俊傑豈能坐視而不開口一吐其胸中之竒乎宜春敖遂初嘗從軍廣西論功授烏程管界巡檢昔蘇文忠公守徐州以沂多盜乞兼兵馬巡檢今遂初專居是職乃蘇公所願為者國家之待遂初亦云不薄遂初早用於兵間深知所以設施之宜辨止戈不殺之意知無不言臣子之義盍厯舉陳於闕下方侍從文臣承詔納言無患其言之不達於天聽也余與遂初未嘗有一日之雅太史周君以聲數稱其淳願因其赴官而及廣西之事不識以余言為然乎史館購書目録序戊子至正三年詔修遼金宋史遣使旁午購求遺書而書之送官者甚少素以庸陋備數史官中書復命往河南江浙江西素承命恪共不遑寧處諭以皇上仁眀鋭志刪述於是藏書之家稍以其書來獻驛送史館既采擇其要者書諸䇿矣暇日因發故櫝録其目藏焉其間宋東都盛時所寫之書世無他本者今亦有之朝廷之購求民間之上送皆至公之心也素之跋涉山海心殫力勞有不足言後之司管鑰者誠慎守之不至於散亡可也有志於稽古者豈不有所增廣其學問云爾至於人情之險阻事物之膠轕别為之録以示兒子俾知生乎今之世雖事之小者奉公盡職之為難蘭橋毛氏族譜序己丑毛文王之昭也厯世滋久系弗可考宋之時西安最盛其後有徙南城之龍䕃又徙吾金溪之馬蘭橋遇順既增修其家譜僅十有一世嘗自序之謂其先有為縣丞者宋南渡初苖傳劉正彥構亂縣丞興兵勤王事定因家龍䕃蓋其官卑不見於史而遇順亦不得其詳矣遇順間為余言南城慧光寺有斷碑載其先世事再紀至元之三年余與石豈生逰山水至此寺詢之則石亡已久後八年余以經筵檢討承詔修宋史奉使求遺書於東南得長沙丁氏所編百族譜於松江莊肅幼恭家西安毛氏譜在其中則知縣丞諱辨字眀仲為丞於江寧當傳正彥之亂實在江寧宋師追至閩境罪人斯得南城與邵武壤地相接縣丞之涉此必有其事丁氏所修由縣丞而上七世而止其下一世而止蓋丁氏修書時在紹興間故也遇順來京師適余供奉翰林得假是書遇順甚喜補完其譜復自序之縣丞之族祖知衢州諱滂字澤民與眉山蘇文忠公相好有文集在翰林余家舊有大理寺丞漸所投三墳遇順皆手録以歸若獲拱璧縣丞之兄諱幵字平仲有文集在揚州學宫余嘗讀之愛其清醇遇順又將求録之則其尊祖敬宗之心甚厚豈流俗所能識哉然豫以毛氏譜觀之以遇順好文而篤至距縣丞才二百年亦久而後得其概則古文遺事未易窮詰往往類此學者可不慎諸至正九年三月望書於金臺坊客舍是日休暇往觀銅馬於故城楊梓人待制文集序己丑澧陽楊侯梓人早讀書天門山中既擢髙科仕於州縣者草有餘年天子聞其文章可掌誥命乃召為翰林待制然侯素貴重其文宋正獻公其榜首也欲觀之不可得賂逆旅主人竊取之侯在禁林四方之求文者未嘗漫與素承乏末僚從容奉命承教於史館數以為言乃得二巨編讀之終嵗而不饜蓋其辭根極理要精深冲逺如滄海無波一碧萬頃信乎能言者也詩云衣錦尚絅中庸曰惡其文之著惟侯有焉此豈世俗沾沾自足外加表暴者所能知哉侯自入官以來亷勤清苦鬱有譽望東平申屠駉字迪素削刻不妄許可為兵部員外在令式當舉守令一人嘗語素曰吾所信者惟梓人耳則侯之於政蓋可知己侯於學尤深於易有所論述又補注水經皆當傳於世故此不著送郭真人還玉笥山序己丑世祖皇帝受命自天非獨一時豪傑文武異才並為之用而山川百靈罔不率職方是時常山劉文正王以沈機大略最為親幸且通祕術行師用兵之際役使鬼神多著竒效乃作祠宇於宛平之西山開平之南屏山以祠太一六丁之神俱號曰靈應萬夀宫常山王既薨嗣居之者非操履貞白眀於道術者不得與兹選至元四年五月己丑朔今皇帝敕玊笥山道士郭君宗純為第八代祭遁真人降璽書寵嘉之其所館兩都靖治所在戒嚴真人龎眉皓首深居林壑時人望之已若古仙異人未易狎習既十年乃言於朝將歸隱於故山則其髙風益邈不可攀矣名卿大夫士聞真人之知止自足有契於老子之㫖為詩歌以送之而屬豫為之序蓋至順初第六代真人毛君退休於龍虎山杜門簡絶人事翛然自得余固已嘆其浮遊塵埃之表非世俗所能汨沒者及今觀郭君之歸後世將益羡遁祠之多賢也惟其輕世故薄功名然後心無所纍而可交於神眀吾於二君子見之矣抑常山王初嘗寄迹方外及其遭逢聖明超拜上公之爵然處之泊如也二君子無乃聞風而興起者歟不然何其去就之從容如此哉橫州新城詩序己丑周官之制致力於城郭甚嚴為之量人以營之為之掌固以修之蓋人之並生於天地之間血氣嗜欲易於角爭故王公設險以守其國孟子亦曰天時不如地利今夫浚溝以為城鑿池以為郭所以備預先王之制然矣我國家初平江南即下令墮天下之城郭豈不以大兵所至若襄陽若合州攻之久而後破然誠知其一未知其二也今中原之地曠數千里而無城池之守近嵗悍夫自東海以數十騎橫行州縣若蹈無人之境備之無其素焉耳橫州當左右兩江之衝夷獠之為害己劇至正五年廣信倪君友誠來佐是州與知事陳華甫巡檢郭君惠吏目廖蜚卿謀修復州之城隍乃先為東南城門泊鼓角樓君既出俸錢以為倡僚屬咸相其成未幾工告訖功君曰民可用也㑹同知州事于某知事朱某亦至官善君是舉計其役城之方三百六十丈池三百九十丈寧浦永淳之民聞之樂於趨事俄得古甎於樂山石村不可數計堅緻周正上識云太元七年考之圗經晉孝武帝時民穴處甎室至是九百六十有五年矣民爭取輦載以為州城又於眀年仲春之月君為之區别閭巷樹立官府遷驛舍立惠民局神祠民各得其所君調官京師間則語及某事豫嘗患邊檄之地盜賊之肆行而守禦之無䇿拘文法者昧通變之術憚興作者樂因循之謀老弱之困於俘虜斃於鋒鏑者相望使守土之臣皆若君之於橫則又何患焉嗚呼何其不能然也昔者草有四春秋書之所以重民之力君之為城乃得故甎於千年之久殆非偶然者豈其效忠之誠慮民之功天有以相之歟則事之非常尤史家所當記也謹叙其顛末請大夫君子詠歌之送歸憲使赴河西詩序己丑新安朱文公論觀人之術曰光眀正大疏暢洞達如青天白日如髙山大川如雷霆之為威如雨露之為澤如龍虎之為猛如麟鳯之為祥磊磊落落無纎芥可疑者必君子也素之羇逰京師願求四方之君子考德而問業必得如朱氏所言者何髙不即何深不求其無愧朱氏言者大梁歸公彥溫其人歟至正五年十有一月日南至河南行省掾范孟僞為中書公牘結流俗無賴者詐稱使者入據省署立召省憲官殺平章政事等若干人僞授肅政亷訪使段輔左丞尋升平章散遣諸司調兵符檄交馳河渡關隘皆為賊守孟自稱大元帥寓公富民及小吏之桀黠者悉授僞官公以前同知潁州事需次於家亦在召中即拜其母訣死别賊果欲僞授蓬婆萬户府經厯公抗言曰吾起諸生擢科第方圗報國恩憂其弗及豈肯從汝等為盜賊耶賊怒械之獄決以詰旦殺公是夕事敗而公得免方是時大丞相秦王巴延倉卒莫知其故奏遣知樞密院事特默齊罕總大兵以出京師震恐及事覺乃知孟所為今太尉髙公以中書參知政事承詔往訊其事汳梁之民破家隕身者相望而公抗賊之節亦上於朝今知樞密院事阿齊拉公為中書平章政事驚曰儒者亦有斯人耶漢人亦有斯人耶於是公之名聲大震於天下以是觀之若公者則所謂光明正大疏暢洞達者也其後中書宥密臺閣爭以不次用之今遂超擢為河西肅政亷訪使卜日以行朝之名卿大夫士莫不賦詩以為餞素識公最久以不習於騷雅故備書公之大節以見公之日躋膴仕者有以自致而非阿順取容僥幸茍得所可同日而語也若夫一方之政或當罷行州縣之吏或當舉刺特公餘事故此得而略云送徐時之還勾吳序己丑至正九年江浙行省承詔刻大一統志成命松江府儒學教授姑蘇徐君時之進之於朝君數顧余於寓舍觀其氣貌粹乎其甚溫其容止儼乎其有度其論議淵乎其不窮故中朝之名卿大夫士咸樂與君逰逮君之還相率為詩歌送之君吳人且通春秋學而有所著述余竊以春秋吳國之事問之吳本姬姓泰伯與弟仲雍讓國季厯逃之荆蠻武王克殷求其後得周章者封之吳又十有四世至夀夢春秋魯成公七年書曰吳伐郯左氏載郯成季文子曰中國不振旅蠻夷入伐申包胥曰吳為封豕長蛇以洊食上國此皆敵國之言要未足為吳輕重吳周之伯父也而曰蠻夷何耶至於襄公二十有九年書曰吳子使札來聘常山劉氏武夷胡氏皆責札不遺餘力余嘗三復其言竊以為過矣衆言淆亂吾將折諸孔子孔子之言曰延陵季子吳之習於禮者也又曰延陵季子之於禮也其合矣乎蓋始聞其學禮故曰習終見其能行禮故曰合使季子非賢孔子以習禮而合禮許之乎方季子之聘於魯鄭衛晉其於審音樂觀人才若燭照數計而龜卜也今曰乃吳之亂實由季子不當以國讓夫讓美德也孔子之贊泰伯三以天下讓民無得而稱焉可謂至德也已然則泰伯之讓非歟且季子雖有父命而上有三兄卒以自立而弗讓則是自居其賢可哉獨公羊氏曰賢季子也穀梁氏曰身賢賢也使賢亦賢也其得春秋之㫖歟雖然夫差之稱王則非也外其地為逺夷論者之過也或曰君之先與吳同姓而滅於吳其與之乎春秋公天下之是非君知明乎此其肯以舊怨而昧之乎余之送君而及乎此蓋因其地而討論之以質子之所疑送董英仲琴所詩序己丑昔者神農氏之王天下始為琴有虞氏用之以歌南風南風之長養萬物猶人君長養萬物當此之時諸侯有行虞帝之政德盛教尊五穀時熟則以樂賞之也然則治天下者其可忽哉蓋嘗考夫八音金石竹匏土木六者皆有一定之聲革為燥濕所薄絲有絃柱緩急之不齊故二者無一定之聲絲之聲其變無窮大晟樂府嘗罷一絃三絃九絃琴惟存五絃琴而已以為五絃得五音之正最優於諸琴也或者琴之絃七而以緩急變其聲則自能具十二絃之數一絃具十二聲具十二絃則具百四十有四聲百四十四聲本於十二律而十二律又有六濁之異六清既為清矣而六濁無清則不和故自黃鐘至中吕又有子聲亦六也是以五聲之旋相為宫也則七絃可變十有八律而二百一十六聲皆備焉皇朝一天下將百年制禮作樂兹惟其時是宜有精於樂藝者出而效用於當日審音而知政嗚呼未易言也樂平蕭君性淵與余為忘年交以書來告曰吾里董君英仲願內交於子余察其性純篤而有深沈之思杜門京師閒則鼓琴一二曲以自娛則其中之所存有非余之凡陋所能窺者記曰君子聽琴瑟之聲則思忠義之臣絲聲婉妙故能怨哀故能立亷隅不越其分以自立其志聞聲達事存乎知者若董君者亦可謂志義之士哉蕭君以古田主簿棄官而歸將有浩然長往之志董君為我謝曰眀天子在上禮樂將興其可久淹於山林乎說學齊稿卷三
